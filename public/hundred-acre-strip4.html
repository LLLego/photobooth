<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundred Acre Gang — Storybook Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:wght@400;500;700&family=Caveat:wght@400;500;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --honey: #E8C547;
    --honey-deep: #C99A2E;
    --honey-warm: #F2D77A;
    --honey-pale: #F5E4A1;
    --cream: #FFFAF0;
    --cream-soft: #FBEFD7;
    --cream-shade: #E9D7B0;
    --chocolate: #4A2511;
    --chocolate-deep: #2D1608;
    --chocolate-soft: #6B3818;
    --chocolate-light: #8A5028;
    --rust: #9B4A1E;
    --berry: #6B1F2A;
  }

  html, body { background: #1f0f06; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'DM Sans', sans-serif;
    color: var(--chocolate);
    background-image:
      radial-gradient(ellipse at 20% 15%, rgba(74, 37, 17, 0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(45, 22, 8, 0.7) 0%, transparent 55%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='5'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.02 0 0 0 0 0 0 0 0 0.45 0'/></filter><rect width='400' height='400' filter='url(%23n)'/></svg>");
    overflow-x: hidden;
  }

  /* ============ STAGE ============ */
  .stage {
    position: relative;
    width: 100%;
    max-width: 740px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ============ PHOTO STRIP (the actual frame) ============ */
  .strip-frame {
    position: relative;
    width: 460px;
    padding: 22px 22px 28px;
    background:
      /* paper grain */
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2' seed='9'/><feColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.75 0 0 0 0 0.55 0 0 0 0.18 0'/></filter><rect width='200' height='200' filter='url(%23p)'/></svg>"),
      /* warm cream base with gentle vertical wash (ink bleed, not gradient) */
      linear-gradient(180deg,
        var(--cream) 0%,
        var(--cream-soft) 40%,
        #F4E2C0 100%);
    border-radius: 6px;
    box-shadow:
      0 2px 4px rgba(45, 22, 8, 0.2),
      0 18px 40px rgba(20, 10, 4, 0.55),
      0 40px 90px rgba(20, 10, 4, 0.4),
      inset 0 0 60px rgba(155, 74, 30, 0.08);
    transform: rotate(-1.2deg);
    transition: transform 0.4s cubic-bezier(.2,.8,.2,1);
  }
  .strip-frame:hover { transform: rotate(-0.3deg) translateY(-4px); }

  /* Subtle paper edge darkening */
  .strip-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 6px;
    background:
      linear-gradient(90deg, rgba(74,37,17,0.12) 0%, transparent 6%, transparent 94%, rgba(74,37,17,0.12) 100%),
      linear-gradient(180deg, rgba(74,37,17,0.10) 0%, transparent 6%, transparent 94%, rgba(74,37,17,0.10) 100%);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* Soft coffee/ink stain in corner */
  .strip-frame::after {
    content: '';
    position: absolute;
    bottom: 14px;
    right: 18px;
    width: 70px;
    height: 70px;
    background:
      radial-gradient(circle at 60% 40%, rgba(120, 60, 20, 0.18) 0%, rgba(120, 60, 20, 0.08) 40%, transparent 70%);
    border-radius: 50%;
    filter: blur(2px);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* ============ DOUBLE GOLDEN BORDER ============ */
  .double-border {
    position: relative;
    padding: 14px 14px 16px;
    border: 2.5px solid var(--chocolate);
    border-radius: 3px;
    background: transparent;
    box-shadow:
      0 0 0 1px var(--cream) inset,
      0 0 0 4px var(--honey-deep) inset,
      0 0 0 5px var(--chocolate) inset,
      0 0 0 9px var(--honey) inset,
      0 0 0 10px var(--chocolate) inset;
  }

  /* Decorative corner flourishes */
  .corner {
    position: absolute;
    width: 38px;
    height: 38px;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; display: block; }
  .corner-tl { top: -16px; left: -16px; }
  .corner-tr { top: -16px; right: -16px; transform: scaleX(-1); }
  .corner-bl { bottom: -16px; left: -16px; transform: scaleY(-1); }
  .corner-br { bottom: -16px; right: -16px; transform: scale(-1, -1); }

  /* ============ 4 PHOTO SLOTS ============ */
  .photos {
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 2;
  }

  .slot {
    position: relative;
    aspect-ratio: 4 / 3;
    background:
      /* faint photo paper warmth */
      linear-gradient(135deg, #FFF6E0 0%, #F4E4B8 100%);
    border: 1.5px solid var(--chocolate);
    border-radius: 2px;
    box-shadow:
      inset 0 0 0 1px rgba(255, 250, 240, 0.5),
      inset 0 2px 8px rgba(74, 37, 17, 0.12),
      0 2px 5px rgba(45, 22, 8, 0.15);
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .slot:hover {
    transform: translateY(-2px);
    box-shadow:
      inset 0 0 0 1px rgba(255, 250, 240, 0.5),
      inset 0 2px 8px rgba(74, 37, 17, 0.12),
      0 6px 14px rgba(45, 22, 8, 0.25);
  }

  /* Slot inner - tape + label */
  .slot-tape {
    position: absolute;
    top: -7px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 56px;
    height: 16px;
    background:
      linear-gradient(180deg, rgba(245, 228, 161, 0.85), rgba(232, 197, 71, 0.7));
    box-shadow: 0 1px 2px rgba(45, 22, 8, 0.2);
    z-index: 4;
    opacity: 0.85;
  }
  .slot:nth-child(2) .slot-tape { transform: translateX(-50%) rotate(1.5deg); background: linear-gradient(180deg, rgba(245, 220, 200, 0.85), rgba(220, 180, 160, 0.7)); }
  .slot:nth-child(3) .slot-tape { transform: translateX(-50%) rotate(-1deg); background: linear-gradient(180deg, rgba(245, 228, 161, 0.85), rgba(232, 197, 71, 0.7)); }
  .slot:nth-child(4) .slot-tape { transform: translateX(-50%) rotate(2deg); background: linear-gradient(180deg, rgba(220, 200, 230, 0.8), rgba(190, 170, 210, 0.65)); }

  .slot-label {
    position: absolute;
    bottom: 5px;
    right: 7px;
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    color: var(--chocolate-deep);
    background: rgba(255, 250, 240, 0.75);
    padding: 1px 5px;
    border-radius: 1px;
    letter-spacing: 0.5px;
    z-index: 3;
    box-shadow: 0 0 0 0.5px rgba(74, 37, 17, 0.3);
  }

  /* Empty slot prompt */
  .slot-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--chocolate-light);
    font-family: 'Caveat', cursive;
    font-size: 18px;
    font-weight: 500;
    gap: 4px;
    pointer-events: none;
  }
  .slot-empty .num {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--honey-deep);
    line-height: 1;
  }
  .slot-empty .sub {
    font-size: 13px;
    color: var(--chocolate-soft);
    opacity: 0.7;
  }

  /* Tiny illustration inside empty slots */
  .slot-empty svg {
    width: 32px;
    height: 32px;
    opacity: 0.4;
    margin-bottom: 2px;
  }

  /* ============ TITLE PLATE ============ */
  .title-plate {
    margin-top: 18px;
    padding: 14px 12px 6px;
    text-align: center;
    position: relative;
  }

  .ornament-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .ornament-line .line {
    height: 1.5px;
    width: 50px;
    background: var(--chocolate);
    position: relative;
  }
  .ornament-line .line::before,
  .ornament-line .line::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 4px;
    background: var(--honey-deep);
    border-radius: 50%;
    border: 1px solid var(--chocolate);
  }
  .ornament-line .line.left::before { left: -2px; }
  .ornament-line .line.left::after { right: -10px; }
  .ornament-line .line.right::before { left: -10px; }
  .ornament-line .line.right::after { right: -2px; }
  .ornament-line .center-icon {
    width: 18px;
    height: 18px;
    color: var(--honey-deep);
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1.05;
    color: var(--chocolate-deep);
    letter-spacing: 1.5px;
    text-shadow:
      1px 1px 0 var(--honey-warm),
      2px 2px 0 rgba(74, 37, 17, 0.15);
    margin: 4px 0 2px;
  }
  .title .amp {
    font-style: italic;
    font-weight: 400;
    color: var(--honey-deep);
    margin: 0 2px;
  }

  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--rust);
    margin-top: 2px;
    transform: rotate(-1.5deg);
  }

  .footer-meta {
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    color: var(--chocolate-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .footer-meta .heart { color: var(--berry); }

  /* ============ CHARACTERS (transparent PNGs) ============ */
  .character {
    position: absolute;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 6px 8px rgba(45, 22, 8, 0.35));
    transition: transform 0.5s cubic-bezier(.2,.8,.2,1);
  }
  .character:hover { pointer-events: auto; }
  .stage:hover .character { transform: translate3d(var(--tx, 0), var(--ty, 0), 0) rotate(var(--tr, 0deg)); }

  .char-pooh {
    top: -50px;
    left: -90px;
    width: 180px;
    height: 200px;
    --tx: 6px;
    --ty: 6px;
    --tr: 3deg;
  }
  .char-piglet {
    top: -40px;
    right: -85px;
    width: 150px;
    height: 180px;
    --tx: -6px;
    --ty: 6px;
    --tr: -3deg;
  }
  .char-tigger {
    bottom: -30px;
    left: -95px;
    width: 175px;
    height: 210px;
    --tx: 8px;
    --ty: -8px;
    --tr: -2deg;
  }
  .char-eeyore {
    bottom: -55px;
    right: -90px;
    width: 185px;
    height: 175px;
    --tx: -6px;
    --ty: -4px;
    --tr: 2deg;
  }

  /* Floating pollen/honey sparkle particles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    z-index: 8;
    color: var(--honey);
    opacity: 0.7;
    animation: float 6s ease-in-out infinite;
  }
  .sparkle:nth-child(2) { animation-delay: 1.5s; animation-duration: 7s; }
  .sparkle:nth-child(3) { animation-delay: 3s; animation-duration: 5.5s; }
  .sparkle:nth-child(4) { animation-delay: 0.5s; animation-duration: 8s; }
  .sparkle:nth-child(5) { animation-delay: 2.2s; animation-duration: 6.5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
    50% { transform: translateY(-10px) rotate(15deg); opacity: 0.85; }
  }

  /* ============ STAGE CAPTION (outside frame) ============ */
  .stage-caption {
    margin-top: 60px;
    text-align: center;
    color: var(--cream-shade);
    font-family: 'Caveat', cursive;
    font-size: 22px;
    max-width: 480px;
    opacity: 0.85;
  }
  .stage-caption .signed {
    margin-top: 8px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--honey-warm);
    letter-spacing: 1px;
  }

  /* Honey drip on top of frame */
  .honey-drip {
    position: absolute;
    top: -8px;
    left: 30%;
    width: 24px;
    height: 30px;
    background: var(--honey);
    border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
    box-shadow:
      inset -2px -4px 6px var(--honey-deep),
      inset 2px 2px 4px var(--honey-warm),
      0 3px 6px rgba(45, 22, 8, 0.3);
    z-index: 5;
  }
  .honey-drip::before {
    content: '';
    position: absolute;
    top: -8px;
    left: -4px;
    right: -4px;
    height: 12px;
    background: var(--honey);
    border-radius: 4px;
  }

  /* Watermark text vertical on side */
  .side-stamp {
    position: absolute;
    top: 50%;
    right: -52px;
    transform: translateY(-50%) rotate(90deg);
    transform-origin: center;
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 6px;
    color: var(--chocolate-soft);
    opacity: 0.55;
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* Stamp badge */
  .stamp {
    position: absolute;
    top: 12px;
    left: -38px;
    width: 80px;
    height: 80px;
    transform: rotate(-12deg);
    z-index: 6;
    opacity: 0.85;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .strip-frame { width: 88vw; max-width: 380px; padding: 16px 16px 22px; }
    .char-pooh { width: 110px; height: 130px; top: -30px; left: -10px; }
    .char-piglet { width: 95px; height: 115px; top: -25px; right: -10px; }
    .char-tigger { width: 110px; height: 135px; bottom: -20px; left: -10px; }
    .char-eeyore { width: 115px; height: 110px; bottom: -35px; right: -10px; }
    .title { font-size: 22px; }
    .side-stamp, .stamp { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- ========== CHARACTER: POOH (top-left) ========== -->
  <div class="character char-pooh" aria-hidden="true">
    <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
      <!-- Shadow -->
      <ellipse cx="100" cy="210" rx="55" ry="6" fill="rgba(45,22,8,0.15)"/>
      
      <!-- Body -->
      <path d="M 60 130 Q 50 100 65 85 Q 75 75 100 75 Q 125 75 135 85 Q 150 100 140 130 Q 145 160 130 180 Q 115 200 100 200 Q 85 200 70 180 Q 55 160 60 130 Z" 
            fill="#D49530"/>
      <!-- Belly -->
      <ellipse cx="100" cy="155" rx="32" ry="38" fill="#F2C75A"/>
      <ellipse cx="100" cy="155" rx="32" ry="38" fill="url(#bellyShade)" opacity="0.4"/>
      
      <!-- Shirt (red) -->
      <path d="M 62 105 Q 75 100 100 100 Q 125 100 138 105 L 140 130 Q 125 125 100 125 Q 75 125 60 130 Z" 
            fill="#B83A28"/>
      <path d="M 62 105 Q 75 100 100 100 Q 125 100 138 105 L 140 130 Q 125 125 100 125 Q 75 125 60 130 Z" 
            fill="url(#shirtTex)" opacity="0.3"/>
      <!-- Shirt texture lines -->
      <path d="M 70 110 L 72 128 M 85 108 L 85 126 M 100 108 L 100 126 M 115 108 L 115 126 M 130 110 L 128 128" 
            stroke="#8B2818" stroke-width="0.8" opacity="0.5"/>
      
      <!-- Arms -->
      <ellipse cx="55" cy="140" rx="12" ry="22" fill="#D49530" transform="rotate(-15 55 140)"/>
      <ellipse cx="145" cy="140" rx="12" ry="22" fill="#D49530" transform="rotate(15 145 140)"/>
      
      <!-- Legs -->
      <ellipse cx="85" cy="195" rx="11" ry="9" fill="#8B2818"/>
      <ellipse cx="115" cy="195" rx="11" ry="9" fill="#8B2818"/>
      
      <!-- Head -->
      <circle cx="100" cy="55" r="38" fill="#D49530"/>
      <circle cx="100" cy="55" r="38" fill="url(#headShade)" opacity="0.35"/>
      
      <!-- Ears -->
      <circle cx="72" cy="32" r="11" fill="#A06F1F"/>
      <circle cx="72" cy="32" r="7" fill="#C28525"/>
      <circle cx="128" cy="32" r="11" fill="#A06F1F"/>
      <circle cx="128" cy="32" r="7" fill="#C28525"/>
      
      <!-- Face lighter -->
      <ellipse cx="100" cy="65" rx="26" ry="22" fill="#E8B04E" opacity="0.6"/>
      
      <!-- Eyebrows -->
      <path d="M 80 45 Q 85 42 90 45" stroke="#3D1F08" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M 110 45 Q 115 42 120 45" stroke="#3D1F08" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      
      <!-- Eyes -->
      <ellipse cx="85" cy="55" rx="3" ry="4" fill="#1A0A02"/>
      <ellipse cx="115" cy="55" rx="3" ry="4" fill="#1A0A02"/>
      <circle cx="86" cy="54" r="1" fill="#FFF"/>
      <circle cx="116" cy="54" r="1" fill="#FFF"/>
      
      <!-- Snout -->
      <ellipse cx="100" cy="72" rx="13" ry="9" fill="#F2C75A"/>
      <ellipse cx="100" cy="73" rx="4" ry="3" fill="#1A0A02"/>
      
      <!-- Smile -->
      <path d="M 88 78 Q 100 84 112 78" stroke="#3D1F08" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      
      <!-- Honey pot being held -->
      <ellipse cx="50" cy="165" rx="16" ry="6" fill="#8B5A2B"/>
      <path d="M 36 165 Q 36 180 40 185 L 60 185 Q 64 180 64 165 Z" fill="#A0703D"/>
      <ellipse cx="50" cy="160" rx="14" ry="5" fill="#E8C547"/>
      <path d="M 38 162 Q 50 158 62 162 L 62 168 Q 50 164 38 168 Z" fill="#F2D77A"/>
      <!-- Honey drip -->
      <path d="M 42 168 Q 41 175 43 178" stroke="#E8C547" stroke-width="2" fill="none" stroke-linecap="round"/>
      
      <defs>
        <radialGradient id="bellyShade" cx="0.3" cy="0.3">
          <stop offset="0" stop-color="#FFF" stop-opacity="0.5"/>
          <stop offset="1" stop-color="#C99A2E" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="headShade" cx="0.7" cy="0.7">
          <stop offset="0" stop-color="#8B5510" stop-opacity="0.6"/>
          <stop offset="1" stop-color="#D49530" stop-opacity="0"/>
        </radialGradient>
        <pattern id="shirtTex" patternUnits="userSpaceOnUse" width="3" height="3">
          <rect width="3" height="3" fill="#B83A28"/>
          <circle cx="1.5" cy="1.5" r="0.5" fill="#8B2818"/>
        </pattern>
      </defs>
    </svg>
  </div>

  <!-- ========== CHARACTER: PIGLET (top-right) ========== -->
  <div class="character char-piglet" aria-hidden="true">
    <svg viewBox="0 0 180 220" xmlns="http://www.w3.org/2000/svg">
      <!-- Shadow -->
      <ellipse cx="90" cy="210" rx="45" ry="5" fill="rgba(45,22,8,0.15)"/>
      
      <!-- Body -->
      <ellipse cx="90" cy="150" rx="38" ry="45" fill="#F5C8C8"/>
      <ellipse cx="90" cy="150" rx="38" ry="45" fill="url(#pigBody)" opacity="0.4"/>
      
      <!-- Striped suit (pink/magenta) -->
      <path d="M 55 130 Q 70 125 90 125 Q 110 125 125 130 L 128 170 Q 110 165 90 165 Q 70 165 52 170 Z" 
            fill="#D84870"/>
      <!-- Horizontal stripes -->
      <path d="M 56 135 L 126 135 M 55 145 L 127 145 M 54 155 L 128 155 M 53 165 L 129 165" 
            stroke="#F0C0D0" stroke-width="2" opacity="0.7"/>
      
      <!-- Arms -->
      <ellipse cx="50" cy="145" rx="8" ry="18" fill="#F5C8C8" transform="rotate(-20 50 145)"/>
      <ellipse cx="130" cy="145" rx="8" ry="18" fill="#F5C8C8" transform="rotate(20 130 145)"/>
      
      <!-- Legs -->
      <ellipse cx="78" cy="192" rx="8" ry="7" fill="#5A2A3A"/>
      <ellipse cx="102" cy="192" rx="8" ry="7" fill="#5A2A3A"/>
      
      <!-- Head -->
      <ellipse cx="90" cy="75" rx="35" ry="32" fill="#F5C8C8"/>
      <ellipse cx="90" cy="75" rx="35" ry="32" fill="url(#pigHead)" opacity="0.4"/>
      
      <!-- Ears (pointy pig ears) -->
      <path d="M 62 50 L 56 28 L 76 45 Z" fill="#E8A8A8"/>
      <path d="M 118 50 L 124 28 L 104 45 Z" fill="#E8A8A8"/>
      <path d="M 65 48 L 62 35 L 72 45 Z" fill="#F5C8C8"/>
      <path d="M 115 48 L 118 35 L 108 45 Z" fill="#F5C8C8"/>
      
      <!-- Face lighter patch -->
      <ellipse cx="90" cy="82" rx="25" ry="20" fill="#FFE0E0" opacity="0.5"/>
      
      <!-- Eyes -->
      <ellipse cx="78" cy="72" rx="2.5" ry="3.5" fill="#1A0A02"/>
      <ellipse cx="102" cy="72" rx="2.5" ry="3.5" fill="#1A0A02"/>
      <circle cx="79" cy="71" r="0.8" fill="#FFF"/>
      <circle cx="103" cy="71" r="0.8" fill="#FFF"/>
      
      <!-- Eyebrows (worried) -->
      <path d="M 73 64 Q 78 62 83 65" stroke="#5A2A3A" stroke-width="1.3" fill="none" stroke-linecap="round"/>
