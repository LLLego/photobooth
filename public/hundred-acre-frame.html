<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hundred Acre Gang — Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 30% 20%,#FFE9B8,transparent 55%),radial-gradient(ellipse at 70% 80%,#FFD89E,transparent 60%),linear-gradient(135deg,#FBE5BB,#F4C878);min-height:100vh;display:grid;place-items:center;padding:14px;font-family:'Playfair Display',serif}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(45deg,rgba(74,37,21,.03) 0 2px,transparent 2px 5px),repeating-linear-gradient(-45deg,rgba(74,37,21,.03) 0 2px,transparent 2px 5px);pointer-events:none;mix-blend-mode:multiply}
.stage{position:relative;width:min(600px,90vw);aspect-ratio:3/4}
.frame{position:absolute;inset:0;border-radius:24px;box-shadow:inset 0 0 0 12px #E8C547,inset 0 0 0 13px #4A2515,inset 0 0 0 15px #E8C547,inset 0 0 0 16px #4A2515,inset 0 0 60px rgba(74,37,21,.25),0 30px 60px rgba(0,0,0,.5);overflow:hidden;background:radial-gradient(ellipse at center,#fffdf8,#fef3e0)}
/* Center photo area */
.photo-area{position:absolute;inset:48px 40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.photo-area .camera{font-size:60px;opacity:.15}
.photo-area .label{font-family:Caveat,cursive;font-size:22px;color:#4A2515;opacity:.2}
/* Top title */
.title{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none}
.title .main{font-family:'Playfair Display',serif;font-size:clamp(18px,3.5vw,28px);font-weight:900;color:#4A2515;letter-spacing:.04em;text-shadow:0 1px 0 #FFB400,0 2px 0 rgba(200,150,50,.3),0 4px 12px rgba(74,37,21,.15)}
.title .sub{font-family:Caveat,cursive;font-size:clamp(12px,2vw,16px);color:#8B6914;margin-top:-2px;letter-spacing:.08em}
/* Character SVGs */
.char{position:absolute;z-index:5;pointer-events:none}
.char.top-left{top:30px;left:18px}
.char.top-right{top:30px;right:18px}
.char.bottom-left{bottom:30px;left:18px}
.char.bottom-right{bottom:30px;right:18px}
.char svg{width:clamp(90px,16vw,130px);height:clamp(90px,16vw,130px);filter:drop-shadow(2px 3px 4px rgba(0,0,0,.2))}
/* Honey drips */
.drip{position:absolute;z-index:3;font-size:24px;opacity:.35;pointer-events:none}
/* Heart row */
.hearts{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;pointer-events:none}
.hearts span{font-size:10px;opacity:.25;color:#C44D4D}
</style>
</head>
<body>
<div class="stage">
  <div class="frame">
    <!-- Center photo area -->
    <div class="photo-area">
      <span class="camera">📷</span>
      <span class="label">your photo here</span>
    </div>

    <!-- Title -->
    <div class="title">
      <div class="main">HUNDRED ACRE GANG</div>
      <div class="sub">EST. FOREVER</div>
    </div>

    <!-- POOH — top left -->
    <div class="char top-left">
      <svg viewBox="0 0 140 140">
        <defs><radialGradient id="poohGrad"><stop offset="0%" stop-color="#E8C547"/><stop offset="100%" stop-color="#C49B30"/></radialGradient></defs>
        <ellipse cx="80" cy="80" rx="38" ry="34" fill="url(#poohGrad)"/>
        <ellipse cx="80" cy="58" rx="16" ry="13" fill="url(#poohGrad)"/>
        <circle cx="70" cy="42" r="15" fill="url(#poohGrad)"/>
        <circle cx="90" cy="42" r="15" fill="url(#poohGrad)"/>
        <circle cx="72" cy="54" r="3" fill="#2D1B11"/>
        <circle cx="88" cy="54" r="3" fill="#2D1B11"/>
        <ellipse cx="80" cy="60" rx="5" ry="3" fill="#C44D4D"/>
        <ellipse cx="80" cy="72" rx="18" ry="12" fill="#F5DEB3"/>
        <path d="M62 76 Q80 88 98 76" stroke="#C44D4D" stroke-width="2.5" fill="none"/>
        <rect x="56" y="82" width="14" height="18" rx="7" fill="#C44D4D"/>
        <rect x="90" y="82" width="14" height="18" rx="7" fill="#C44D4D"/>
        <ellipse cx="80" cy="110" rx="22" ry="18" fill="url(#poohGrad)"/>
        <rect x="64" y="120" width="32" height="20" rx="10" fill="#C44D4D"/>
      </svg>
    </div>

    <!-- PIGLET — top right -->
    <div class="char top-right">
      <svg viewBox="0 0 140 140">
        <ellipse cx="70" cy="75" rx="28" ry="34" fill="#FFB6C1"/>
        <ellipse cx="70" cy="55" rx="14" ry="11" fill="#FFB6C1"/>
        <circle cx="56" cy="42" r="10" fill="#FF69B4"/>
        <circle cx="84" cy="42" r="10" fill="#FF69B4"/>
        <circle cx="58" cy="50" r="3" fill="#2D1B11"/>
        <circle cx="82" cy="50" r="3" fill="#2D1B11"/>
        <ellipse cx="70" cy="56" rx="9" ry="6" fill="#FF69B4"/>
        <ellipse cx="70" cy="68" rx="14" ry="10" fill="#FFD1DC"/>
        <rect x="56" y="96" width="28" height="22" rx="8" fill="#FF69B4" opacity=".6"/>
        <ellipse cx="50" cy="50" rx="6" ry="10" fill="#FFB6C1"/>
        <ellipse cx="90" cy="50" rx="6" ry="10" fill="#FFB6C1"/>
      </svg>
    </div>

    <!-- TIGGER — bottom left -->
    <div class="char bottom-left">
      <svg viewBox="0 0 140 140">
        <ellipse cx="70" cy="70" rx="34" ry="40" fill="#F4A460"/>
        <circle cx="60" cy="38" r="16" fill="#F4A460"/>
        <circle cx="84" cy="38" r="16" fill="#F4A460"/>
        <ellipse cx="70" cy="60" rx="18" ry="14" fill="#FFF8DC"/>
        <circle cx="62" cy="48" r="3.5" fill="#2D1B11"/>
        <circle cx="82" cy="48" r="3.5" fill="#2D1B11"/>
        <ellipse cx="70" cy="52" rx="6" ry="3" fill="#E891A0"/>
        <path d="M55 62 Q70 78 85 62" stroke="#2D1B11" stroke-width="2" fill="none"/>
        <!-- stripes -->
        <path d="M70 70 Q78 78 86 70" stroke="#D2691E" stroke-width="3" fill="none" opacity=".7"/>
        <path d="M64 78 Q74 86 82 78" stroke="#D2691E" stroke-width="3" fill="none" opacity=".7"/>
        <!-- legs -->
        <rect x="50" y="90" width="8" height="30" rx="4" fill="#F4A460"/>
        <rect x="64" y="90" width="8" height="30" rx="4" fill="#F4A460"/>
        <rect x="80" y="90" width="8" height="30" rx="4" fill="#F4A460"/>
        <!-- tail -->
        <path d="M95 65 Q115 55 120 40 Q108 50 98 58" stroke="#F4A460" stroke-width="5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- EEYORE — bottom right -->
    <div class="char bottom-right">
      <svg viewBox="0 0 140 140">
        <ellipse cx="70" cy="72" rx="30" ry="36" fill="#A0A0B0"/>
        <circle cx="58" cy="44" r="14" fill="#A0A0B0"/>
        <circle cx="84" cy="44" r="14" fill="#A0A0B0"/>
        <ellipse cx="56" cy="38" rx="10" ry="16" fill="#808090"/>
        <ellipse cx="86" cy="38" rx="10" ry="16" fill="#808090"/>
        <circle cx="60" cy="52" r="3.5" fill="#2D1B11"/>
        <circle cx="82" cy="52" r="3.5" fill="#2D1B11"/>
        <ellipse cx="70" cy="56" rx="6" ry="2.5" fill="#555"/>
        <ellipse cx="70" cy="64" rx="16" ry="11" fill="#C0C0CC"/>
        <!-- pink bow on tail -->
        <rect x="90" y="98" width="6" height="18" rx="3" fill="#A0A0B0"/>
        <g transform="translate(94,116)">
          <circle cx="0" cy="0" r="7" fill="#E891A0"/>
          <ellipse cx="-11" cy="3" rx="11" ry="7" fill="#E891A0" transform="rotate(-25)"/>
          <ellipse cx="11" cy="3" rx="11" ry="7" fill="#E891A0" transform="rotate(25)"/>
        </g>
      </svg>
    </div>

    <!-- Honey drips -->
    <div class="drip" style="top:100px;left:50%">🍯</div>
    <div class="drip" style="top:100px;left:calc(50% + 40px)">🍯</div>
    <div class="drip" style="top:100px;left:calc(50% - 40px)">🍯</div>

    <!-- Bottom hearts -->
    <div class="hearts">
      <span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span>
    </div>
  </div>
</div>
</body>
</html>
