<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Hundred Acre Gang · A Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,600&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --honey:#FFB400;
  --honey-deep:#E89000;
  --cream:#FFFAF0;
  --cream-deep:#F2E4C9;
  --choco:#4A2515;
  --choco-soft:#6B3A22;
  --pink:#FFB6C1;
  --pink-deep:#E89AA6;
  --orange:#F4A460;
  --orange-deep:#C5722E;
  --grey-blue:#A0A0B0;
  --grey-deep:#7A7A8C;
  --moss:#6B8E5A;
  --paper:#F5E9D0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100vh;
  background:#2A1810;
  font-family:'Fraunces',serif;
  color:var(--choco);
  overflow-x:hidden;
}
body{
  background:
    radial-gradient(ellipse at 20% 10%, #3A2418 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, #2A1810 0%, transparent 50%),
    #1E1208;
  background-attachment:fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
  position:relative;
}

/* Wood-grain wall backdrop */
body::before{
  content:"";
  position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(90deg,
      transparent 0px,transparent 80px,
      rgba(255,180,0,.025) 80px,rgba(255,180,0,.025) 81px,
      transparent 81px,transparent 200px,
      rgba(74,37,21,.05) 200px,rgba(74,37,21,.05) 201px),
    repeating-linear-gradient(0deg,
      transparent 0px,transparent 3px,
      rgba(74,37,21,.02) 3px,rgba(74,37,21,.02) 4px);
  pointer-events:none;
  z-index:0;
}

/* Tiny dust motes */
body::after{
  content:"";
  position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 13% 27%, rgba(255,250,240,.4) 0, transparent 1.5px),
    radial-gradient(circle at 67% 43%, rgba(255,250,240,.3) 0, transparent 1px),
    radial-gradient(circle at 89% 78%, rgba(255,250,240,.35) 0, transparent 1.5px),
    radial-gradient(circle at 34% 88%, rgba(255,250,240,.25) 0, transparent 1px),
    radial-gradient(circle at 92% 12%, rgba(255,250,240,.3) 0, transparent 1px),
    radial-gradient(circle at 8% 67%, rgba(255,250,240,.28) 0, transparent 1px);
  pointer-events:none;
  z-index:0;
}

.stage{
  position:relative;
  z-index:1;
  width:min(1180px,100%);
}

/* Outer wood frame — layered paper inside wood */
.photobooth{
  position:relative;
  width:100%;
  aspect-ratio:4/5;
  background:
    /* page tape shadows */
    radial-gradient(ellipse 120px 40px at 50% -8px, rgba(0,0,0,.18), transparent 70%),
    /* paper inner */
    linear-gradient(135deg, var(--paper) 0%, #EDDFB8 100%);
  border-radius:18px;
  box-shadow:
    inset 0 0 0 3px var(--choco),
    inset 0 0 0 4px #8B5A2B,
    inset 0 0 0 7px var(--choco),
    inset 0 0 0 10px #D4A464,
    inset 0 0 0 12px var(--choco),
    inset 0 0 0 15px #E8B870,
    inset 0 0 0 16px var(--choco),
    inset 0 0 70px rgba(74,37,21,.25),
    inset 0 0 200px rgba(74,37,21,.08),
    0 50px 80px rgba(0,0,0,.7),
    0 30px 50px rgba(0,0,0,.5),
    0 10px 20px rgba(0,0,0,.4);
  overflow:hidden;
}

/* Paper texture inside frame */
.photobooth::before{
  content:"";
  position:absolute;
  inset:16px;
  background-image:
    repeating-radial-gradient(circle at 17% 33%, rgba(120,80,40,.04) 0, rgba(120,80,40,.04) 1px, transparent 1px, transparent 4px),
    repeating-radial-gradient(circle at 71% 61%, rgba(120,80,40,.03) 0, rgba(120,80,40,.03) 1px, transparent 1px, transparent 6px),
    repeating-linear-gradient(45deg, rgba(180,140,80,.025) 0 1px, transparent 1px 5px),
    repeating-linear-gradient(-45deg, rgba(180,140,80,.025) 0 1px, transparent 1px 5px);
  pointer-events:none;
  border-radius:6px;
}

/* Subtle aged stains */
.photobooth::after{
  content:"";
  position:absolute;
  inset:16px;
  background:
    radial-gradient(ellipse 80px 60px at 12% 18%, rgba(140,90,40,.08), transparent 70%),
    radial-gradient(ellipse 100px 70px at 88% 82%, rgba(140,90,40,.07), transparent 70%),
    radial-gradient(ellipse 60px 50px at 90% 25%, rgba(140,90,40,.06), transparent 70%);
  pointer-events:none;
  border-radius:6px;
}

/* ============ TOP BANNER ============ */
.banner{
  position:absolute;
  top:32px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  text-align:center;
  pointer-events:none;
}
.banner-eyebrow{
  font-family:'Caveat',cursive;
  font-size:1.1rem;
  color:var(--choco-soft);
  letter-spacing:.05em;
  display:inline-block;
  position:relative;
  padding:0 28px;
  margin-bottom:2px;
}
.banner-eyebrow::before,.banner-eyebrow::after{
  content:"";
  position:absolute;
  top:50%;
  width:22px;
  height:1px;
  background:var(--choco-soft);
}
.banner-eyebrow::before{left:0}
.banner-eyebrow::after{right:0}

.banner h1{
  font-family:'Fraunces',serif;
  font-weight:900;
  font-size:clamp(1.6rem,3.2vw,2.4rem);
  color:var(--choco);
  letter-spacing:-.01em;
  line-height:.95;
  font-style:italic;
  text-shadow:1px 1px 0 rgba(255,250,240,.5);
}
.banner h1 .amp{
  color:var(--honey-deep);
  font-style:italic;
}
.banner-sub{
  font-family:'Caveat',cursive;
  font-size:1rem;
  color:var(--choco-soft);
  margin-top:4px;
  letter-spacing:.2em;
  font-weight:700;
}
.banner-stars{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-top:6px;
  color:var(--honey);
  font-size:.7rem;
  letter-spacing:.4em;
}

/* ============ CHARACTERS COMMON ============ */
.character{
  position:absolute;
  z-index:15;
  filter:drop-shadow(0 8px 12px rgba(74,37,21,.3));
}
.character-label{
  position:absolute;
  font-family:'Caveat',cursive;
  font-size:.95rem;
  color:var(--choco);
  white-space:nowrap;
  font-weight:700;
  transform:rotate(-3deg);
  text-shadow:1px 1px 0 rgba(255,250,240,.6);
}

/* ============================================
   1. GOLDEN HONEY BEAR (TOP-LEFT)
   ============================================ */
.bear{
  top:80px;
  left:34px;
  width:150px;
  height:160px;
}
.bear-body{
  position:absolute;
  width:115px;
  height:100px;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at 35% 30%, #FFD060 0%, #FFB400 50%, #D88800 100%);
  border-radius:50% 50% 48% 48% / 55% 55% 45% 45%;
  border:2.5px solid var(--choco);
  box-shadow:
    inset -8px -10px 14px rgba(140,80,0,.25),
    inset 6px 8px 10px rgba(255,230,150,.4);
}
/* tummy */
.bear-body::after{
  content:"";
  position:absolute;
  width:62px;
  height:55px;
  background:linear-gradient(180deg,#FFE8B0,#FFD060);
  border-radius:50%;
  bottom:6px;
  left:50%;
  transform:translateX(-50%);
  border:1.5px solid var(--choco-soft);
}
/* red shirt collar */
.bear-shirt{
  position:absolute;
  width:118px;
  height:34px;
  bottom:62px;
  left:50%;
  transform:translateX(-50%);
  background:
    repeating-linear-gradient(0deg, #C72B2B 0 2px, #A02020 2px 4px);
  border-radius:50% 50% 18% 18% / 70% 70% 30% 30%;
  border:2.5px solid var(--choco);
  z-index:3;
  box-shadow:inset 0 -4px 8px rgba(0,0,0,.2);
}
.bear-shirt::before{
  content:"";
  position:absolute;
  width:8px;height:8px;
  background:var(--choco);
  border-radius:50%;
  left:50%;top:6px;
  transform:translateX(-50%);
}

.bear-head{
  position:absolute;
  width:88px;
  height:80px;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at 35% 35%, #FFD060 0%, #FFB400 55%, #D88800 100%);
  border-radius:50% 50% 48% 48% / 52% 52% 48% 48%;
  border:2.5px solid var(--choco);
  z-index:5;
  box-shadow:
    inset -6px -6px 10px rgba(140,80,0,.2),
    inset 4px 6px 8px rgba(255,230,150,.35);
}
/* ears */
.bear-head::before,.bear-head::after{
  content:"";
  position:absolute;
  width:26px;
  height:26px;
  background:radial-gradient(circle at 35% 35%, #FFB400, #D88800);
  border:2.5px solid var(--choco);
  border-radius:50%;
  top:-12px;
}
.bear-head::before{left:-4px}
.bear-head::after{right:-4px}

.bear-ear-inner-l,.bear-ear-inner-r{
  position:absolute;
  width:12px;height:12px;
  background:#8B4513;
  border-radius:50%;
  top:-5px;
  z-index:6;
}
.bear-ear-inner-l{left:14px}
.bear-ear-inner-r{right:14px}

.bear-eyes{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
  z-index:7;
}
.bear-eyes span{
  width:9px;height:11px;
  background:var(--choco);
  border-radius:50%;
  position:relative;
}
.bear-eyes span::after{
  content:"";
  position:absolute;
  width:3px;height:3px;
  background:var(--cream);
  border-radius:50%;
  top:2px;left:2px;
}
.bear-snout{
  position:absolute;
  width:36px;height:24px;
  background:linear-gradient(180deg,#FFE8B0,#FFD060);
  border:2px solid var(--choco);
  border-radius:50%;
  top:46px;
  left:50%;
  transform:translateX(-50%);
  z-index:7;
}
.bear-nose{
  position:absolute;
  width:11px;height:8px;
  background:var(--choco);
  border-radius:50% 50% 50% 50% / 70% 70% 50% 50%;
  top:3px;
  left:50%;
  transform:translateX(-50%);
}
.bear-mouth{
  position:absolute;
  width:18px;height:10px;
  border:2px solid var(--choco);
  border-top:none;
  border-radius:0 0 50% 50%;
  bottom:3px;
  left:50%;
  transform:translateX(-50%);
}
/* blush */
.bear-blush-l,.bear-blush-r{
  position:absolute;
  width:14px;height:8px;
  background:radial-gradient(ellipse,rgba(255,100,100,.5),transparent 70%);
  border-radius:50%;
  top:48px;
  z-index:6;
}
.bear-blush-l{left:14px}
.bear-blush-r{right:14px}

/* arms holding honeypot */
.bear-arm-l,.bear-arm-r{
  position:absolute;
  width:24px;height:30px;
  background:radial-gradient(ellipse at 35% 35%,#FFD060,#D88800);
  border:2.5px solid var(--choco);
  border-radius:50%;
  z-index:4;
}
.bear-arm-l{bottom:30px;left:8px;transform:rotate(-25deg)}
.bear-arm-r{bottom:30px;right:8px;transform:rotate(25deg)}

.honeypot{
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:38px;height:28px;
  background:linear-gradient(180deg,#8B4513 0%,#5C2E0E 100%);
  border:2.5px solid var(--choco);
  border-radius:8% 8% 30% 30% / 20% 20% 60% 60%;
  z-index:3;
  box-shadow:inset 0 4px 6px rgba(0,0,0,.3);
}
.honeypot::before{
  content:"";
  position:absolute;
  width:42px;height:8px;
  background:#3A1A05;
  border:2.5px solid var(--choco);
  border-radius:50%;
  top:-6px;
  left:50%;
  transform:translateX(-50%);
}
.honeypot::after{
  content:"";
  position:absolute;
  width:28px;height:6px;
  background:radial-gradient(ellipse,#FFD700,#FFB400);
  border-radius:50%;
  top:-4px;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 2px 0 rgba(0,0,0,.1);
}
.bear-label{
  position:absolute;
  bottom:-18px;left:50%;
  transform:translateX(-50%) rotate(-4deg);
  font-family:'Caveat',cursive;
  font-weight:700;
  color:var(--choco);
  font-size:1.05rem;
  background:rgba(255,250,240,.8);
  padding:1px 10px;
  border-radius:8px;
  border:1px dashed var(--choco-soft);
  white-space:nowrap;
}

/* ============================================
   2. PINK PIG (TOP-RIGHT)
   ============================================ */
.pig{
  top:78px;
  right:34px;
  width:140px;
  height:170px;
}
.pig-body{
  position:absolute;
  width:80px;
  height:75px;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  background:
    repeating-linear-gradient(90deg,
      #FFB6C1 0px,#FFB6C1 8px,
      #FFA0AF 8px,#FFA0AF 10px),
    #FFB6C1;
  border:2.5px solid var(--choco);
  border-radius:50% 50% 45% 45% / 50% 50% 50% 50%;
  z-index:3;
  box-shadow:
    inset -5px -5px 8px rgba(180,80,90,.25),
    inset 4px 4px 6px rgba(255,200,210,.5);
}
.pig-body::after{
  content:"";
  position:absolute;
  width:30px;height:30px;
  background:linear-gradient(180deg,#FFD0DA,#FFB6C1);
  border-radius:50%;
  bottom:4px;
  left:50%;
  transform:translateX(-50%);
  border:1.5px solid var(--choco-soft);
}
.pig-collar{
  position:absolute;
  width:50px;height:8px;
  background:#A02020;
  border:2px solid var(--choco);
  border-radius:4px;
  bottom:88px;
  left:50%;
  transform:translateX(-50%) rotate(-3deg);
  z-index:5;
}
.pig-collar::before{
  content:"";
  position:absolute;
  width:8px;height:8px;
  background:#FFD700;
  border:1.5px solid var(--choco);
  border-radius:50%;
  left:50%;top:-4px;
  transform:translateX(-50%);
}

.pig-head{
  position:absolute;
  width:75px;
  height:68px;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at 35% 30%,#FFD0DA 0%,#FFB6C1 55%,#E89AA6 100%);
  border:2.5px solid var(--choco);
  border-radius:50%;
  z-index:6;
  box-shadow:
    inset -5px -5px 8px rgba(180,80,90,.2),
    inset 4px 4px 6px rgba(255,210,220,.45);
}

/* big pig ears (floppy leaf shape) */
.pig-ear-l,.pig-ear-r{
  position:absolute;
  width:30px;height:28px;
  background:radial-gradient(ellipse at 40% 40%,#FFC8D2,#E89AA6);
  border:2.5px solid var(--choco);
  border-radius:60% 40% 60% 40% / 70% 50% 50% 30%;
  top:8px;
  z-index:5;
}
.pig-ear-l{left:18px;transform:rotate(-25deg)}
.pig-ear-r{right:18px;transform:rotate(25deg)}

.pig-ear-inner-l,.pig-ear-inner-r{
  position:absolute;
  width:14px;height:12px;
  background:#E89AA6;
  border-radius:50%;
  top:15px;
  z-index:7;
}
.pig-ear-inner-l{left:23px;transform:rotate(-25deg)}
.pig-ear-inner-r{right:23px;transform:rotate(25deg)}

.pig-eyes{
  position:absolute;
  top:26px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:24px;
  z-index:8;
}
.pig-eyes span{
  width:8px;height:9px;
  background:var(--choco);
  border-radius:50%;
}
.pig-eyes span::after{
  content:"";
  display:block;
  width:2.5px;height:2.5px;
  background:var(--cream);
  border-radius:50%;
  margin-top:1.5px;
  margin-left:1.5px;
}
.pig-snout{
  position:absolute;
  width:32px;
  height:24px;
  background:linear-gradient(180deg,#FFC8D2,#E89AA6);
  border:2px solid var(--choco);
  border-radius:50%;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  z-index:8;
  box-shadow:inset 0 -3px 5px rgba(180,80,90,.3);
}
.pig-snout::before,.pig-snout::after{
  content:"";
  position:absolute;
  width:5px;height:7px;
  background:var(--choco);
  border-radius:50%;
  top:7px;
}
.pig-snout::before{left:6px}
.pig-snout::after{right:6px}

.pig-mouth{
  position:absolute;
  width:14px;height:6px;
  border:1.8px solid var(--choco);
  border-top:none;
  border-radius:0 0 50% 50%;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  z-index:8;
}
.pig-blush-l,.pig-blush-r{
  position:absolute;
  width:14px;height:9px;
  background:radial-gradient(ellipse,rgba(220,80,100,.45),transparent 70%);
  border-radius:50%;
  top:42px;
  z-index:7;
}
.pig-blush-l{left:20px}
.pig-blush-r{right:20px}

/* little arms */
.pig-arm-l,.pig-arm-r{
  position:absolute;
  width:18px;height:24px;
  background:radial-gradient(ellipse at 35% 35%,#FFD0DA,#E89AA6);
  border:2px solid var(--choco);
  border-radius:50%;
  z-index:4;
  bottom:30px;
}
.pig-arm-l{left:32px;transform:rotate(-20deg)}
.pig-arm-r{right:32px;transform:rotate(20deg)}

/* tiny feet */
.pig-foot-l,.pig-foot-r{
  position:absolute;
  width:18px;height:10px;
  background:#E89AA6;
  border:2px solid var(--choco);
  border-radius:50%;
  bottom:14px;
  z-index:2;
}
.pig-foot-l{left:38px}
.pig-foot-r{right:38px}

.pig-label{
  position:absolute;
  bottom:-22px;left:50%;
  transform:translateX(-50%) rotate(3deg);
  font-family:'Caveat',cursive;
  font-weight:700;
  color:var(--choco);
  font-size:1.05rem;
  background:rgba(255,250,240,.8);
  padding:1px 10px;
  border-radius:8px;
  border:1px dashed var(--choco-soft);
  white-space:nowrap;
}

/* ============================================
   3. ORANGE TIGER (BOTTOM-LEFT)
   ============================================ */
.tiger{
  bottom:80px;
  left:34px;
  width:150px;
  height:160px;
}
.tiger-body{
  position:absolute;
  width:80px;
  height:70px;
  bottom:14px;
  left:30px;
  background:
    radial-gradient(ellipse at 30% 30%, #FFC88A 0%, #F4A460 60%, #C5722E 100%);
  border:2.5px solid var(--choco);
  border-radius:50% 50% 45% 45% / 55% 55% 45% 45%;
  z-index:3;
  box-shadow:
    inset -6px -6px 10px rgba(140,60,20,.3),
    inset 4px 4px 6px rgba(255,200,140,.4);
  overflow:hidden;
}
/* tiger stripes on body */
.tiger-body::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(95deg,
      transparent 0px,transparent 12px,
      rgba(74,37,21,.85) 12px,rgba(74,37,21,.85) 16px,
      transparent 16px,transparent 30px);
  -webkit-mask:radial-gradient(ellipse at center, black 60%, transparent 100%);
          mask:radial-gradient(ellipse at center, black 60%, transparent 100%);
}
.tiger-body::after{
  content:"";
  position:absolute;
  width:38px;height:42px;
  background:linear-gradient(180deg,#FFE0B0,#FFC88A);
  border-radius:50%;
  bottom:4px;
  left:50%;
  transform:translateX(-50%);
  border:1.5px solid var(--choco-soft);
}

.tiger-head{
  position:absolute;
  width:78px;
  height:72px;
  top:18px;
  left:60px;
  background:radial-gradient(ellipse at 35% 30%,#FFC88A 0%,#F4A460 55%,#C5722E 100%);
  border:2.5px solid var(--choco);
  border-radius:50% 50% 48% 48% / 50% 50% 48% 48%;
  z-index:6;
  box-shadow:
    inset -5px -5px 8px rgba(140,60,20,.25),
    inset 4px 4px 6px rgba(255,200,140,.45);
  overflow:hidden;
}

/* tiger head stripes */
.tiger-head-stripe{
  position:absolute;
  background:rgba(74,37,21,.9);
  border-radius:50%;
  z-index:7;
}
.ths1{width:5px;height:18px;top:4px;left:18px;transform:rotate(-15deg)}
.ths2{width:5px;height:18px;top:4px;left:30px;transform:rotate(5deg)}
.ths3{width:5px;height:18px;top:4px;left:42px;transform:rotate(15deg)}
.ths4{width:5px;height:14px;top:8px;left:8px;transform:rotate(-35deg);border-radius:50%}
.ths5{width:5px;height:14px;top:8px;right:8px;transform:rotate(35deg);border-radius:50%}

.tiger-ear-l,.tiger-ear-r{
  position:absolute;
  width:22px;height:22px;
  background:radial-gradient(circle at 35% 35%,#F4A460,#C5722E);

/* tiger feet — bouncy */
.tiger-leg-l,.tiger-leg-r{

}
.donkey-eyes span{

/* droopy ears */
.donkey-ear-l,.donkey-ear-r{

.donkey-mouth{

/* ============================================
   PHOTO WINDOW (CENTER, EMPTY)
   ============================================ */
.photo-window{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(440px,55%);
  aspect-ratio:1/1.15;
  background:
    linear-gradient(135deg,#FFFAF0 0%,#F2E4C9 100%);
  border-radius:6px;
  box-shadow:
    inset 0 0 0 1px var(--choco),
    inset 0 0 0 6px var(--cream),
    inset 0 0 0 7px var(--choco),
    inset 0 0 0 14px #F5E9D0,
    inset 0 0 0 15px var(--choco),
    inset 0 0 40px rgba(74,37,21,.15),
    0 6px 18px rgba(74,37,21,.3);
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:30px;
}
.photo-window::before{
  content:"";
  position:absolute;
  inset:15px;
  background:
    repeating-linear-gradient(45deg,
      rgba(180,140,80,.04) 0 1px,
      transparent 1px 6px),
    radial-gradient(ellipse at 20% 20%,rgba(140,90,40,.06),transparent 60%);
  pointer-events:none;
}
.photo-window-label{
  font-family:'Caveat',cursive;
  font-size:.95rem;
  color:var(--choco-soft);
  letter-spacing:.15em;
  text-transform:uppercase;
  opacity:.5;
}
.photo-window-arrows{
  font-size:1.4rem;
  color:var(--choco-soft);
  opacity:.3;
  letter-spacing:1em;
  margin-top:8px;
}

/* ============================================
   CORNER ORNAMENTS
   ============================================ */
.corner-ornament{
  position:absolute;
  width:50px;height:50px;
  z-index:18;
}
.corner-tl{top:30px;left:30px;border-top:2px solid var(--choco);border-left:2px solid var(--choco);border-radius:8px 0 0 0}
.corner-tr{top:30px;right:30px;border-top:2px solid var(--choco);border-right:2px solid var(--choco);border-radius:0 8px 0 0}
.corner-bl{bottom:30px;left:30px;border-bottom:2px solid var(--choco);border-left:2px solid var(--choco);border-radius:0 0 0 8px}
.corner-br{bottom:30px;right:30px;border-bottom:2px solid var(--choco);border-right:2px solid var(--choco);border-radius:0 0 8px 0}

.corner-ornament::after{
  content:"❋";
  position:absolute;
  font-size:.85rem;
  color:var(--honey-deep);
}
.corner-tl::after{top:-9px;left:-9px}
.corner-tr::after{top:-9px;right:-9px}
.corner-bl::after{bottom:-9px;left:-9px}
.corner-br::after{bottom:-9px;right:-9px}

  z
