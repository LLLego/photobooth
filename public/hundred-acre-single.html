<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hundred Acre Gang — Photobooth</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 30% 20%, #3a2818 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, #2a1810 0%, transparent 60%),
      #1a0f08;
    font-family: 'Playfair Display', Georgia, serif;
    padding: 40px 20px;
  }

  /* ============ OUTER FRAME ============ */
  .frame {
    position: relative;
    width: 600px;
    height: 800px;
    background:
      radial-gradient(ellipse at top, #fdf6e3 0%, #f5ead0 40%, #ead8b0 100%);
    border-radius: 6px;
    box-shadow:
      0 40px 100px rgba(0,0,0,0.7),
      0 0 0 1px rgba(232,197,71,0.3),
      inset 0 0 120px rgba(180, 130, 60, 0.18);
    padding: 22px;
  }

  /* Outer thin gold line */
  .frame::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1.5px solid #E8C547;
    border-radius: 3px;
    pointer-events: none;
    z-index: 1;
  }

  /* Inner gold line (the double border) */
  .frame::after {
    content: '';
    position: absolute;
    inset: 22px;
    border: 3px solid #E8C547;
    border-radius: 2px;
    pointer-events: none;
    z-index: 1;
  }

  /* Corner golden dots */
  .corner-dot {
    position: absolute;
    width: 8px; height: 8px;
    background: #E8C547;
    border-radius: 50%;
    z-index: 2;
    box-shadow: 0 0 0 2px #f5ead0, 0 0 12px rgba(232,197,71,0.7);
  }
  .cd-tl { top: 18px; left: 18px; }
  .cd-tr { top: 18px; right: 18px; }
  .cd-bl { bottom: 18px; left: 18px; }
  .cd-br { bottom: 18px; right: 18px; }

  /* Subtle paper grain */
  .grain {
    position: absolute;
    inset: 0;
    border-radius: 6px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.35;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(160,110,50,0.08) 0%, transparent 30%),
      radial-gradient(circle at 75% 60%, rgba(160,110,50,0.06) 0%, transparent 35%),
      radial-gradient(circle at 50% 85%, rgba(160,110,50,0.07) 0%, transparent 40%);
  }

  /* Tiny scattered dots (storybook stars) */
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: #E8C547;
    border-radius: 50%;
    opacity: 0.6;
    z-index: 1;
  }

  /* ============ PHOTO WINDOW (transparent center) ============ */
  .photo-window {
    position: absolute;
    inset: 50px;
    background: transparent;
    border-radius: 2px;
    z-index: 2;
    box-shadow:
      inset 0 0 0 1px rgba(232,197,71,0.4),
      inset 0 4px 30px rgba(0,0,0,0.08);
    background-image:
      linear-gradient(45deg, rgba(232,197,71,0.03) 25%, transparent 25%, transparent 75%, rgba(232,197,71,0.03) 75%),
      linear-gradient(45deg, rgba(232,197,71,0.03) 25%, transparent 25%, transparent 75%, rgba(232,197,71,0.03) 75%);
    background-size: 30px 30px;
    background-position: 0 0, 15px 15px;
  }

  /* Inner corner ornaments on photo window */
  .photo-window::before,
  .photo-window::after {
    content: '';
    position: absolute;
    width: 28px;
    height: 28px;
    border: 1.5px solid #E8C547;
    opacity: 0.5;
  }
  .photo-window::before {
    top: 8px; left: 8px;
    border-right: none;
    border-bottom: none;
  }
  .photo-window::after {
    bottom: 8px; right: 8px;
    border-left: none;
    border-top: none;
  }

  /* ============ TITLE ============ */
  .title-wrap {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  .title-wrap .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .title-wrap .ornament .line {
    width: 50px;
    height: 1px;
    background: linear-gradient(to right, transparent, #E8C547, transparent);
  }
  .title-wrap .ornament .leaf {
    width: 10px; height: 10px;
    background: #E8C547;
    transform: rotate(45deg);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(232,197,71,0.6);
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: #5c3a1a;
    letter-spacing: 1.5px;
    line-height: 1;
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
  }
  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 11px;
    color: #a07840;
    letter-spacing: 3px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ============ CHARACTER BASE ============ */
  .character {
    position: absolute;
    width: 110px;
    height: 110px;
    z-index: 6;
    filter: drop-shadow(0 6px 12px rgba(80,40,10,0.35));
  }
  .char-tl { top: 32px; left: 32px; }
  .char-tr { top: 32px; right: 32px; }
  .char-bl { bottom: 130px; left: 32px; }
  .char-br { bottom: 130px; right: 32px; }

  .character svg { width: 100%; height: 100%; overflow: visible; }

  /* Honey drip decoration */
  .honey-drip {
    position: absolute;
    width: 14px;
    background: linear-gradient(to bottom, #E8C547, #d4a574);
    border-radius: 7px 7px 50% 50%;
    z-index: 3;
    opacity: 0.7;
  }

  /* Leaf decorations */
  .leaf-deco {
    position: absolute;
    z-index: 3;
    opacity: 0.55;
  }
</style>
</head>
<body>

<div class="frame">
  <div class="grain"></div>

  <!-- Corner golden dots -->

  <div class="corner-dot cd-tr"></div>

  <!-- ============ POOH (top-left) ============ -->

      <!-- Right ear -->

      <circle cx="72" cy="28" r="5" fill="#d4902a"/>

      <circle cx="58" cy="46" r="2.2" fill="#2a1505"/>

      <circle cx="58.6" cy="45.4" r="0.7" fill="#fff"/>

      <!-- Body peeking (pink stripes shirt hint) -->
      <ellipse cx="50" cy="92" rx="26" ry="7" fill="#d49a9a" opacity="0.6"/>

    <svg viewBox="0 0 100 100">

      <ellipse cx="30" cy="31" rx="5" ry="7" fill="#3a1a08"/>
      <!-- Right ear -->

        <path d="M 62 32 Q 64 37 61 40 Q 59 37 62 32"/>
        <path d="M 32 50 Q 28 52 30 56 Q 33 54 32 50"/>

      <circle cx="58" cy="50" r="2.5" fill="#fff"/>

  <!-- ============ EEYORE (bottom-right) ============ -->
