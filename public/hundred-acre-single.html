<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hundred Acre Gang — A Photobooth Memory</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,700;9..144,900&family=Caveat:wght@400;700&display=swap');

:root {
  --honey: #E8C547;
  --honey-deep: #C99A2E;
  --cream: #FFFAF0;
  --cream-2: #F4E6CC;
  --chocolate: #4A2515;
  --chocolate-deep: #2D1407;
  --warm-paper: #F5E4C3;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: #1F0E04;
  font-family: 'Fraunces', serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  overflow-x: hidden;
}

/* Paper noise + warm tonal shifts via repeating gradients */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    repeating-linear-gradient(127deg, transparent 0 3px, rgba(74,37,21,0.022) 3px 4px),
    repeating-linear-gradient(63deg, transparent 0 2px, rgba(232,197,71,0.028) 2px 3px),
    repeating-linear-gradient(31deg, transparent 0 5px, rgba(201,154,46,0.018) 5px 6px),
    repeating-linear-gradient(89deg, transparent 0 7px, rgba(45,20,7,0.015) 7px 8px);
}

body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(232,197,71,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(201,154,46,0.08) 0%, transparent 55%);
  filter: contrast(1.05) saturate(1.1);
}

.stage {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 1120px;
}

/* ============ OUTER FRAME ============ */
.frame {
  position: relative;
  background: var(--cream);
  padding: 26px;
  border: 3px solid var(--chocolate);
  border-radius: 6px;
  box-shadow:
    0 0 0 1px var(--honey-deep) inset,
    0 0 0 6px var(--chocolate-deep),
    0 0 0 8px var(--honey),
    0 30px 70px -20px rgba(0,0,0,0.85),
    0 10px 30px -10px rgba(232,197,71,0.4);
  background-image:
    radial-gradient(circle at 12% 18%, rgba(232,197,71,0.16) 0%, transparent 30%),
    radial-gradient(circle at 88% 82%, rgba(201,154,46,0.18) 0%, transparent 30%),
    radial-gradient(circle at 50% 50%, rgba(255,250,240,1) 0%, var(--cream-2) 100%);
}

/* Subtle ink-stain mottling on frame */
.frame::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='5'/><feColorMatrix values='0 0 0 0 0.29  0 0 0 0 0.15  0 0 0 0 0.08  0 0 0 0.09 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  mix-blend-mode: multiply;
  opacity: 0.55;
  pointer-events: none;
}

/* Double inner border (hand-drawn feel) */
.inner-border {
  position: relative;
  border: 1.5px dashed var(--chocolate);
  border-radius: 3px;
  padding: 10px;
}

.inner-border::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid var(--honey-deep);
  border-radius: 2px;
  pointer-events: none;
}

/* ============ PHOTO WELL ============ */
.photo-well {
  position: relative;
  aspect-ratio: 4 / 3;
  width: 100%;
  background: var(--chocolate-deep);
  border: 2px solid var(--chocolate);
  border-radius: 2px;
  overflow: hidden;
  box-shadow: 
    inset 0 0 60px rgba(0,0,0,0.6),
    inset 0 0 0 4px var(--cream),
    inset 0 0 0 5px var(--chocolate);
}

/* The actual photo */
.photo-well::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("https://picsum.photos/seed/hundred-acre-meadow/1400/1050");
  background-size: cover;
  background-position: center;
  filter: sepia(0.35) saturate(1.15) contrast(1.08) brightness(0.95);
  transition: filter 0.4s ease;
}

/* Warm vignette over photo */
.photo-well::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at center, transparent 40%, rgba(45,20,7,0.5) 100%),
    radial-gradient(ellipse at 50% 100%, rgba(232,197,71,0.18) 0%, transparent 60%);
  pointer-events: none;
}

/* ============ CHARACTER CORNERS ============ */
.character {
  position: absolute;
  width: 235px;
  height: 295px;
  pointer-events: none;
  filter: drop-shadow(0 8px 12px rgba(45,20,7,0.45));
  z-index: 5;
  transition: transform 0.4s cubic-bezier(.2,.9,.3,1.2);
}

.character:hover { transform: scale(1.03) rotate(0deg) !important; }

.character svg { width: 100%; height: 100%; display: block; overflow: visible; }

/* Corner positions — overlap photo edges */
.char-tl { top: -55px; left: -45px; transform: rotate(-4deg); }
.char-tr { top: -55px; right: -45px; transform: rotate(4deg) scaleX(-1); }
.char-bl { bottom: -55px; left: -45px; transform: rotate(4deg) scaleY(-1); }
.char-br { bottom: -55px; right: -45px; transform: rotate(-4deg) scale(-1,-1); }

/* Name tags */
.name-tag {
  position: absolute;
  background: var(--cream);
  border: 1.5px solid var(--chocolate);
  padding: 3px 12px 4px;
  font-family: 'Caveat', cursive;
  font-size: 19px;
  font-weight: 700;
  color: var(--chocolate);
  letter-spacing: 0.5px;
  border-radius: 1px;
  z-index: 7;
  box-shadow: 2px 2px 0 var(--honey-deep);
  white-space: nowrap;
}

.name-tag::before {
  content: '';
  position: absolute;
  width: 30px; height: 1px;
  background: var(--chocolate);
  top: 50%;
}

.char-tl .name-tag { right: -10px; bottom: 18px; transform: rotate(-3deg); }
.char-tl .name-tag::before { left: -34px; }
.char-tr .name-tag { left: -10px; bottom: 18px; transform: rotate(3deg); }
.char-tr .name-tag::before { right: -34px; }
.char-bl .name-tag { right: -10px; top: 18px; transform: rotate(3deg); }
.char-bl .name-tag::before { left: -34px; }
.char-br .name-tag { left: -10px; top: 18px; transform: rotate(-3deg); }
.char-br .name-tag::before { right: -34px; }

/* ============ TITLE ============ */
.title-wrap {
  position: absolute;
  top: -55px;
  left: 50%;
  transform: translateX(-50%) rotate(-1.2deg);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
}

.banner-ribbon {
  position: relative;
  padding: 14px 64px 12px;
  background: var(--honey);
  border: 2.5px solid var(--chocolate);
  border-radius: 2px;
  box-shadow: 
    0 6px 0 var(--chocolate-deep),
    inset 0 1px 0 rgba(255,255,255,0.5),
    inset 0 -2px 0 var(--honey-deep);
}

.banner-ribbon::before,
.banner-ribbon::after {
  content: '';
  position: absolute;
  top: 100%;
  width: 0; height: 0;
  border: 12px solid transparent;
}
.banner-ribbon::before {
  left: -8px;
  border-top-color: var(--chocolate);
  border-right: 12px solid var(--chocolate);
}
.banner-ribbon::after {
  right: -8px;
  border-top-color: var(--chocolate);
  border-left: 12px solid var(--chocolate);
}

/* Ribbon tails */
.ribbon-tail {
  position: absolute;
  top: 6px;
  height: 64px;
  width: 36px;
  background: var(--honey);
  border: 2.5px solid var(--chocolate);
}
.ribbon-tail.left {
  left: -28px;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
  transform: rotate(-4deg);
}
.ribbon-tail.right {
  right: -28px;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
  transform: rotate(4deg);
}

.banner-title {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: clamp(28px, 4.4vw, 48px);
  letter-spacing: 0.06em;
  color: var(--chocolate);
  text-transform: uppercase;
  text-shadow: 1px 1px 0 rgba(255,250,240,0.6);
  font-variation-settings: 'opsz' 144, 'SOFT' 100;
}

.banner-sub {
  font-family: 'Caveat', cursive;
  font-size: 17px;
  color: var(--chocolate-deep);
  margin-top: 6px;
  letter-spacing: 0.5px;
  opacity: 0.75;
  transform: rotate(1deg);
}

/* ============ DATE STAMP ============ */
.date-stamp {
  position: absolute;
  bottom: -52px;
  left: 50%;
  transform: translateX(-50%) rotate(1.5deg);
  display: flex;
  gap: 22px;
  align-items: center;
  z-index: 6;
  font-family: 'Fraunces', serif;
  font-weight: 500;
  color: var(--cream);
}

.date-chip {
  background: var(--chocolate-deep);
  border: 1.5px solid var(--honey);
  padding: 5px 14px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 10.5px;
  border-radius: 1px;
}

.date-ornament {
  width: 28px;
  height: 1px;
  background: var(--honey);
  position: relative;
}
.date-ornament::before, .date-ornament::after {
  content: '';
  position: absolute;
  width: 5px; height: 5px;
  background: var(--honey);
  border-radius: 50%;
  top: -2px;
}
.date-ornament::before { left: -2px; }
.date-ornament::after { right: -2px; }

/* ============ POLLEN / FLOATING DOTS ============ */
.pollen {
  position: absolute;
  width: 100%; height: 100%;
  inset: 0;
  pointer-events: none;
  z-index: 4;
  overflow: hidden;
}
.pollen span {
  position: absolute;
  background: var(--honey);
  border-radius: 50%;
  opacity: 0.6;
  filter: blur(0.6px);
  animation: drift linear infinite;
}
@keyframes drift {
  0% { transform: translate(0, 100vh) scale(0.5); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.5; }
  100% { transform: translate(60px, -10vh) scale(1.1); opacity: 0; }
}

/* Decorative leaves/botanicals scattered */
.botanical {
  position: absolute;
  opacity: 0.5;
  pointer-events: none;
  z-index: 3;
}

/* Caption plate at the bottom of the photo */
.caption-plate {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%) rotate(-0.5deg);
  background: rgba(45,20,7,0.78);
  backdrop-filter: blur(2px);
  border: 1px solid var(--honey);
  padding: 7px 22px;
  color: var(--cream);
  font-family: 'Caveat', cursive;
  font-size: 19px;
  letter-spacing: 0.4px;
  z-index: 6;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(0,0,0,0.4);
}

.caption-plate::before {
  content: '✦';
  color: var(--honey);
  margin-right: 10px;
  font-size: 13px;
}
.caption-plate::after {
  content: '✦';
  color: var(--honey);
  margin-left: 10px;
  font-size: 13px;
}

/* Honey drip accents */
.drip {
  position: absolute;
  width: 10px;
  background: var(--honey);
  border: 1.5px solid var(--chocolate);
  border-top: none;
  z-index: 6;
}
.drip.d1 { top: -2px; left: 18%; height: 28px; border-radius: 0 0 50% 50%; }
.drip.d2 { top: -2px; right: 22%; height: 22px; border-radius: 0 0 50% 50%; }
.drip.d3 { top: -2px; left: 38%; height: 16px; border-radius: 0 0 50% 50%; }

@media (max-width: 720px) {
  .character { width: 140px; height: 175px; }
  .char-tl, .char-tr { top: -32px; }
  .char-bl, .char-br { bottom: -32px; }
  .char-tl, .char-bl { left: -28px; }
  .char-tr, .char-br { right: -28px; }
  .name-tag { font-size: 14px; padding: 2px 8px; }
  .title-wrap { top: -42px; }
  .banner-ribbon { padding: 10px 30px 8px; }
  .date-stamp { bottom: -42px; gap: 12px; }
  .caption-plate { font-size: 14px; padding: 5px 14px; }
}
</style>
</head>
<body>

<div class="stage">
  <div class="frame">

    <!-- Floating pollen motes -->
    <div class="pollen" aria-hidden="true">
      <span style="left:8%;width:3px;height:3px;animation-duration:18s;animation-delay:0s;"></span>
      <span style="left:18%;width:2px;height:2px;animation-duration:22s;animation-delay:3s;"></span>
      <span style="left:32%;width:4px;height:4px;animation-duration:16s;animation-delay:6s;"></span>
      <span style="left:45%;width:2px;height:2px;animation-duration:24s;animation-delay:2s;"></span>
      <span style="left:58%;width:3px;height:3px;animation-duration:19s;animation-delay:8s;"></span>
      <span style="left:71%;width:2px;height:2px;animation-duration:21s;animation-delay:1s;"></span>
      <span style="left:84%;width:4px;height:4px;animation-duration:17s;animation-delay:5s;"></span>
      <span style="left:92%;width:2px;height:2px;animation-duration:23s;animation-delay:9s;"></span>
      <span style="left:25%;width:2px;height:2px;animation-duration:20s;animation-delay:11s;"></span>
      <span style="left:65%;width:3px;height:3px;animation-duration:18s;animation-delay:13s;"></span>
    </div>

    <!-- Honey drips from top -->
    <div class="drip d1"></div>
    <div class="drip d2"></div>
    <div class="drip d3"></div>

    <!-- ============ TITLE RIBBON ============ -->
    <div class="title-wrap">
      <div class="banner-ribbon">
        <span class="ribbon-tail left"></span>
        <span class="ribbon-tail right"></span>
        <div class="banner-title">Hundred Acre Gang</div>
      </div>
      <div class="banner-sub">~ a fine &amp; sunny afternoon ~</div>
    </div>

    <!-- ============ INNER BORDER + PHOTO ============ -->
    <div class="inner-border">
      <div class="photo-well">

        <!-- caption plate -->
        <div class="caption-plate">gathered together, as once we were</div>

        <!-- ============================ -->
        <!-- ====== CHARACTERS =========== -->
        <!-- ============================ -->

        <!-- ===== BEAR (top-left) ===== -->
        <div class="character char-tl" aria-label="Bear">
          <svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="bearTex" x="-10%" y="-10%" width="120%" height="120%">
                <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="3"/>
                <feColorMatrix values="0 0 0 0 0.41  0 0 0 0 0.28  0 0 0 0 0.15  0 0 0 0.4 0"/>
                <feComposite in2="SourceGraphic" operator="in"/>
                <feComposite in="SourceGraphic" operator="over"/>
              </filter>
              <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="1"/>
                <feDisplacementMap in="SourceGraphic" scale="1.5"/>
              </filter>
            </defs>
            <g filter="url(#rough)">
              <!-- Ears (back) -->
              <ellipse cx="62" cy="78" rx="22" ry="20" fill="#9A6840" stroke="#2D1407" stroke-width="2.5"/>
              <ellipse cx="62" cy="78" rx="12" ry="11" fill="#D9A678" stroke="#2D1407" stroke-width="1"/>
              <ellipse cx="178" cy="78" rx="22" ry="20" fill="#9A6840" stroke="#2D1407" stroke-width="2.5"/>
              <ellipse cx="178" cy="78" rx="12" ry="11" fill="#D9A678" stroke="#2D1407" stroke-width="1"/>
              
              <!-- Body chunk -->
              <path d="M 50 270 Q 30 200 45 160 Q 55 130 120 130 Q 185 130 195 160 Q 210 200 190 270 Q 120 285 50 270 Z" 
                    fill="#B8845A" stroke="#2D1407" stroke-width="2.8"/>
              
              <!-- Body texture (fur strokes) -->
              <g stroke="#7A4F2B" stroke-width="0.8" fill="none" opacity="0.55">
                <path d="M 70 200 q 4 -4 8 0"/>
                <path d="M 85 220 q 4 -4 8 0"/>
                <path d="M 100 200 q 4 -4 8 0"/>
                <path d="M 130 220 q 4 -4 8 0"/>
                <path d="M 150 200 q 4 -4 8 0"/>
                <path d="M 165 230 q 4 -4 8 0"/>
                <path d="M 75 240 q 4 -4 8 0"/>
                <path d="M 110 250 q 4 -4 8 0"/>
                <path d="M 145 250 q 4 -4 8 0"/>
                <path d="M 175 240 q 4 -4 8 0"/>
              </g>
              
              <!-- Head -->
              <ellipse cx="120" cy="80" rx="58" ry="52" fill="#B8845A" stroke="#2D1407" stroke-width="2.8"/>
              
              <!-- Head fur texture -->
              <g stroke="#7A4F2B" stroke-width="0.7" fill="none" opacity="0.5">

                <path d="M 155 95 q 3 -3 6 0"/>
              </g>
              
              <!-- Snout/muzzle -->
              <ellipse cx="120" cy="100" rx="32" ry="24" fill="#E8C9A0" stroke="#2D1407" stroke-width="2"/>
              
              <!-- Nose -->
              <ellipse cx="120" cy="92" rx="9" ry="7" fill="#2D1407"/>
              <ellipse cx="117" cy="90" rx="2.5" ry="2" fill="#5A3A20"/>
              
              <!-- Mouth -->
              <path d="M 120 102 Q 120 112 110 116 M 120 102 Q 120 112 130 116" 
                    stroke="#2D1407" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M 110 116 Q 105 121 100 118" stroke="#2D1407" stroke-width="1.5" fill="none"/>
              
              <!-- Eyes (small friendly) -->

              <ellipse cx="142" cy="72" rx="5" ry="6" fill="#2D1407"/>
              <circle cx="99.5" cy="70" r="1.8" fill="#FFFAF0"/>
              <circle cx="143.5" cy="70" r="1.8" fill="#FFFAF0"/>
              
              <!-- Eyebrows -->
              <path d="M 90 62 Q 98 58 106 62" stroke="#2D1407" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M 134 62 Q 142 58 150 62" stroke="#2D1407" stroke-width="2" fill="none" stroke-linecap="round"/>
              
              <!-- Cheek blush -->
              <ellipse cx="78" cy="92" rx="7" ry="4" fill="#E8C547" opacity="0.5"/>
              <ellipse cx="162" cy="92" rx="7" ry="4" fill="#E8C547" opacity="0.5"/>
              
              <!-- Arms (left and right) -->
              <path d="M 48 180 Q 30 200 35 230 Q 42 240 55 230 Q 55 200 60 185 Z" 
                    fill="#A07045" stroke="#2D1407" stroke-width="2.5"/>
              <path d="M 192 180 Q 210 200 205 230 Q 198 240 185 230 Q 185 200 180 185 Z" 
                    fill="#A07045" stroke="#2D1407" stroke-width="2.5"/>
            </g>

            <ellipse cx="188" cy="32" rx="9" ry="11" fill="#C84A3F" stroke="#2D1407" stroke-width="1.5"/>
            <ellipse cx="185" cy="28" rx="2" ry="3" fill="#FFFAF0" opacity="0.6"/>
          </svg>
          <div class="name-tag">— Pooh —</div>
        </div>

        <!-- ===== PIGLET (top-right) ===== -->
        <div class="character char-tr" aria-label="Piglet">
          <svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="rough2" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="2"/>
                <feDisplacementMap in="SourceGraphic" scale="1.5"/>

            </defs>

              <path d="M 170 85 Q 175 70 165 70" stroke="#2D1407" stroke-width="1" fill="none"/>
              
              <!-- Body (small, in pink striped onesie) -->
              <path d="M 80 260 Q 75 200 90 175 Q 120 168 150 175 Q 165 200 160 260 Q 120 275 80 260 Z" 
                    fill="#F2B0BD" stroke="#2D1407" stroke-width="2.8"/>
              
              <!-- Onesie stripes -->
              <g stroke="#C84A3F" stroke-width="2" fill="none" opacity="0.55">
                <path d="M 82 210 Q 120 215 158 210"/>
                <path d="M 80 230 Q 120 235 160 230"/>
                <path d="M 80 248 Q 120 253 160 248"/>
              </g>
              
              <!-- Head -->
              <ellipse cx="120" cy="110" rx="58" ry="48" fill="#F5C5CE" stroke="#2D1407" stroke-width="2.8"/>
              
              <!-- Snout -->
              <ellipse cx="120" cy="125" rx="22" ry="16" fill="#F2B0BD" stroke="#2D1407" stroke-width="2"/>
              <ellipse cx="113" cy="125" rx="3" ry="5" fill="#2D1407"/>
              <ellipse cx="127" cy="125" rx="3" ry="5" fill="#2D1407"/>
              
              <!-- Eyes -->
              <ellipse cx="100" cy="100" rx="5" ry="6" fill="#2D1407"/>
              <ellipse cx="140" cy="100" rx="5" ry="6" fill="#2D1407"/>
              <circle cx="101.5" cy="98" r="2" fill="#FFFAF0"/>
              <circle cx="141.5" cy="98" r="2" fill="#FFFAF0"/>
              <!-- Big worried eyes - extra highlights -->
              <circle cx="103" cy="103" r="0.8" fill="#FFFAF0" opacity="0.7"/>
              <circle cx="143" cy="103" r="0.8" fill="#FFFAF0" opacity="0.7"/>
