<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pucca & Garu — Love Never Rests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@500;700&family=Bagel+Fat+One&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root{
    --red: #E8443A;
    --red-deep: #B12B25;
    --red-dark: #7C1A18;
    --red-soft: #F26A60;
    --dark: #1A1A2E;
    --dark-soft: #2D2D44;
    --cream: #FFF4DC;
    --cream-deep: #FFE4B5;
    --pink: #FFB6C1;
    --pink-deep: #FF8FA3;
    --wood: #C99155;
    --wood-deep: #7A4A22;
  }

  html,body{
    min-height:100vh;
    background: 
      radial-gradient(circle at 12% 18%, rgba(232,68,58,.10), transparent 40%),
      radial-gradient(circle at 88% 82%, rgba(255,182,193,.10), transparent 40%),
      repeating-linear-gradient(45deg, #F5E9D3 0 28px, #F2E2C8 28px 56px);
    font-family:'Fredoka',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    color:var(--dark);
    overflow-x:hidden;
  }

  /* Stitched background dotted texture */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(rgba(26,26,46,.06) 1px, transparent 1.4px),
      radial-gradient(rgba(232,68,58,.07) 1px, transparent 1.4px);
    background-size: 22px 22px, 16px 16px;
    background-position: 0 0, 11px 11px;
    pointer-events:none;
    z-index:0;
  }

  .frame{
    position:relative;
    width:900px;
    height:1180px;
    background:var(--cream);
    background-image:
      repeating-linear-gradient(0deg,
        transparent 0 39px,
        rgba(232,68,58,.04) 39px 40px),
      repeating-linear-gradient(90deg,
        transparent 0 39px,
        rgba(232,68,58,.04) 39px 40px),
      linear-gradient(135deg, #FFF6DE 0%, #FFE7BD 100%);
    border-radius:28px;
    box-shadow:
      inset 0 0 0 6px var(--cream),
      inset 0 0 0 9px var(--red),
      inset 0 0 0 13px var(--cream),
      inset 0 0 0 17px var(--dark),
      inset 0 0 0 20px var(--pink),
      inset 0 0 60px rgba(232,68,58,.12),
      0 30px 60px -20px rgba(124,26,24,.45),
      0 10px 25px -10px rgba(26,26,46,.3);
    padding:55px;
    z-index:1;
  }

  /* dashed inner playful border */
  .frame::after{
    content:'';
    position:absolute;
    inset:32px;
    border:2px dashed var(--red);
    border-radius:18px;
    opacity:.5;
    pointer-events:none;
  }

  /* Corner decorative starbursts */
  .corner-deco{
    position:absolute;
    width:38px;
    height:38px;
    background:
      radial-gradient(circle, var(--red) 0 4px, transparent 5px),
      conic-gradient(from 0deg,
        var(--red) 0 12.5%, var(--dark) 12.5% 25%,
        var(--red) 25% 37.5%, var(--dark) 37.5% 50%,
        var(--red) 50% 62.5%, var(--dark) 62.5% 75%,
        var(--red) 75% 87.5%, var(--dark) 87.5% 100%);
    border-radius:50%;
    -webkit-mask:
      radial-gradient(circle, #0000 7px, #000 8px) center/8px 8px,
      conic-gradient(#000 0 100%);
  }

  .corner-deco.tl{ top:50px; left:50px; }
  .corner-deco.tr{ top:50px; right:50px; }
  .corner-deco.bl{ bottom:130px; left:50px; }
  .corner-deco.br{ bottom:130px; right:50px; }

  /* ===== TITLE BANNER ===== */
  .banner{
    height:90px;
    margin-bottom:0;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .banner-bg{
    position:absolute;
    width:100%;
    height:80px;
    background:var(--red);
    background-image:
      repeating-linear-gradient(45deg,
        transparent 0 10px,
        rgba(0,0,0,.12) 10px 20px),
      linear-gradient(180deg, var(--red-soft), var(--red), var(--red-deep));
    border:4px solid var(--dark);
    border-radius:50% 50% 8px 8px / 80% 80% 8px 8px;
    box-shadow:
      inset 0 -8px 0 rgba(0,0,0,.2),
      inset 0 4px 0 rgba(255,255,255,.25),
      0 6px 0 var(--dark);
    transform:rotate(-1.2deg);
  }

  .banner-text{
    position:relative;
    font-family:'Bagel Fat One', cursive;
    font-size:56px;
    color:var(--cream);
    letter-spacing:2px;
    text-shadow:
      -2px -2px 0 var(--dark),
      2px -2px 0 var(--dark),
      -2px 2px 0 var(--dark),
      2px 2px 0 var(--dark),
      0 -2px 0 var(--dark),
      0 2px 0 var(--dark),
      -2px 0 0 var(--dark),
      2px 0 0 var(--dark),
      5px 5px 0 var(--dark),
      8px 8px 0 var(--red-dark);
    transform:rotate(-1.2deg) translateY(-2px);
    z-index:2;
  }

  .banner-amp{
    color:var(--pink);
    font-style:italic;
    font-family:'Bagel Fat One', cursive;
    display:inline-block;
    transform:rotate(8deg);
    margin:0 4px;
  }

  .banner-heart{
    position:absolute;
    width:36px;
    height:34px;
    top:14px;
    right:60px;
    background:var(--pink);
    transform:rotate(-15deg);
    z-index:3;
    filter:drop-shadow(2px 2px 0 var(--dark));
    animation:beat 1s ease-in-out infinite;
  }
  .banner-heart::before,
  .banner-heart::after{
    content:'';position:absolute;
    width:18px;height:27px;
    background:var(--pink);
    border-radius:18px 18px 0 0;
    top:0;
  }
  .banner-heart::before{left:0;transform:rotate(-45deg);transform-origin:50% 100%;}
  .banner-heart::after{right:0;transform:rotate(45deg);transform-origin:50% 100%;}

  @keyframes beat{
    0%,100%{transform:rotate(-15deg) scale(1);}
    50%{transform:rotate(-15deg) scale(1.18);}
  }

  /* ===== SUBTITLE RIBBON ===== */
  .subtitle{
    margin-top:14px;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    position:relative;
  }
  .subtitle-dash{
    width:80px;
    height:3px;
    background:repeating-linear-gradient(90deg, var(--dark) 0 6px, transparent 6px 12px);
  }
  .subtitle-text{
    font-family:'Caveat', cursive;
    font-size:30px;
    font-weight:700;
    color:var(--red);
    letter-spacing:1px;
    transform:rotate(-1deg);
    text-shadow:1px 1px 0 var(--dark);
  }

  /* ===== CHARACTER ROW ===== */
  .char-row{
    height:160px;
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    padding:0 10px;
  }

  /* ===================================================== */
  /* ============== PUCCA (TOP-LEFT) ===================== */
  /* ===================================================== */
  .pucca{
    position:relative;
    width:140px;
    height:150px;
    animation:puccaSway 2.4s ease-in-out infinite;
    transform-origin:center bottom;
  }
  @keyframes puccaSway{
    0%,100%{transform:rotate(-2deg) translateY(0);}
    50%{transform:rotate(2deg) translateY(-3px);}
  }

  .pucca-hair-back{
    position:absolute;
    top:18px;left:50%;
    transform:translateX(-50%);
    width:120px;height:70px;
    background:var(--dark);
    background-image:
      radial-gradient(circle at 30% 40%, rgba(255,255,255,.06) 1px, transparent 2px),
      radial-gradient(circle at 70% 50%, rgba(255,255,255,.06) 1px, transparent 2px);
    background-size:8px 8px;
    border-radius:60% 60% 50% 50%;
    border:3px solid var(--dark);
    box-shadow:inset 0 -6px 0 rgba(0,0,0,.3);
  }

  /* Pucca pigtails (cinnamon buns) */
  .pigtail{
    position:absolute;
    top:8px;
    width:54px;height:54px;
    background:var(--dark);
    border-radius:50%;
    border:3px solid var(--dark);
    box-shadow:
      inset 0 0 0 6px transparent,
      inset 0 -4px 6px rgba(255,255,255,.08),
      inset 0 4px 6px rgba(0,0,0,.4);
  }
  .pigtail::before{
    content:'';position:absolute;
    inset:7px;
    border-radius:50%;
    border:2.5px solid rgba(255,255,255,.15);
    box-shadow:inset 0 0 0 2px transparent;
  }
  .pigtail::after{
    content:'';position:absolute;
    inset:14px;
    border-radius:50%;
    border:2px dotted rgba(255,255,255,.18);
  }
  .pigtail.left{
    left:-22px;
    transform:rotate(-15deg);
    animation:pigtailSwing 1.8s ease-in-out infinite;
  }
  .pigtail.right{
    right:-22px;
    transform:rotate(15deg);
    animation:pigtailSwing 1.8s ease-in-out infinite reverse;
  }
  @keyframes pigtailSwing{
    0%,100%{transform:rotate(-15deg) translateY(0);}
    50%{transform:rotate(-8deg) translateY(-2px);}
  }

  /* Hair ties (red bows on pigtails) */
  .hair-tie{
    position:absolute;
    top:6px;
    width:14px;height:14px;
    background:var(--red);
    border-radius:50%;
    border:2px solid var(--dark);
    z-index:5;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);
  }
  .hair-tie.left{ left:-2px; }
  .hair-tie.right{ right:-2px; }

  /* Face */
  .pucca-face{
    position:absolute;
    top:32px;
    left:50%;
    transform:translateX(-50%);
    width:80px;height:68px;
    background:linear-gradient(180deg, #FFE0C0 0%, #F5C49A 100%);
    border-radius:48% 48% 45% 45%;
    border:3px solid var(--dark);
    z-index:3;
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.12);
  }

  /* Blush cheeks */
  .pucca-face::before{
    content:'';
    position:absolute;
    top:32px;left:8px;
    width:14px;height:8px;
    background:rgba(255,107,107,.5);
    border-radius:50%;
  }
  .pucca-face::after{
    content:'';
    position:absolute;
    top:32px;right:8px;
    width:14px;height:8px;
    background:rgba(255,107,107,.5);
    border-radius:50%;
  }

  /* Pucca's signature closed squinty eyes (happy/in-love) */
  .pucca-eye{
    position:absolute;
    top:24px;
    width:18px;height:9px;
    border-bottom:4px solid var(--dark);
    border-radius:0 0 60% 60% / 0 0 100% 100%;
    z-index:4;
  }
  .pucca-eye.left{ left:14px; transform:rotate(-4deg); }
  .pucca-eye.right{ right:14px; transform:rotate(4deg); }
  .pucca-eye::after{
    content:'';
    position:absolute;
    top:-1px;
    left:2px;
    width:5px;height:2px;
    background:rgba(255,255,255,.6);
    border-radius:50%;
  }

  /* Mouth - sweet smile */
  .pucca-mouth{
    position:absolute;
    top:48px;
    left:50%;
    transform:translateX(-50%);
    width:18px;height:10px;
    background:var(--red-deep);
    border:2px solid var(--dark);
    border-radius:0 0 50% 50%;
    z-index:4;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);
  }

  /* Body — Red top */
  .pucca-body{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:84px;height:55px;
    background:var(--red);
    background-image:
      repeating-linear-gradient(45deg,
        transparent 0 8px,
        rgba(0,0,0,.06) 8px 16px);
    border:3px solid var(--dark);
    border-radius:40% 40% 8% 8% / 30% 30% 8% 8%;
    z-index:2;
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,.2),
      inset 0 -6px 0 rgba(0,0,0,.2);
  }

  /* Dress pattern dots */
  .pucca-body::before{
    content:'';
    position:absolute;
    top:8px;left:50%;
    transform:translateX(-50%);
    width:6px;height:6px;
    background:var(--pink);
    border-radius:50%;
    box-shadow:
      -16px 8px 0 var(--cream),
      16px 8px 0 var(--cream),
      -10px 22px 0 var(--pink),
      10px 22px 0 var(--pink),
      0 32px 0 var(--cream);
  }

  /* Collar */
  .pucca-body::after{
    content:'';
    position:absolute;
    top:-4px;left:50%;
    transform:translateX(-50%);
    width:42px;height:8px;
    background:var(--cream);
    border:2.5px solid var(--dark);
    border-radius:50%;
  }

  /* Tiny arms */
  .pucca-arm{
    position:absolute;
    width:14px;height:28px;
    background:var(--red);
    border:3px solid var(--dark);
    border-radius:8px;
    bottom:30px;
    z-index:1;
  }
  .pucca-arm.left{ left:14px; transform:rotate(-20deg); transform-origin:top center; }
  .pucca-arm.right{ right:14px; transform:rotate(20deg); transform-origin:top center; }

  /* Heart Pucca holds */
  .pucca-heart{
    position:absolute;
    width:20px;height:18px;
    top:62px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
    animation:beat 0.8s ease-in-out infinite;
  }
  .pucca-heart::before,
  .pucca-heart::after{
    content:'';position:absolute;
    width:10px;height:15px;
    background:var(--red);
    border:2px solid var(--dark);
    border-radius:10px 10px 0 0;
    top:0;
  }
  .pucca-heart::before{left:0;transform:rotate(-45deg);transform-origin:50% 100%;}
  .pucca-heart::after{right:0;transform:rotate(45deg);transform-origin:50% 100%;}

  /* Pucca's name tag */
  .name-tag{
    position:absolute;
    bottom:-12px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Bagel Fat One', cursive;
    font-size:14px;
    color:var(--cream);
    background:var(--dark);
    padding:3px 10px;
    border-radius:10px;
    border:2px solid var(--cream);
    box-shadow:0 2px 0 var(--red);
    letter-spacing:1px;
    white-space:nowrap;
    z-index:10;
  }

  /* ===================================================== */
  /* ================ GARU (TOP-RIGHT) =================== */
  /* ===================================================== */
  .garu{
    position:relative;
    width:140px;
    height:150px;
    transform:rotate(3deg);
    animation:garuHover 3s ease-in-out infinite;
  }
  @keyframes garuHover{
    0%,100%{transform:rotate(3deg) translateY(0);}
    50%{transform:rotate(3deg) translateY(-2px);}
  }

  /* Garu's ninja hood (dark) */
  .garu-hood{
    position:absolute;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    width:96px;
    height:62px;
    background:var(--dark);
    background-image:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.05) 1px, transparent 2px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,.05) 1px, transparent 2px);
    background-size:6px 6px;
    border-radius:55% 55% 30% 30% / 70% 70% 30% 30%;
    border:3px solid #000;
    z-index:2;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.3);
  }

  /* Hood side flaps */
  .garu-hood::before{
    content:'';position:absolute;
    top:24px;left:-8px;
    width:18px;height:30px;
    background:var(--dark);
    border:3px solid #000;
    border-right:none;
    border-radius:40% 0 0 50%;
  }
  .garu-hood::after{
    content:'';position:absolute;
    top:24px;right:-8px;
    width:18px;height:30px;
    background:var(--dark);
    border:3px solid #000;
    border-left:none;
    border-radius:0 40% 50% 0;
  }

  /* Hair spike sticking up */
  .garu-hair-spike{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%) rotate(-3deg);
    width:0;
    height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-bottom:30px solid var(--dark);
    z-index:3;
    filter:drop-shadow(0 -1px 0 rgba(255,255,255,.1));
  }
  .garu-hair-spike::before{
    content:'';position:absolute;
    top:6px;left:-8px;
    width:0;height:0;
    border-left:9px solid transparent;
    border-right:9px solid transparent;
    border-bottom:22px solid var(--dark-soft);
  }

  /* Face */
  .garu-face{
    position:absolute;
    top:36px;
    left:50%;
    transform:translateX(-50%);
    width:74px;height:58px;
    background:linear-gradient(180deg, #FFE0C0 0%, #F5C49A 100%);
    border-radius:48% 48% 42% 42%;
    border:3px solid var(--dark);
    z-index:3;
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.12);
  }

  /* Garu's determined eyes */
  .garu-eye{
    position:absolute;
    top:18px;
    width:11px;height:13px;
    background:var(--dark);
    border-radius:50%;
    border:2px solid var(--dark);
    z-index:4;
  }
  .garu-eye.left{ left:14px; }
  .garu-eye.right{ right:14px; }
  .garu-eye::after{
    content:'';position:absolute;
    top:2px;left:2px;
    width:3px;height:3px;
    background:#fff;
    border-radius:50%;
  }

  /* Eyebrows (stern look) */
  .garu-brow{
    position:absolute;
    top:12px;
    width:14px;height:3px;
    background:var(--dark);
    border-radius:2px;
    z-index:5;
  }
  .garu-brow.left{ left:12px; transform:rotate(-18deg); }
  .garu-brow.right{ right:12px; transform:rotate(18deg); }

  /* Mouth - small serious line */
  .garu-mouth{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    width:12px;height:3px;
    background:var(--dark);
    border-radius:2px;
    z-index:4;
  }

  /* Body — dark ninja outfit */
  .garu-body{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:80px;height:55px;
    background:var(--dark);
    background-image:
      repeating-linear-gradient(90deg,
        transparent 0 6px,
        rgba(255,255,255,.04) 6px 7px),
      linear-gradient(180deg, var(--dark-soft), var(--dark));
    border:3px solid #000;
    border-radius:35% 35% 8% 8% / 25% 25% 8% 8%;
    z-index:2;
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,.08),
      inset 0 -6px 0 rgba(0,0,0,.3);
  }

  /* Red belt sash */
  .garu-body::before{
    content:'';position:absolute;
    top:24px;left:-3px;right:-3px;
    height:8px;
    background:var(--red);
    background-image:repeating-linear-gradient(45deg,
      transparent 0 4px,
      rgba(0,0,0,.15) 4px 8px);
    border-top:2px solid #000;
    border-bottom:2px solid #000;
  }
  .garu-body::after{
    content:'';position:absolute;
    top:30px;left:50%;
    transform:translateX(-50%);
    width:10px;height:14px;
    background:var(--red);
    border:2px solid #000;
    border-radius:2px;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);
  }

  /* Wood sword (always on back) */
  .garu-sword{
    position:absolute;
    top:60px;
    right:14px;
    width:8px;height:90px;
    background:
      linear-gradient(90deg,
        var(--wood-deep) 0%,
        var(--wood) 30%,
        var(--wood) 70%,
        var(--wood-deep) 100%);
    background-image:
      repeating-linear-gradient(0deg,
        transparent 0 6px,
        rgba(0,0,0,.15) 6px 7px),
      linear-gradient(90deg,
        var(--wood-deep), var(--wood) 50%, var(--wood-deep));
    border:2px solid var(--wood-deep);
    border-radius:2px;
    transform:rotate(-28deg);
    transform-origin:bottom center;
    z-index:1;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.2);
  }
  .garu-sword::before{
    /* sword hilt wrap */
    content:'';
    position:absolute;
    bottom:0;left:-3px;
    width:14px;height:24px;
    background:var(--dark);
    background-image:repeating-linear-gradient(0deg,
      transparent 0 4px,
      rgba(255,255,255,.1) 4px 5px);
    border:2px solid #000;
    border-radius:2px;
  }
  .garu-sword::after{
    /* sword guard */
    content:'';
    position:absolute;
    bottom:24px;left:-5px;
    width:18px;height:6px;
    background:var(--red);
    border:2px solid #000;
    border-radius:1px;
  }

  /* Tiny arms */
  .garu-arm{
    position:absolute;
    width:13px;height:30px;
    background:var(--dark);
    border:3px solid #000;
    border-radius:8px;
    bottom:32px;
    z-index:1;
  }
  .garu-arm.left{ left:16px; transform:rotate(-18deg); }
  .garu-arm.right{ right:16px; transform:rotate(18deg); }

  /* ===== PHOTO BOOTH SLOT ===== */
  .photo-area{
    width:100%;
    height:580px;
    background:#fff;
    background-image:
      repeating-linear-gradient(135deg,
        transparent 0 30px,
        rgba(232,68,58,.03) 30px 31px),
      linear-gradient(180deg, #fff, #FFF8E8);
    border:6px solid var(--dark);
    border-radius:14px;
    position:relative;
    margin:14px 0;
    box-shadow:
      inset 0 0 0 3px var(--cream),
      inset 0 0 0 5px var(--red),
      inset 0 0 30px rgba(0,0,0,.08),
      0 6px 0 var(--dark);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:14px;
  }

  /* film-perforations on photo strip */
  .photo-area::before,
  .photo-area::after{
    content:'';
    position:absolute;
    top:8px;bottom:8px;
    width:18px;
    background:repeating-linear-gradient(0deg,
      var(--dark) 0 8px,
      transparent 8px 18px);
    opacity:.6;
  }
  .photo-area::before{left:-26px;}
  .photo-area::after{right:-26px;}

  .photo-stamp{
    position:absolute;
    top:14px;left:14px;
    width:60px;height:60px;
    border:2.5px dashed var(--red);
    border-radius:50%;
    transform:rotate(-12deg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Bagel Fat One', cursive;
    font-size:10px;
    color:var(--red);
    text-align:center;
    line-height:1.1;
    background:rgba(255,244,220,.8);
  }

  .photo-placeholder{
    font-family:'Caveat', cursive;
    font-size:42px;
    color:var(--red);
    text-align:center;
    line-height:1;
    text-shadow:2px 2px 0 var(--dark);
    transform:rotate(-2deg);
  }
  .photo-sub{
    font-family:'Fredoka',sans-serif;
    font-weight:500;
    color:var(--dark);
    font-size:14px;
    opacity:.6;
    letter-spacing:2px;
    text-transform:uppercase;
  }

  /* date stamp */
  .photo-date{
    position:absolute;
    bottom:14px;right:14px;
    font-family:'Fredoka',sans-serif;
    font-size:11px;
    color:var(--red);
    background:rgba(255,244,220,.85);
    padding:3px 8px;
    border-radius:3px;
    border:1px solid var(--red);
    font-weight:700;
  }

  /* ===== STRIP FOOTER ===== */
  .footer-strip{
    margin-top:10px;
    background:var(--pink);
    background-image:
      repeating-linear-gradient(90deg,
        transparent 0 14px,
        rgba(255,255,255,.4) 14px 16px,
        transparent 16px 28px),
      linear-gradient(180deg, var(--pink), var(--pink-deep));
    border:4px solid var(--dark);
    border-radius:14px;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,.3),
      inset 0 -4px 0 rgba(0,0,0,.15),
      0 5px 0 var(--dark);
    position:relative;
  }

  .footer-strip::before{
    content:'';
    position:absolute;
    top:-8px;
    left:50%;
    transform:translateX(-50%);
    width:30px;height:30px;
    background:var(--red);
    border:3px solid var(--dark);
    border-radius:50%;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.25);
  }
  .footer-strip::after{
    content:'♡';
    position:absolute;
    top:-7px;
    left:50%;
    transform:translateX(-50%);
    font-size:18px;
    color:var(--cream);
    z-index:2;
    text-shadow:1px 1px 0 var(--dark);
  }

  .footer-text{
    font-family:'Bagel Fat One', cursive;
    color:var(--dark);
    font-size:16px;
    letter-spacing:1px;
    flex:1;
  }
  .footer-text.right{ text-align:right; }
  .footer-text small{
    display:block;
    font-family:'Caveat', cursive;
    font-size:14px;
    opacity:.7;
    font-weight:400;
  }

  .footer-icons{
    display:flex;
    gap:6px;
  }
  .footer-icon{
    width:18px;height:18px;
    background:var(--dark);
    border-radius:50%;
    display:inline-block;
  }
  .footer-icon.heart{
    background:var(--red);
    border-radius:0;
    transform:rotate(45deg);
  }
  .footer-icon.heart::before,
  .footer-icon.heart::after{
    content:'';position:absolute;
  }
  .footer-icon.star{
    background:var(--cream);
    -webkit-mask: conic-gradient(from 0deg,
      #000 0 12.5%, transparent 12.5% 25%,
      #000 25% 37.5%, transparent 37.5% 50%,
      #000 50% 62.5%, transparent 62.5% 75%,
      #000 75% 87.5%, transparent 87.5% 100%);
    border-radius:50%;
  }

  /* ===== FLOATING HEARTS ===== */
  .heart-float{
    position:absolute;
    background:var(--red);
    z-index:6;
    animation:floatHeart 4s ease-in-out infinite;
    filter:drop-shadow(2px 2px 0 var(--dark));
  }
  .heart-float::before,
  .heart-float::after{
    content:'';position:absolute;
    background:inherit;
    border-radius:50% 50% 0 0;
  }
  .heart-float::before{
    width:50%;height:80%;
    left:0;top:0;
    transform:rotate(-45deg);
    transform-origin:100% 100%;
    border-top-left-radius:100% 50%;
  }
  .heart-float::after{
    width:50%;height:80%;
    right:0;top:0;
    transform:rotate(45deg);
    transform-origin:0 100%;
    border-top-right-radius:100% 50%;
  }

  /* Heart variants */
  .h1{ width:50px;height:46px; top:155px; left:280px; animation-delay:0s; background:var(--red); }
  .h2{ width:36px;height:33px; top:185px; left:430px; animation-delay:.5s; background:var(--pink); }
  .h3{ width:44px;height:40px; top:148px; left:560px; animation-delay:1s; background:var(--red); }
  .h4{ width:30px;height:28px; top:225px; left:200px; animation-delay:1.5s; background:var(--pink-deep); }
  .h5{ width:58px;height:53px; top:755px; left:30px; animation-delay:.3s; background:var(--red); }
  .h6{ width:34px;height:31px; top:625px; left:30px; animation-delay:.8s; background:var(--pink); }
  .h7{ width:40px;height:36px; top:785px; right:60px; animation-delay:1.2s; background:var(--red-soft); }
  .h8{ width:28px;height:26px; top:685px; right:30px; animation-delay:.6s; background:var(--red); }
  .h9{ width:46px;height:42px; top:880px; left:130px; animation-delay:1.8s; background:var(--pink); }
  .h10{ width:32px;height:30px; top:890px; right:180px; animation-delay:.4s; background:var(--red); }

  @keyframes floatHeart{
    0%,100%{transform:translateY(0) rotate(-8deg) scale(1);}
    25%{transform:translateY(-8px) rotate(6deg) scale(1.05);}
    50%{transform:translateY(-14px) rotate(-4deg) scale(1);}
    75%{transform:translateY(-6px) rotate(10deg) scale(1.08);}
  }

  /* Sparkle accents */
  .sparkle{
    position:absolute;
    width:14px;height:14px;
    z-index:5;
    animation:twinkle 1.5s ease-in-out infinite;
  }
  .sparkle::before,
  .sparkle::after{
    content:'';position:absolute;
    background:var(--red);
    top:50%;left:50%;
    transform:translate(-50%,-50%);
  }
  .sparkle::before{ width:4px;height:14px;border-radius:2px; }
  .sparkle::after{ width:14px;height:4px;border-radius:2px; }

  .s1{ top:340px; left:40px; animation-delay:0s;}
  .s2{ top:520px; right:20px; animation-delay:.5s;}
  .s3{ top:760px; left:280px; animation-delay:1s;}
  .s4{ top:220px; right:90px; animation-delay:.3s; }

  @keyframes twinkle{
    0%,100%{transform:scale(1) rotate(0deg);opacity:1;}
    50%{transform:scale(.4) rotate(45deg);opacity:.3;}
  }

  /* Tape pieces */
  .tape{
    position:absolute;
    width:90px;height:26px;
    background:rgba(255,182,193,.7);
    background-image:repeating-linear-gradient(90deg,
      transparent 0 4px,
      rgba(0,0,0,.06) 4px 5px);
    border:1px dashed rgba(124,26,24,.4);
    z-index:20;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
  }
  .tape.tl-tape{
    top:-12px;left:60px;
    transform:rotate(-8deg);
  }
  .tape.tr-tape{
    top:-10px;right:80px;
    transform:rotate(6deg);
    background:rgba(232,68,58,.4);
  }
  .tape.bl-tape{
    bottom:-10px;left:120px;
    transform:rotate(4deg);
    background:rgba(255,244,220,.8);
  }
  .tape.br-tape{
    bottom:-12px;right:140px;
    transform:rotate(-6deg);
    background:rgba(255,182,193,.7);
  }

  /* doodle scribbles on frame */
  .scribble{
    position:absolute;
    z-index:4;
    pointer-events:none;
  }
  .scribble-kiss{
    top:235px; right:30px;
    font-family:'Caveat', cursive;
    font-size:24px;
    color:var(--red);
    transform:rotate(-15deg);
    text-shadow:1px 1px 0 var(--dark);
  }
  .scribble-bang{
    top:230px; left:30px;
    font-family:'Bagel Fat One', cursive;
    font-size:18px;
    color:var(--dark);
    transform:rotate(-8deg);
    background:var(--pink);
    padding:2px 8px;
    border:2px solid var(--dark);
    border-radius:8px;
    box-shadow:2px 2px 0 var(--dark);
  }

  /* tick marks like a photo strip */
  .tick-row{
    position:absolute;
    bottom:38px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:6px;
    z-index:5;
  }
  .tick{
    width:4px;height:4px;
    background:var(--dark);
    border-radius:50%;
  }

</style>
</head>
