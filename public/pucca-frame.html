<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pucca & Garu — Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 30% 20%,#FFE4E1,transparent 55%),radial-gradient(ellipse at 70% 80%,#FFD6D0,transparent 60%),linear-gradient(135deg,#FFF0ED,#F5D5D0);min-height:100vh;display:grid;place-items:center;padding:14px;font-family:'Playfair Display',serif}
.stage{position:relative;width:min(600px,90vw);aspect-ratio:3/4}
.frame{position:absolute;inset:0;border-radius:24px;box-shadow:inset 0 0 0 12px #E8443A,inset 0 0 0 13px #1A1A2E,inset 0 0 0 16px #E8443A,inset 0 0 0 17px #1A1A2E,inset 0 0 60px rgba(26,26,46,.25),0 30px 60px rgba(0,0,0,.5);overflow:hidden;background:radial-gradient(ellipse at center,#fffdf8,#fff0ed)}
.photo-area{position:absolute;inset:48px 40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.photo-area .camera{font-size:60px;opacity:.15}
.photo-area .label{font-family:Georgia,serif;font-size:18px;color:#1A1A2E;opacity:.2}
.title{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none}
.title .main{font-family:'Playfair Display',serif;font-size:clamp(18px,3.5vw,28px);font-weight:900;color:#1A1A2E;letter-spacing:.04em;text-shadow:0 1px 0 #E8443A,0 3px 8px rgba(232,68,58,.2)}
.title .sub{font-size:clamp(11px,1.8vw,14px);color:#E8443A;margin-top:-2px;letter-spacing:.06em;font-style:italic}
.char{position:absolute;z-index:5;pointer-events:none}
.char.top-left{top:30px;left:18px}
.char.top-right{top:30px;right:18px}
.char svg{width:clamp(90px,16vw,130px);height:clamp(90px,16vw,130px);filter:drop-shadow(2px 3px 4px rgba(0,0,0,.15))}
.hearts{position:absolute;z-index:3;pointer-events:none;font-size:28px;opacity:.3}
</style>
</head>
<body>
<div class="stage">
  <div class="frame">
    <div class="photo-area">
      <span class="camera">📷</span>
      <span class="label">your photo here</span>
    </div>
    <div class="title">
      <div class="main">PUCCA &amp; GARU</div>
      <div class="sub">love never rests</div>
    </div>

    <!-- PUCCA — top left -->
    <div class="char top-left">
      <svg viewBox="0 0 140 140">
        <!-- dress -->
        <rect x="42" y="86" width="56" height="44" rx="10" fill="#E8443A"/>
        <path d="M40 86 Q70 95 100 86" fill="#CC3330"/>
        <!-- skin -->
        <ellipse cx="70" cy="68" rx="32" ry="28" fill="#FFE4C4"/>
        <!-- hair buns -->
        <circle cx="40" cy="50" r="22" fill="#1A1A2E"/>
        <circle cx="100" cy="50" r="22" fill="#1A1A2E"/>
        <circle cx="40" cy="50" r="12" fill="#E8443A"/>
        <circle cx="100" cy="50" r="12" fill="#E8443A"/>
        <!-- face -->
        <circle cx="60" cy="62" r="3.5" fill="#2D1B11"/>
        <circle cx="80" cy="62" r="3.5" fill="#2D1B11"/>
        <path d="M64 72 Q70 80 76 72" stroke="#E8443A" stroke-width="2.5" fill="none"/>
        <!-- blush -->
        <ellipse cx="54" cy="70" rx="6" ry="4" fill="#FFB6C1" opacity=".5"/>
        <ellipse cx="86" cy="70" rx="6" ry="4" fill="#FFB6C1" opacity=".5"/>
        <!-- arms -->
        <rect x="24" y="85" width="18" height="8" rx="4" fill="#FFE4C4"/>
        <rect x="98" y="85" width="18" height="8" rx="4" fill="#FFE4C4"/>
      </svg>
    </div>

    <!-- GARU — top right -->
    <div class="char top-right">
      <svg viewBox="0 0 140 140">
        <!-- body -->
        <rect x="46" y="74" width="48" height="54" rx="8" fill="#1A1A2E"/>
        <!-- skin -->
        <ellipse cx="70" cy="60" rx="28" ry="26" fill="#FFE4C4"/>
        <!-- hair -->
        <rect x="46" y="36" width="48" height="24" rx="8" fill="#1A1A2E"/>
        <ellipse cx="70" cy="48" rx="26" ry="14" fill="#1A1A2E"/>
        <!-- eyes -->
        <rect x="54" y="54" width="6" height="4" rx="2" fill="#2D1B11"/>
        <rect x="80" y="54" width="6" height="4" rx="2" fill="#2D1B11"/>
        <!-- mouth -->
        <line x1="66" y1="66" x2="74" y2="66" stroke="#2D1B11" stroke-width="2"/>
        <!-- ninja scarf -->
        <rect x="42" y="68" width="56" height="10" rx="4" fill="#E8443A"/>
        <!-- sword -->
        <rect x="100" y="56" width="6" height="40" rx="3" fill="#8B4513"/>
        <rect x="97" y="54" width="12" height="6" rx="2" fill="#A0522D"/>
      </svg>
    </div>

    <!-- Floating hearts -->
    <div class="hearts" style="top:160px;left:55%">♥</div>
    <div class="hearts" style="top:200px;left:15%">♥</div>
    <div class="hearts" style="top:60%;left:75%">♥</div>
    <div class="hearts" style="top:70%;left:20%">♥</div>
    <div class="hearts" style="top:80%;left:60%">♥</div>
    <div class="hearts" style="top:40%;left:85%">♥</div>
  </div>
</div>
</body>
</html>
