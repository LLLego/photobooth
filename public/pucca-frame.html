<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pucca & Garu — Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Fredoka:wght@500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --red:#E8443A;
    --red-dark:#C32E25;
    --red-deep:#8E1E16;
    --dark:#1A1A2E;
    --darker:#0E0E1C;
    --cream:#FFF1D6;
    --cream-warm:#FFE4A8;
    --pink:#FFB6C1;
    --pink-hot:#FF7A98;
    --mustard:#F4A93C;
    --wood:#7A4A28;
    --wood-light:#A06840;
    --tan:#E8C9A0;
  }

  html,body{
    min-height:100vh;
    background:#2a2438;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(232,68,58,.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(244,169,60,.06) 0%, transparent 50%);
    font-family:'Fredoka',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 20px;
    overflow-x:hidden;
  }

  /* ============ THE BOOTH ============ */
  .booth{
    position:relative;
    width:min(680px,100vw);
    aspect-ratio:3/4.2;
    background:
      /* paper grain */
      repeating-linear-gradient(45deg, rgba(232,68,58,.025) 0 2px, transparent 2px 5px),
      repeating-linear-gradient(-45deg, rgba(26,26,46,.02) 0 2px, transparent 2px 5px),
      /* dot pattern */
      radial-gradient(circle, rgba(26,26,46,.08) 1.2px, transparent 1.5px) 0 0/14px 14px,
      /* base warm */
      var(--cream);
    border-radius:28px;
    overflow:hidden;
    box-shadow:
      0 0 0 3px var(--dark),
      0 0 0 6px var(--cream),
      0 0 0 9px var(--red),
      0 30px 60px -10px rgba(0,0,0,.5),
      inset 0 0 100px rgba(232,68,58,.06);
  }

  /* torn-paper top edge */
  .booth::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(ellipse 30px 8px at 5% 0%, transparent 50%, var(--cream) 51%) 0 0/60px 8px repeat-x,
      radial-gradient(ellipse 30px 8px at 35% 100%, transparent 50%, var(--cream) 51%) 0 0/60px 8px repeat-x;
    pointer-events:none;
    z-index:50;
    mix-blend-mode:multiply;
    opacity:.0;
  }

  /* faint halftone */
  .booth::after{
    content:"";
    position:absolute;inset:0;
    background-image:
      radial-gradient(circle at 50% 50%, rgba(26,26,46,.04) 1px, transparent 1.5px);
    background-size:5px 5px;
    pointer-events:none;
    z-index:1;
  }

  /* ============ PHOTO HOLE ============ */
  .photo-hole{
    position:absolute;
    top:23%;
    left:14%;
    right:14%;
    height:42%;
    background:
      linear-gradient(135deg, #c9c2d4 0%, #a89fb8 100%);
    border-radius:18px;
    box-shadow:
      inset 0 0 0 2px var(--dark),
      inset 0 0 0 8px var(--cream),
      inset 0 0 0 10px var(--dark),
      inset 0 20px 40px rgba(0,0,0,.3),
      0 0 0 14px var(--red),
      0 0 0 16px var(--dark);
    overflow:hidden;
    z-index:2;
  }
  .photo-hole::before{
    content:"your photo here";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:rgba(26,26,46,.35);
    font-family:'Caveat',cursive;
    font-size:1.8rem;
    letter-spacing:1px;
  }
  /* little flash sparkle */
  .photo-hole::after{
    content:"";
    position:absolute;
    top:12%;left:18%;
    width:40px;height:40px;
    background:radial-gradient(circle, rgba(255,255,255,.9) 0%, rgba(255,255,255,0) 60%);
    border-radius:50%;
  }

  /* ============ TOP BANNER ============ */
  .top-banner{
    position:absolute;
    top:0;left:0;right:0;
    height:20%;
    z-index:3;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding-top:8px;
  }

  .title-wrap{
    position:relative;
    transform:rotate(-2deg);
  }
  .title{
    font-family:'Bowlby One',sans-serif;
    font-size:clamp(1.4rem,5.5vw,2.6rem);
    color:var(--red);
    text-shadow:
      2px 2px 0 var(--dark),
      4px 4px 0 var(--cream),
      6px 6px 0 var(--dark),
      -1px -1px 0 var(--cream-warm);
    letter-spacing:1px;
    line-height:.95;
    text-align:center;
    -webkit-text-stroke:1.5px var(--dark);
    position:relative;
  }
  .title .amp{
    color:var(--mustard);
    display:inline-block;
    transform:rotate(8deg) translateY(2px);
    margin:0 4px;
  }
  .title-sub{
    position:absolute;
    bottom:-18px;
    left:50%;
    transform:translateX(-50%) rotate(-3deg);
    font-family:'Caveat',cursive;
    font-size:1.1rem;
    color:var(--dark);
    background:var(--mustard);
    padding:1px 14px 2px;
    border-radius:20px;
    border:2px solid var(--dark);
    white-space:nowrap;
    box-shadow:2px 3px 0 var(--dark);
    font-weight:700;
  }

  /* washi tape decorations */
  .tape{
    position:absolute;
    background:rgba(244,169,60,.85);
    height:24px;
    width:80px;
    z-index:4;
    box-shadow:0 2px 4px rgba(0,0,0,.15);
  }
  .tape::before,.tape::after{
    content:"";
    position:absolute;
    top:0;bottom:0;
    width:8px;
    background:
      linear-gradient(45deg,transparent 33%,rgba(0,0,0,.1) 33% 66%,transparent 66%) 0 0/8px 8px;
  }
  .tape::before{left:0;transform:translateX(-50%)}
  .tape::after{right:0;transform:translateX(50%)}
  .tape-1{top:18px;left:-20px;transform:rotate(-30deg);background:rgba(244,169,60,.85)}
  .tape-2{top:14px;right:-25px;transform:rotate(28deg);background:rgba(255,182,193,.85)}

  /* ============ PUCCA (top-left) ============ */
  .pucca{
    position:absolute;
    top:8%;
    left:3%;
    width:130px;
    height:140px;
    z-index:6;
    animation:bouncePucca 1.4s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes bouncePucca{
    0%,100%{transform:translateY(0) rotate(-3deg)}
    50%{transform:translateY(-8px) rotate(3deg)}
  }

  .pucca-head{
    position:absolute;
    top:10px;left:25px;
    width:80px;height:74px;
    background:
      radial-gradient(ellipse at 30% 30%, #fff5e0 0%, #ffd9b3 100%);
    border-radius:50% 50% 48% 48%/52% 52% 48% 48%;
    border:2.5px solid var(--dark);
    box-shadow:inset -3px -4px 0 rgba(232,68,58,.15);
    z-index:3;
  }
  /* hair buns (cinnamon rolls) */
  .pucca-bun{
    position:absolute;
    top:2px;
    width:34px;height:34px;
    background:
      radial-gradient(circle at 35% 35%, #2a2a44 0%, var(--dark) 70%);
    border-radius:50%;
    border:2.5px solid var(--dark);
    z-index:2;
    box-shadow:inset -2px -2px 0 rgba(255,255,255,.05);
  }
  .pucca-bun::before{
    content:"";
    position:absolute;
    inset:6px;
    border:2px solid #3a3a52;
    border-radius:50%;
  }
  .pucca-bun::after{
    content:"";
    position:absolute;
    inset:11px;
    border:1.5px solid #4a4a62;
    border-radius:50%;
  }
  .pucca-bun-l{left:8px;transform:rotate(-10deg)}
  .pucca-bun-r{right:8px;transform:rotate(10deg)}

  /* bangs */
  .pucca-bangs{
    position:absolute;
    top:8px;left:18px;
    width:94px;height:30px;
    background:var(--dark);
    border-radius:50% 50% 0 0/100% 100% 0 0;
    border:2.5px solid var(--dark);
    z-index:4;
  }
  .pucca-bangs::before{
    content:"";
    position:absolute;
    bottom:-1px;left:8px;
    width:18px;height:14px;
    background:var(--dark);
    border-radius:0 0 50% 50%;
  }
  .pucca-bangs::after{
    content:"";
    position:absolute;
    bottom:-1px;right:14px;
    width:14px;height:10px;
    background:var(--dark);
    border-radius:0 0 50% 50%;
  }

  /* eyes — closed happy lines */
  .pucca-eye{
    position:absolute;
    top:42px;
    width:14px;height:8px;
    border:2.5px solid var(--dark);
    border-top:none;
    border-radius:0 0 14px 14px;
    background:transparent;
    z-index:5;
  }
  .pucca-eye-l{left:42px}
  .pucca-eye-r{left:62px}

  /* blush */
  .pucca-blush{
    position:absolute;
    top:50px;
    width:10px;height:6px;
    background:var(--pink-hot);
    border-radius:50%;
    opacity:.7;
    z-index:5;
  }
  .pucca-blush-l{left:32px}
  .pucca-blush-r{left:78px}

  /* mouth — big open smile */
  .pucca-mouth{
    position:absolute;
    top:58px;left:48px;
    width:18px;height:11px;
    background:var(--red-deep);
    border:2px solid var(--dark);
    border-radius:0 0 50% 50%;
    z-index:5;
  }
  .pucca-mouth::before{
    content:"";
    position:absolute;
    top:-2px;left:4px;
    width:10px;height:5px;
    background:#fff5e0;
    border-radius:0 0 50% 50%;
  }

  /* body — red dress */
  .pucca-body{
    position:absolute;
    bottom:0;left:30px;
    width:70px;height:55px;
    background:
      linear-gradient(180deg, var(--red) 0%, var(--red-dark) 100%);
    border:2.5px solid var(--dark);
    border-radius:40% 40% 8% 8%/60% 60% 8% 8%;
    z-index:2;
  }
  .pucca-body::before{
    content:"";
    position:absolute;
    top:-6px;left:50%;
    transform:translateX(-50%);
    width:36px;height:12px;
    background:var(--red);
    border:2.5px solid var(--dark);
    border-radius:50% 50% 0 0;
  }
  /* collar dots */
  .pucca-body::after{
    content:"";
    position:absolute;
    top:6px;left:14px;
    width:6px;height:6px;
    background:var(--cream);
    border-radius:50%;
    box-shadow:
      14px 0 0 var(--cream),
      28px 0 0 var(--cream);
  }

  /* little arm reaching out */
  .pucca-arm{
    position:absolute;
    top:80px;right:-2px;
    width:22px;height:14px;
    background:linear-gradient(180deg,#fff5e0,#ffd9b3);
    border:2.5px solid var(--dark);
    border-radius:10px;
    z-index:4;
    transform:rotate(-15deg);
  }

  /* ============ GARU (top-right) ============ */
  .garu{
    position:absolute;
    top:6%;
    right:3%;
    width:130px;
    height:150px;
    z-index:6;
    animation:garuFloat 2.2s ease-in-out infinite;
  }
  @keyframes garuFloat{
    0%,100%{transform:translateY(0) rotate(2deg)}
    50%{transform:translateY(-5px) rotate(-1deg)}
  }

  .garu-head{
    position:absolute;
    top:8px;left:30px;
    width:70px;height:70px;
    background:
      radial-gradient(ellipse at 35% 30%, #fff5e0 0%, #ffd9b3 100%);
    border-radius:48% 52% 48% 48%/50% 50% 50% 50%;
    border:2.5px solid var(--dark);
    z-index:3;
  }
  /* hair — spiky black */
  .garu-hair{
    position:absolute;
    top:0;left:18px;
    width:94px;height:35px;
    background:var(--dark);
    border-radius:50% 50% 10% 10%/100% 100% 20% 20%;
    border:2.5px solid var(--dark);
    z-index:4;
  }
  /* hair spikes via pseudo */
  .garu-hair::before{
    content:"";
    position:absolute;
    top:-12px;left:10px;
    width:0;height:0;
    border-left:8px solid transparent;
    border-right:8px solid transparent;
    border-bottom:14px solid var(--dark);
  }
  .garu-hair::after{
    content:"";
    position:absolute;
    top:-8px;left:38px;
    width:0;height:0;
    border-left:7px solid transparent;
    border-right:7px solid transparent;
    border-bottom:12px solid var(--dark);
  }
  .garu-spike3{
    position:absolute;
    top:24px;left:60px;
    width:0;height:0;
    border-left:6px solid transparent;
    border-right:6px solid transparent;
    border-top:10px solid var(--dark);
    z-index:5;
    transform:rotate(20deg);
  }

  /* eyes — determined look */
  .garu-eye{
    position:absolute;
    top:36px;
    width:9px;height:11px;
    background:var(--dark);
    border-radius:50%;
    border:2px solid var(--dark);
    z-index:5;
  }
  .garu-eye-l{left:42px}
  .garu-eye-r{left:62px}
  .garu-eye::after{
    content:"";
    position:absolute;
    top:2px;right:1px;
    width:3px;height:3px;
    background:#fff;
    border-radius:50%;
  }

  /* serious mouth */
  .garu-mouth{
    position:absolute;
    top:56px;left:50px;
    width:14px;height:4px;
    background:var(--dark);
    border-radius:4px;
    z-index:5;
  }

  /* ninja suit body */
  .garu-body{
    position:absolute;
    bottom:0;left:32px;
    width:66px;height:58px;
    background:
      linear-gradient(180deg, var(--dark) 0%, var(--darker) 100%);
    border:2.5px solid var(--dark);
    border-radius:45% 45% 10% 10%/55% 55% 10% 10%;
    z-index:2;
  }
  /* eyes band on suit */
  .garu-body::before{
    content:"";
    position:absolute;
    top:0;left:-2px;right:-2px;
    height:10px;
    background:var(--darker);
    border:2.5px solid var(--dark);
    border-radius:50% 50% 0 0/100% 100% 0 0;
  }

  /* wooden sword */
  .garu-sword{
    position:absolute;
    bottom:18px;right:8px;
    width:6px;height:50px;
    background:
      linear-gradient(90deg, var(--wood) 0%, var(--wood-light) 50%, var(--wood) 100%);
    border:2px solid var(--dark);
    border-radius:2px;
    transform:rotate(18deg);
    z-index:1;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.2);
  }
  .garu-sword::before{
    content:"";
    position:absolute;
    bottom:-4px;left:-6px;
    width:18px;height:6px;
    background:var(--dark);
    border-radius:3px;
  }
  .garu-sword::after{
    content:"";
    position:absolute;
    top:6px;left:0;right:0;
    height:2px;
    background:rgba(0,0,0,.3);
  }

  /* ============ HEARTS ============ */
  .heart{
    position:absolute;
    width:30px;height:30px;
    z-index:5;
    animation:heartFloat 3s ease-in-out infinite;
  }
  .heart::before,.heart::after{
    content:"";
    position:absolute;
    width:18px;height:24px;
    background:var(--pink-hot);
    border:2px solid var(--dark);
    border-radius:50% 50% 0 0;
    top:0;left:6px;
    transform:rotate(-45deg);
    transform-origin:0 100%;
  }
  .heart::after{
    left:0;
    transform:rotate(45deg);
    transform-origin:100% 100%;
  }
  .heart-inner::before,.heart-inner::after{
    background:var(--red);
  }
  .heart-small::before,.heart-small::after{
    width:11px;height:15px;
  }
  .heart-big::before,.heart-big::after{
    width:24px;height:32px;
  }

  @keyframes heartFloat{
    0%,100%{transform:translateY(0) rotate(-5deg) scale(1)}
    50%{transform:translateY(-12px) rotate(8deg) scale(1.1)}
  }
  @keyframes heartFloat2{
    0%,100%{transform:translateY(0) rotate(10deg) scale(1)}
    50%{transform:translateY(-8px) rotate(-8deg) scale(.95)}
  }
  @keyframes heartSpin{
    0%{transform:rotate(0deg) scale(1)}
    50%{transform:rotate(180deg) scale(1.15)}
    100%{transform:rotate(360deg) scale(1)}
  }

  /* heart placements */
  .h1{top:30%;left:4%;animation-delay:0s}
  .h2{top:38%;right:5%;animation:heartFloat2 2.5s ease-in-out infinite}
  .h3{top:13%;left:46%;width:24px;height:24px;animation-delay:.3s}
  .h4{top:18%;right:38%;width:20px;height:20px;animation:heartSpin 4s ease-in-out infinite}
  .h5{top:60%;left:6%;width:22px;height:22px;animation:heartFloat2 2.8s ease-in-out infinite}
  .h6{top:55%;right:7%;width:26px;height:26px;animation-delay:.6s}
  .h7{bottom:30%;left:8%;width:18px;height:18px;animation:heartSpin 3.5s ease-in-out infinite}
  .h8{bottom:32%;right:9%;width:20px;height:20px;animation-delay:.4s}
  .h9{bottom:18%;left:42%;width:24px;height:24px;animation:heartFloat2 2.2s ease-in-out infinite}

  /* ============ BOTTOM SECTION ============ */
  .bottom-strip{
    position:absolute;
    bottom:0;left:0;right:0;
    height:35%;
    z-index:3;
    overflow:hidden;
  }

  /* zigzag divider */
  .divider{
    position:absolute;
    top:0;left:-5%;right:-5%;
    height:14px;
    background:
      linear-gradient(45deg, var(--dark) 25%, transparent 25%) 0 0/20px 20px repeat-x,
      linear-gradient(-45deg, var(--dark) 25%, transparent 25%) 0 0/20px 20px repeat-x;
    background-position:0 0, 10px 0;
  }
  .divider-band{
    position:absolute;
    top:14px;left:0;right:0;
    height:8px;
    background:repeating-linear-gradient(90deg,
      var(--red) 0 16px,
      var(--cream) 16px 32px,
      var(--mustard) 32px 48px,
      var(--dark) 48px 64px);
    border-bottom:2.5px solid var(--dark);
  }

  .bottom-content{
    position:absolute;
    top:30px;left:0;right:0;bottom:0;
    padding:14px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
  }

  /* date stamp */
  .stamp-row{
    display:flex;
    gap:8px;
    align-items:center;
    width:100%;
    justify-content:center;
    margin-bottom:6px;
  }
  .date-chip{
    background:var(--cream);
    border:2px solid var(--dark);
    border-radius:6px;
    padding:3px 10px;
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:.78rem;
    color:var(--dark);
    transform:rotate(-2deg);
    box-shadow:2px 2px 0 var(--red);
    letter-spacing:.5px;
  }
  .date-chip:nth-child(2){transform:rotate(1.5deg);box-shadow:2px 2px 0 var(--mustard)}
  .date-chip:nth-child(3){transform:rotate(-1deg);box-shadow:2px 2px 0 var(--pink-hot)}

  /* sticker speech bubbles */
  .quote-row{
    display:flex;
    justify-content:space-between;
    width:100%;
    align-items:flex-end;
    gap:8px;
  }
  .quote{
    background:var(--cream);
    border:2.5px solid var(--dark);
    padding:5px 11px;
    font-family:'Caveat',cursive;
    font-weight:700;
    font-size:1.05rem;
    color:var(--dark);
    border-radius:18px 18px 18px 4px;
    position:relative;
    box-shadow:2px 3px 0 var(--dark);
    line-height:1.05;
  }
  .quote::after{
    content:"";
    position:absolute;
    bottom:-9px;left:8px;
    width:0;height:0;
    border-left:8px solid var(--dark);
    border-right:4px solid transparent;
    border-top:9px solid var(--dark);
  }
  .quote::before{
    content:"";
    position:absolute;
    bottom:-5px;left:11px;
    width:0;height:0;
    border-left:4px solid var(--cream);
    border-right:2px solid transparent;
    border-top:5px solid var(--cream);
    z-index:2;
  }
  .quote.right{
    border-radius:18px 18px 4px 18px;
  }
  .quote.right::after{
    left:auto;right:8px;
    border-left:4px solid transparent;
    border-right:8px solid var(--dark);
  }
  .quote.right::before{
    left:auto;right:11px;
    border-left:2px solid transparent;
    border-right:4px solid var(--cream);
  }

  /* rating stars */
  .rating{
    display:flex;
    gap:4px;
    margin-top:4px;
    align-items:center;
    background:var(--red);
    padding:3px 10px 3px 8px;
    border-radius:20px;
    border:2px solid var(--dark);
    box-shadow:2px 2px 0 var(--dark);
    transform:rotate(-3deg);
  }
  .rating span{
    color:var(--cream);
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:.8rem;
    margin-right:2px;
  }
  .star{
    width:12px;height:12px;
    background:var(--mustard);
    border:1.5px solid var(--dark);
    clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    display:inline-block;
  }

  /* ============ SIDE GARNISHES ============ */
  /* corner doodles */
  .doodle{
    position:absolute;
    z-index:4;
    pointer-events:none;
  }

  /* sparkle dots scattered */
  .sparkle{
    position:absolute;
    width:8px;height:8px;
    background:var(--mustard);
    border:1.5px solid var(--dark);
    border-radius:50%;
    z-index:4;
  }
  .sparkle.star{
    border-radius:0;
    background:var(--cream);
    clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    border:none;
    box-shadow:0 0 0 1.5px var(--dark);
  }

  /* small noodle bowl doodle — Pucca signature */
  .bowl{
    position:absolute;
    bottom:6%;right:5%;
    width:36px;height:24px;
    z-index:4;
  }
  .bowl::before{
    content:"";
    position:absolute;
    bottom:0;left:0;
    width:36px;height:18px;
    background:var(--mustard);
    border:2px solid var(--dark);
    border-radius:0 0 50% 50%/0 0 100% 100%;
  }
  .bowl::after{
    content:"";
    position:absolute;
    top:2px;left:-4px;right:-4px;
    height:6px;
    background:var(--cream);
    border:2px solid var(--dark);
    border-radius:4px;
  }
  .noodle{
    position:absolute;
    top:-6px;left:14px;
    width:3px;height:10px;
    background:var(--mustard);
    border-radius:2px;
    transform:rotate(-15deg);
  }
  .noodle::before{
    content:"";position:absolute;
    top:-3px;left:6px;
    width:3px;height:8px;
    background:var(--mustard);
    border-radius:2px;
    transform:rotate(30deg);
  }

  /* kiss mark */
  .kiss{
    position:absolute;
    bottom:34%;left:5%;
    width:30px;height:18px;
    z-index:5;
    transform:rotate(-15deg);
  }
  .kiss::before,.kiss::after{
    content:"";
    position:absolute;
    width:14px;height:18px;
    background:var(--red);
    border:1.5px solid var(--dark);
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    top:0;
  }
  .kiss::before{left:0;transform:rotate(-15deg)}
  .kiss::after{right:0;transform:rotate(15deg)}

  /* camera icon corner */
  .cam-icon{
    position:absolute;
    top:5.5%;left:50%;
    transform:translateX(-50%);
    width:36px;height:26px;
    z-index:7;
  }
  .cam-icon::before{
    content:"";
    position:absolute;
    bottom:0;left:0;
    width:36px;height:20px;
    background:var(--dark);
    border-radius:5px;
  }
  .cam-icon::after{
    content:"";
    position:absolute;
    bottom:4px;left:50%;
    transform:translateX(-50%);
    width:10px;height:10px;
    background:var(--mustard);
    border-radius:50%;
    border:1.5px solid var(--cream);
  }

  /* side stamps "PHOTO" text */
  .side-text{
    position:absolute;
    left:3%;
    top:50%;
    transform:translateY(-50%) rotate(-90deg);
    transform-origin:center;
    font-family:'Bowlby One',sans-serif;
    font-size:.7rem;
    color:var(--dark);
    letter-spacing:6px;
    z-index:3;
    opacity:.6;
  }
  .side-text.right{
    left:auto;right:3%;
    transform:translateY(-50%) rotate(90deg);
  }

  /* doodle hearts in bottom */
  .bottom-heart-cluster{
    position:relative;
    display:flex;
    gap:6px;
    align-items:center;
    margin-top:4px;
  }

  /* small mini heart */
  .mini-heart{
    position:relative;
    width:14px;height:14px;
  }
  .mini-heart::before,.mini-heart::after{
    content:"";
    position:absolute;
    width:8px;height:11px;
    background:var(--red);
    border:1.2px solid var(--dark);
    border-radius:50% 50% 0 0;
    top:0;
  }
  .mini-heart::before{
    left:3px;transform:rotate(-45deg);transform-origin:0 100%;
  }
  .mini-heart::after{
    left:0;transform:rotate(45deg);transform-origin:100% 100%;
  }
  .mini-heart.pink::before,.mini-heart.pink::after{background:var(--pink-hot)}
  .mini-heart.cream::before,.mini-heart.cream::after{background:var(--cream-warm)}

  /* little love arrow */
  .love-arrow{
    position:absolute;
    top:42%;right:3%;
    width:50px;height:30px;
    z-index:6;
    transform:rotate(-20deg);
  }
  .love-arrow::before{
    content:"";
    position:absolute;
    top:50%;left:0;
    width:36px;height:2.5px;
    background:var(--dark);
    transform:translateY(-50%);
    background-image:repeating-linear-gradient(90deg,var(--dark) 0 4px,transparent 4px 7px);
    background-size:100% 100%;
  }
  .arrow-head{
    position:absolute;
    top:50%;right:0;
    width:0;height:0;
    border-top:6px solid transparent;
    border-bottom:6px solid transparent;
    border-left:10px solid var(--red);
    transform:translateY(-50%);
  }
  .arrow-tail{
    position:absolute;
    top:50%;left:0;
    width:0;height:0;
    border-top:5px solid var(--dark);
    border-right:8px solid transparent;
    transform:translateY(-50%);
  }
  .arrow-heart{
    position:absolute;
    top:-14px;right:-4px;
    width:14px;height:14px;
  }
  .arrow-heart::before,.arrow-heart::after{
    content:"";
    position:absolute;
    width:8px;height:10px;
    background:var(--red);
    border:1.5px solid var(--dark);
    border-radius:50% 50% 0 0;
    top:0;
  }
  .arrow-heart::before{left:3px;transform:rotate(-45deg);transform-origin:0 100%}
  .arrow-heart::after{left:0;transform:rotate(45deg);transform-origin:100% 100%}

  /* subtle paper texture overlay */
  .paper-grain{
    position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(91deg, rgba(26,26,46,.02) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(1deg, rgba(232,68,58,.02) 0 1px, transparent 1px 4px);
    pointer-events:none;
    z-index:60;
    mix-blend-mode:multiply;
  }

  /* corner pin */
  .pin{
    position:absolute;
    width:14px;height:14px;
    background:radial-gradient(circle at 35% 35%, var(--red) 0%, var(--red-deep) 100%);
    border-radius:50%;
    border:1.5px solid var(--dark);
    box-shadow:
      0 2px 3px rgba(0,0,0,.4),
      inset -2px -2px 0 rgba(0,0,0,.2),
      inset 2px 2px 0 rgba(255,255,255,.3);
    z-index:70;
  }
  .pin-tl{top:8px;left:8px}
  .pin-tr{top:8px;right:8px;background:radial-gradient(circle at 35% 35%, var(--mustard) 0%, #b97a1e 100%)}
  .pin-bl{bottom:8px;left:8px;background:radial-gradient(circle at 35% 35%, var(--pink-hot) 0%, #c44760 100%)}
  .pin-br{bottom:8px;right:8px}

  /* "FLASH" burst top center */
  .flash-burst{
    position:absolute;
    top:21%;
    left:50%;
    transform:translateX(-50%);
    z-index:8;
    width:40px;height:40px;
    pointer-events:none;
    animation:flashPulse 2s ease-in-out infinite;
  }
  .flash-burst span{
    position:absolute;
    top:50%;left:50%;
    width:4px;height:14px;
    background:var(--mustard);
    border:1.5px solid var(--dark);
    transform-origin:center 0;
    border-radius:3px;
  }
  @keyframes flashPulse{
    0%,100%{transform:translateX(-50%) scale(1)}
    50%{transform:translateX(-50%) scale(1.15)}
  }

  @media (max-width:520px){
    .pucca{width:100px;height:110px;left:1%}
    .pucca-head{left:20px;width:60px;height:56px}
    .pucca-bun{width:26px;height:26px}
    .pucca-bun-l{left:4px}
    .pucca-bun-r{right:4px}
    .pucca-bangs{left:14px;width:72px}

    .pucca-eye-r{left:48px}
    .pucca-mouth{left:38px}
    .pucca-blush-l{left:24px}
    .pucca-blush-r{left:60px}
    .pucca-body{left:24px;width:54px}

    .garu{width:100px;height:115px;right:1%}

    .garu-body{left:26px;width:52px}
    .garu-sword{height:40px}

    .title{font-size:1.3rem}
    .title-sub{font-size:.85rem;bottom:-14px}
    .quote{font-size:.85rem;padding:4px 8px}
  }
</style>
</head>
