<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Kitty · Sweet Moments Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Quicksand:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink-soft: #E891A0;
    --pink-pale: #FFE3E9;
    --pink-blush: #FFD0DC;
    --pink-deep: #C97D8E;
    --pink-shadow: #9C5466;
    --cream: #FFF8F3;
    --white: #FFFFFF;
    --cherry: #E8443A;
    --cherry-deep: #B8281F;
    --cherry-shadow: #8B1810;
    --gold: #FFD700;
    --gold-deep: #D4A800;
    --ink: #4A1F2A;
    --ink-soft: #7A4855;
    --frame-bg: #FFEEF1;
  }

  html, body { height: 100%; }

  body {
    min-height: 100vh;
    background: #F5D8DF;
    background-image:
      radial-gradient(ellipse 600px 400px at 15% 20%, #FFEFF3 0%, transparent 60%),
      radial-gradient(ellipse 700px 500px at 85% 80%, #F7CBD4 0%, transparent 60%),
      radial-gradient(ellipse 400px 300px at 50% 50%, #FFE5EB 0%, transparent 60%);
    font-family: 'Quicksand', sans-serif;
    color: var(--ink);
    padding: 40px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Paper-grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(45deg, transparent 0 2px, rgba(255,255,255,0.02) 2px 4px),
      repeating-linear-gradient(-45deg, transparent 0 3px, rgba(154,80,100,0.015) 3px 6px);
    z-index: 0;
  }

  /* ============ STAGE ============ */
  .stage {
    position: relative;
    width: 100%;
    max-width: 1180px;
    aspect-ratio: 1 / 1.05;
    z-index: 1;
  }

  /* ============ OUTER FRAME ============ */
  .frame {
    position: absolute;
    inset: 0;
    background: var(--frame-bg);
    border-radius: 36px;
    box-shadow:
      inset 0 0 0 3px var(--white),
      inset 0 0 0 4px var(--pink-soft),
      inset 0 0 0 14px var(--white),
      inset 0 0 0 16px var(--pink-soft),
      inset 0 0 0 20px var(--pink-pale),
      0 30px 80px -20px rgba(154, 80, 100, 0.4),
      0 0 0 8px var(--white),
      0 0 0 10px var(--pink-soft);
    overflow: hidden;
  }

  /* Dotted pattern inside frame */
  .frame::before {
    content: '';
    position: absolute;
    inset: 30px;
    background-image:
      radial-gradient(circle at center, var(--pink-soft) 1.2px, transparent 1.8px),
      radial-gradient(circle at center, var(--gold) 0.8px, transparent 1.2px);
    background-size: 32px 32px, 64px 64px;
    background-position: 0 0, 16px 16px;
    opacity: 0.35;
    border-radius: 16px;
    z-index: 1;
  }

  /* Corner scallops */
  .frame::after {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 24px;
    background:
      radial-gradient(circle at top left, transparent 18px, var(--pink-soft) 19px, var(--pink-soft) 20px, transparent 21px) top left / 40px 40px no-repeat,
      radial-gradient(circle at top right, transparent 18px, var(--pink-soft) 19px, var(--pink-soft) 20px, transparent 21px) top right / 40px 40px no-repeat,
      radial-gradient(circle at bottom left, transparent 18px, var(--pink-soft) 19px, var(--pink-soft) 20px, transparent 21px) bottom left / 40px 40px no-repeat,
      radial-gradient(circle at bottom right, transparent 18px, var(--pink-soft) 19px, var(--pink-soft) 20px, transparent 21px) bottom right / 40px 40px no-repeat;
    pointer-events: none;
    z-index: 2;
  }

  /* ============ PHOTO WINDOW ============ */
  .photo-window {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64%;
    height: 76%;
    background: linear-gradient(135deg, #FFF6F9 0%, #FFEAF0 100%);
    border-radius: 20px;
    box-shadow:
      inset 0 0 0 2px var(--pink-soft),
      inset 0 0 0 4px var(--white),
      inset 0 0 0 6px var(--pink-soft),
      inset 0 0 0 14px var(--white),
      0 0 0 1px var(--pink-shadow),
      0 25px 60px -15px rgba(154, 80, 100, 0.3);
    z-index: 5;
    overflow: hidden;
  }

  /* Inner soft glow */
  .photo-window::before {
    content: '';
    position: absolute;
    inset: 16px;
    background:
      repeating-linear-gradient(0deg, transparent 0 18px, rgba(232, 145, 160, 0.04) 18px 19px),
      repeating-linear-gradient(90deg, transparent 0 18px, rgba(232, 145, 160, 0.04) 18px 19px);
    border-radius: 8px;
    pointer-events: none;
  }

  /* Subtle heart watermark */
  .photo-window::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 55px;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(circle at 30% 35%, var(--pink-blush) 8px, transparent 9px),
      radial-gradient(circle at 70% 35%, var(--pink-blush) 8px, transparent 9px);
    opacity: 0.3;
    pointer-events: none;
  }

  /* Tape pieces */
  .tape {
    position: absolute;
    width: 80px;
    height: 22px;
    background:
      repeating-linear-gradient(45deg,
        rgba(255, 215, 220, 0.85) 0 6px,
        rgba(255, 200, 210, 0.6) 6px 12px);
    box-shadow:
      0 2px 4px rgba(154, 80, 100, 0.2),
      inset 0 0 0 1px rgba(255,255,255,0.4);
    z-index: 30;
  }
  .tape.tl { top: 6%; left: 8%; transform: rotate(-15deg); }
  .tape.tr { top: 6%; right: 8%; transform: rotate(12deg); }
  .tape.bl { bottom: 6%; left: 10%; transform: rotate(8deg); background: repeating-linear-gradient(45deg, rgba(255,230,180,0.85) 0 6px, rgba(255,210,140,0.6) 6px 12px); }
  .tape.br { bottom: 6%; right: 10%; transform: rotate(-18deg); background: repeating-linear-gradient(45deg, rgba(255,230,180,0.85) 0 6px, rgba(255,210,140,0.6) 6px 12px); }

  /* ============ HELLO KITTY (TOP-LEFT) ============ */
  .kitty {
    position: absolute;
    top: 28px;
    left: 28px;
    width: 140px;
    height: 140px;
    z-index: 20;
  }

  /* Left ear */
  .ear {
    position: absolute;
    top: 8px;
    width: 36px;
    height: 42px;
    background: var(--white);
    border: 3px solid var(--ink);
    border-radius: 50% 50% 20% 20% / 100% 100% 20% 20%;
    transform: rotate(-12deg);
    z-index: 1;
    box-shadow:
      inset -3px -3px 0 rgba(232, 145, 160, 0.15);
  }
  .ear.left { left: 18px; transform: rotate(-18deg); }
  .ear.right { right: 18px; transform: rotate(18deg); }

  /* Face */
  .kitty .face {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 124px;
    height: 108px;
    background: var(--white);
    border: 3px solid var(--ink);
    border-radius: 50%;
    z-index: 2;
    box-shadow:
      inset -5px -6px 0 -2px rgba(232, 145, 160, 0.08),
      inset 4px 4px 0 -2px rgba(255, 255, 255, 0.6);
  }

  /* Right eye */
  .eye {
    position: absolute;
    top: 62px;
    width: 9px;
    height: 14px;
    background: var(--ink);
    border-radius: 50%;
    z-index: 3;
  }
  .eye.left { left: 38px; }
  .eye.right { right: 38px; }
  .eye::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 3px;
    height: 4px;
    background: var(--white);
    border-radius: 50%;
  }

  /* Nose (oval yellow) */
  .kitty .nose {
    position: absolute;
    top: 84px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 9px;
    background: var(--gold);
    border: 2px solid var(--ink);
    border-radius: 50%;
    z-index: 3;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.6);
  }

  /* Whiskers - 3 each side using a whisker group */
  .whiskers {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }
  .whisker {
    position: absolute;
    height: 2px;
    background: var(--ink);
    border-radius: 2px;
  }
  /* Left whiskers */
  .whisker.l1 { top: 78px; left: 8px; width: 26px; transform: rotate(-8deg); }
  .whisker.l2 { top: 86px; left: 6px; width: 28px; transform: rotate(2deg); }
  .whisker.l3 { top: 94px; left: 8px; width: 26px; transform: rotate(12deg); }
  /* Right whiskers */
  .whisker.r1 { top: 78px; right: 8px; width: 26px; transform: rotate(8deg); }
  .whisker.r2 { top: 86px; right: 6px; width: 28px; transform: rotate(-2deg); }
  .whisker.r3 { top: 94px; right: 8px; width: 26px; transform: rotate(-12deg); }

  /* Bow on Kitty's ear */
  .kitty-bow {
    position: absolute;
    top: 4px;
    right: 8px;
    width: 46px;
    height: 36px;
    z-index: 4;
  }
  .kitty-bow .loop {
    position: absolute;
    width: 22px;
    height: 26px;
    background: var(--cherry);
    border: 2.5px solid var(--ink);
    border-radius: 50% 30% 50% 30%;
    top: 4px;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.35);
  }
  .kitty-bow .loop.l { left: 0; transform: rotate(-15deg); border-radius: 30% 50% 30% 50%; }
  .kitty-bow .loop.r { right: 0; transform: rotate(15deg); }
  .kitty-bow .knot {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 14px;
    background: var(--cherry-deep);
    border: 2px solid var(--ink);
    border-radius: 4px;
    z-index: 2;
  }

  /* ============ BIG RIBBON BOW (TOP-RIGHT) ============ */
  .ribbon {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 145px;
    height: 145px;
    z-index: 20;
  }

  /* Tails (behind loops) */
  .ribbon .tail {
    position: absolute;
    width: 26px;
    background: var(--pink-soft);
    border: 3px solid var(--ink);
    z-index: 1;
  }
  .ribbon .tail.l {
    top: 60px;
    left: 8px;
    height: 70px;
    border-radius: 8px 4px 50% 50% / 8px 4px 80% 80%;
    transform: rotate(-22deg);
    box-shadow: inset 3px 3px 0 rgba(255,255,255,0.35);
  }
  .ribbon .tail.r {
    top: 60px;
    right: 8px;
    height: 75px;
    border-radius: 4px 8px 50% 50% / 4px 8px 80% 80%;
    transform: rotate(22deg);
    box-shadow: inset -3px 3px 0 rgba(255,255,255,0.35);
  }
  /* Tail inner notch - V cut using small white triangle */
  .ribbon .tail::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 12px solid var(--frame-bg);
  }

  /* Loops */
  .ribbon .loop {
    position: absolute;
    width: 56px;
    height: 70px;
    background: var(--pink-soft);
    border: 3px solid var(--ink);
    top: 16px;
    z-index: 2;
    box-shadow: inset 4px 4px 0 rgba(255,255,255,0.35);
  }
  .ribbon .loop.l {
    left: 6px;
    border-radius: 60% 40% 50% 50% / 70% 40% 50% 50%;
    transform: rotate(-8deg);
  }
  .ribbon .loop.r {
    right: 6px;
    border-radius: 40% 60% 50% 50% / 40% 70% 50% 50%;
    transform: rotate(8deg);
  }

  /* Inner shading lines on loops */
  .ribbon .loop::before {
    content: '';
    position: absolute;
    top: 12px;
    width: 3px;
    height: 30px;
    background: var(--pink-deep);
    border-radius: 3px;
    opacity: 0.6;
  }
  .ribbon .loop.l::before { right: 10px; }
  .ribbon .loop.r::before { left: 10px; }

  /* Knot in the middle */
  .ribbon .knot {
    position: absolute;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 28px;
    background: var(--pink-deep);
    border: 3px solid var(--ink);
    border-radius: 6px 6px 8px 8px;
    z-index: 3;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.3);
  }
  .ribbon .knot::before {
    content: '';
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 6px;
    background: var(--pink-deep);
    border: 3px solid var(--ink);
    border-radius: 4px 4px 0 0;
  }

  /* ============ SPARKLES ============ */
  .sparkle {
    position: absolute;
    z-index: 15;
    pointer-events: none;
  }

  /* 4-point sparkle ✦ */
  .sparkle.cross {
    width: 24px;
    height: 24px;
  }
  .sparkle.cross::before,
  .sparkle.cross::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--gold);
    box-shadow: 0 0 0 1.5px var(--ink), inset 0 0 0 1px rgba(255,255,255,0.5);
  }
  .sparkle.cross::before {
    width: 6px;
    height: 24px;
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    border-radius: 50%;
  }
  .sparkle.cross::after {
    width: 24px;
    height: 6px;
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    border-radius: 50%;
  }

  /* Star ⭑ using clip-path on a div with border */
  .sparkle.star5 {
    width: 22px;
    height: 22px;
    background: var(--gold);
    filter: drop-shadow(2px 2px 0 var(--ink));
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }

  /* Filled star ★ */
  .sparkle.solid {
    width: 18px;
    height: 18px;
    background: var(--cherry);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    filter: drop-shadow(1.5px 1.5px 0 var(--ink));
  }

  /* Tiny sparkle (small dot burst) */
  .sparkle.tiny {
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 0 1.5px var(--ink);
  }

  /* ============ FLOWERS ============ */
  .flower {
    position: absolute;
    z-index: 14;
    pointer-events: none;
  }

  .flower .petal {
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--pink-soft);
    border: 2px solid var(--ink);
    border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
    top: 50%;
    left: 50%;
    transform-origin: 50% 100%;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.4);
  }
  .flower .petal:nth-child(1) { transform: translate(-50%, -100%) rotate(0deg); }
  .flower .petal:nth-child(2) { transform: translate(-50%, -100%) rotate(72deg); }
  .flower .petal:nth-child(3) { transform: translate(-50%, -100%) rotate(144deg); }
  .flower .petal:nth-child(4) { transform: translate(-50%, -100%) rotate(216deg); }
  .flower .petal:nth-child(5) { transform: translate(-50%, -100%) rotate(288deg); }

  .flower .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 9px;
    height: 9px;
    background: var(--gold);
    border: 2px solid var(--ink);
    border-radius: 50%;
    z-index: 2;
  }

  /* Small flower variant */
  .flower.small .petal {
    width: 10px;
    height: 10px;
  }

  /* ============ TITLE ============ */
  .title-block {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 12;
  }
  .title {
    font-family: 'Pacifico', cursive;
    font-size: 52px;
    color: var(--cherry);
    line-height: 0.9;
    letter-spacing: 1px;
    text-shadow:
      2px 2px 0 var(--white),
      4px 4px 0 var(--pink-soft),
      5px 5px 0 var(--ink);
    transform: rotate(-3deg);
    position: relative;
  }
  .title::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -8px;
    height: 6px;
    background:
      radial-gradient(circle at 10% 50%, var(--gold) 2px, transparent 3px),
      radial-gradient(circle at 30% 50%, var(--gold) 2px, transparent 3px),
      radial-gradient(circle at 50% 50%, var(--gold) 2px, transparent 3px),
      radial-gradient(circle at 70% 50%, var(--gold) 2px, transparent 3px),
      radial-gradient(circle at 90% 50%, var(--gold) 2px, transparent 3px);
  }
  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    color: var(--ink-soft);
    margin-top: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .subtitle::before,
  .subtitle::after {
    content: '~';
    color: var(--pink-soft);
    margin: 0 8px;
    font-weight: 700;
  }

  /* ============ BOTTOM LABEL ============ */
  .photo-label {
    position: absolute;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 12;
  }
  .photo-label .tiny-heart {
    display: inline-block;
    width: 14px;
    height: 13px;
    position: relative;
    vertical-align: middle;
    margin: 0 6px;
  }
  .photo-label .tiny-heart::before,
  .photo-label .tiny-heart::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 12px;
    background: var(--cherry);
    border-radius: 8px 8px 0 0;
    top: 0;
    box-shadow: inset -1px 1px 0 rgba(255,255,255,0.3);
  }
  .photo-label .tiny-heart::before {
    left: 0;
    transform: rotate(-45deg);
    transform-origin: 50% 100%;
  }
  .photo-label .tiny-heart::after {
    right: 0;
    transform: rotate(45deg);
    transform-origin: 50% 100%;
  }
  .photo-label .label-text {
    font-family: 'Quicksand', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--pink-shadow);
    font-weight: 700;
    text-transform: uppercase;
  }
  .photo-label .label-script {
    display: block;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--cherry);
    margin-top: 6px;
    font-weight: 700;
    letter-spacing: 0;
  }

  /* Date strip */
  .date-strip {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Quicksand', sans-serif;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 3px;
    z-index: 12;
    background: var(--white);
    padding: 4px 14px;
    border-radius: 20px;
    border: 1.5px dashed var(--pink-soft);
  }

  /* ============ DECORATIVE STRIP (top & bottom inner borders) ============ */
  .deco-strip {
    position: absolute;
    left: 30px;
    right: 30px;
    height: 18px;
    z-index: 8;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
  .deco-strip.top { top: 200px; }
  .deco-strip.bottom { bottom: 130px; }

  .deco-strip .dot {
    width: 6px;
    height: 6px;
    background: var(--pink-soft);
    border-radius: 50%;
    box-shadow: 0 0 0 1.5px var(--white);
  }
  .deco-strip .dot.red {
    background: var(--cherry);
    box-shadow: 0 0 0 1.5px var(--white);
  }
  .deco-strip .dot.gold {
    background: var(--gold);
    box-shadow: 0 0 0 1.5px var(--white);
  }

  /* ============ POSITIONING SPARKLES & FLOWERS ============ */
  .s1 { top: 24%; left: 6%; }
  .s2 { top: 18%; right: 28%; transform: scale(0.8); }
  .s3 { top: 60%; left: 4%; transform: scale(1.1); }
  .s4 { top: 70%; right: 5%; transform: scale(0.9); }
  .s5 { top: 88%; left: 22%; }
  .s6 { top: 85%; right: 22%; transform: scale(0.85); }
  .s7 { top: 40%; left: 13%; transform: scale(0.7); }
  .s8 { top: 50%; right: 12%; transform: scale(0.75); }
  .s9 { top: 33%; left: 30%; transform: scale(0.6); }
  .s10 { top: 95%; right: 35%; transform: scale(0.8); }

  .st1 { top: 22%; right: 6%; }
  .st2 { top: 75%; left: 8%; transform: scale(1.2); }
  .st3 { top: 35%; right: 4%; transform: scale(0.9); }

  .t1 { top: 25%; left: 18%; }
  .t2 { top: 80%; right: 18%; }
  .t3 { top: 50%; left: 6%; }
  .t4 { top: 45%; right: 6%; }
  .t5 { top: 90%; left: 50%; }

  .f1 { top: 14%; left: 24%; }
  .f2 { top: 20%; right: 22%; transform: scale(0.85); }
  .f3 { top: 78%; left: 16%; transform: scale(0.9); }
  .f4 { top: 82%; right: 14%; transform: scale(1.1); }
  .f5 { top: 55%; left: 10%; transform: scale(0.7); }
  .f6 { top: 60%; right: 9%; transform: scale(0.8); }

  /* ============ ANIMATIONS ============ */
  @keyframes twinkle {
    0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
    50% { opacity: 0.6; transform: scale(0.8) rotate(45deg); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes flutter {
    0%, 100% { transform: rotate(-8deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.02); }
  }

  .sparkle.cross { animation: twinkle 2.5s ease-in-out infinite; }
  .sparkle.star5 { animation: twinkle 3s ease-in-out infinite; animation-delay: 0.4s; }
  .sparkle.solid { animation: twinkle 2.2s ease-in-out infinite; animation-delay: 0.8s; }

  .kitty { animation: bob 4s ease-in-out infinite; }
  .ribbon .loop.l { animation: sway 3s ease-in-out infinite; transform-origin: right center; }
  .ribbon .loop.r { animation: sway 3s ease-in-out infinite reverse; transform-origin: left center; }

  /* ============ STAMP / DATE STICKER ============ */
  .stamp {
    position: absolute;
    bottom: 100px;
    right: 40px;
    width: 70px;
    height: 70px;
    border: 2.5px dashed var(--cherry);
    border-radius: 50%;
    transform: rotate(-15deg);
    z-index: 18;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.6);
    text-align: center;
    padding: 4px;
  }
  .stamp::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--cherry);
    border-radius: 50%;
  }
  .stamp .stamp-text {
    font-family: 'Pacifico', cursive;
    font-size: 10px;
    color: var(--cherry);
    line-height: 1;
  }
  .stamp .stamp-year {
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    color: var(--cherry);
    font-weight: 700;
    line-height: 1;
    margin-top: 2px;
  }

  /* Corner hearts decoration */
  .corner-deco {
    position: absolute;
    z-index: 16;
  }
  .corner-deco.tl-heart { top: 175px; left: 175px; }
  .corner-deco.br-heart { bottom: 165px; right: 175px; }

  .heart-icon {
    position: relative;
    width: 22px;
    height: 20px;
  }
  .heart-icon::before,
  .heart-icon::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 18px;
    background: var(--cherry);
    border-radius: 12px 12px 0 0;
    top: 0;
    box-shadow: inset -2px 1px 0 rgba(255,255,255,0.3), 0 0 0 2px var(--ink);
  }
  .heart-icon::before {
    left: 0;
    transform: rotate(-45deg);
    transform-origin: 50% 100%;
  }
  .heart-icon::after {
    right: 0;
    transform: rotate(45deg);
    transform-origin: 50% 100%;
  }

  /* Polka dot accent corners */
  .polka-corner {
    position: absolute;
    z-index: 8;
    pointer-events: none;
  }
  .polka-corner.bl { bottom: 175px; left: 30px; width: 130px; height: 60px; }
  .polka-corner.tr { top: 175px; right: 30px; width: 130px; height: 60px; }

  .polka-corner .pd {
    position: absolute;
    background: var(--pink-soft);
    border-radius: 50%;
    box-shadow: 0 0 0 1.5px var(--white);
  }

  /* Responsive */
  @media (max-width: 720px) {
    .stage { aspect-ratio: 1 / 1.1; }
    .title { font-size: 36px; }
    .subtitle { font-size: 20px; }
    .kitty, .ribbon { transform: scale(0.75); transform-origin: top left; }
    .ribbon { transform-origin: top right; }
    .deco-strip.top { top: 150px; }
    .deco-strip.bottom { bottom: 100px; }
  }
</style>
</head>
