<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello Kitty — Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 30% 20%,#FFF0F5,transparent 55%),radial-gradient(ellipse at 70% 80%,#FFE8EE,transparent 60%),linear-gradient(135deg,#FFF5F8,#FDE8EE);min-height:100vh;display:grid;place-items:center;padding:14px;font-family:'Playfair Display',serif}
.stage{position:relative;width:min(600px,90vw);aspect-ratio:3/4}
.frame{position:absolute;inset:0;border-radius:24px;box-shadow:inset 0 0 0 12px #E891A0,inset 0 0 0 13px #FFF,inset 0 0 0 16px #E891A0,inset 0 0 0 17px #FFF,inset 0 0 60px rgba(232,145,160,.25),0 30px 60px rgba(0,0,0,.3);overflow:hidden;background:radial-gradient(ellipse at center,#fffdfe,#fff0f5)}
.photo-area{position:absolute;inset:48px 40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.photo-area .camera{font-size:60px;opacity:.12}
.photo-area .label{font-family:Georgia,serif;font-size:18px;color:#E891A0;opacity:.25}
.title{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none}
.title .main{font-family:'Playfair Display',serif;font-size:clamp(18px,3.5vw,28px);font-weight:900;color:#E891A0;letter-spacing:.04em;text-shadow:0 1px 0 #FFF,0 3px 8px rgba(232,145,160,.25)}
.title .sub{font-size:clamp(11px,1.8vw,14px);color:#D47A8A;margin-top:-2px;letter-spacing:.06em;font-style:italic}
.char{position:absolute;z-index:5;pointer-events:none}
.char.top-left{top:30px;left:18px}
.char.top-right{top:30px;right:18px}
.char svg{width:clamp(90px,16vw,130px);height:clamp(90px,16vw,130px);filter:drop-shadow(2px 3px 4px rgba(0,0,0,.1))}
.sparkle{position:absolute;z-index:3;pointer-events:none;font-size:20px;opacity:.25}
</style>
</head>
<body>
<div class="stage">
  <div class="frame">
    <div class="photo-area">
      <span class="camera">📷</span>
      <span class="label">your photo here</span>
    </div>
    <div class="title">
      <div class="main">HELLO KITTY</div>
      <div class="sub">sweet moments</div>
    </div>

    <!-- HELLO KITTY — top left -->
    <div class="char top-left">
      <svg viewBox="0 0 140 140">
        <!-- ears -->
        <polygon points="42,48 52,15 62,48" fill="#FFF" stroke="#E8E8E8" stroke-width="1.5"/>
        <polygon points="78,48 88,15 98,48" fill="#FFF" stroke="#E8E8E8" stroke-width="1.5"/>
        <polygon points="48,38 54,22 58,38" fill="#FFE8EC"/>
        <polygon points="82,38 88,22 94,38" fill="#FFE8EC"/>
        <!-- face -->
        <ellipse cx="70" cy="68" rx="40" ry="35" fill="#FFF" stroke="#E8E8E8" stroke-width="2"/>
        <!-- eyes -->
        <ellipse cx="56" cy="62" rx="4" ry="5" fill="#2D1B11"/>
        <ellipse cx="84" cy="62" rx="4" ry="5" fill="#2D1B11"/>
        <!-- nose -->
        <ellipse cx="70" cy="72" rx="5" ry="4" fill="#FFD700"/>
        <!-- whiskers -->
        <line x1="40" y1="68" x2="56" y2="70" stroke="#CCC" stroke-width="1"/>
        <line x1="40" y1="74" x2="56" y2="74" stroke="#CCC" stroke-width="1"/>
        <line x1="40" y1="80" x2="56" y2="78" stroke="#CCC" stroke-width="1"/>
        <line x1="100" y1="68" x2="84" y2="70" stroke="#CCC" stroke-width="1"/>
        <line x1="100" y1="74" x2="84" y2="74" stroke="#CCC" stroke-width="1"/>
        <line x1="100" y1="80" x2="84" y2="78" stroke="#CCC" stroke-width="1"/>
        <!-- red bow -->
        <g transform="translate(106,40)">
          <circle cx="0" cy="-4" r="10" fill="#E8443A"/>
          <ellipse cx="-16" cy="-2" rx="16" ry="10" fill="#E8443A" transform="rotate(-30)"/>
          <ellipse cx="16" cy="-2" rx="16" ry="10" fill="#E8443A" transform="rotate(30)"/>
          <circle cx="0" cy="-4" r="4" fill="#CC3330"/>
        </g>
      </svg>
    </div>

    <!-- BOW — top right -->
    <div class="char top-right">
      <svg viewBox="0 0 140 140">
        <ellipse cx="70" cy="50" rx="30" ry="22" fill="#E891A0"/>
        <ellipse cx="45" cy="55" rx="22" ry="16" fill="#FFB6C1" transform="rotate(-25,45,55)"/>
        <ellipse cx="95" cy="55" rx="22" ry="16" fill="#FFB6C1" transform="rotate(25,95,55)"/>
        <circle cx="70" cy="46" r="8" fill="#E8443A"/>
        <!-- ribbon tails -->
        <path d="M62 68 Q50 100 40 120" stroke="#E891A0" stroke-width="8" fill="none" stroke-linecap="round"/>
        <path d="M78 68 Q90 100 100 120" stroke="#FFB6C1" stroke-width="8" fill="none" stroke-linecap="round"/>
        <!-- small flowers -->
        <circle cx="20" cy="90" r="8" fill="#FFB6C1" opacity=".6"/>
        <circle cx="120" cy="80" r="6" fill="#FFD700" opacity=".4"/>
        <circle cx="30" cy="30" r="5" fill="#E891A0" opacity=".5"/>
      </svg>
    </div>

    <!-- Sparkle stars -->
    <div class="sparkle" style="top:130px;left:50%">✦</div>
    <div class="sparkle" style="top:160px;left:75%">✦</div>
    <div class="sparkle" style="top:50%;left:80%">✦</div>
    <div class="sparkle" style="top:65%;left:18%">✦</div>
    <div class="sparkle" style="top:78%;left:65%">✦</div>
  </div>
</div>
</body>
</html>
