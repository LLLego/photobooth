<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pucca & Garu — A Keepsake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Caveat:wght@500;700&family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box}

:root {
  --kraft: #E8DCC5;
  --kraft-dark: #D4C3A4;
  --kraft-shadow: #B89F7A;
  --cream: #FFF8EE;
  --red-pucca: #E10600;
  --red-deep: #8B0000;
  --red-wine: #5C0000;
  --ink: #2A1810;
}

body {
  background: 
    radial-gradient(circle at 20% 30%, #3A2418 0%, transparent 60%),
    radial-gradient(circle at 80% 70%, #2A1810 0%, transparent 60%),
    #1A0E08;
  background-attachment: fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family: 'Cormorant Garamond', serif;
  padding:30px;
}

/* Outer Wooden Tray / Shadow Box Frame */
.tray {
  position: relative;
  width: 1200px;
  height: 1600px;
  background: 
    repeating-linear-gradient(95deg, 
      rgba(0,0,0,0.08) 0px, 
      rgba(0,0,0,0.08) 2px, 
      transparent 2px, 
      transparent 8px),
    linear-gradient(45deg, #4A2C1A, #2D1B11, #4A2C1A);
  border-radius: 10px;
  padding: 30px;
  box-shadow: 
    0 30px 80px rgba(0,0,0,0.8),
    0 15px 30px rgba(0,0,0,0.5),
    inset 0 0 40px rgba(0,0,0,0.6);
}

/* Brass Corner Brads on Tray */
.tray::before, .tray::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  background: radial-gradient(circle at 35% 35%, #FFF7C4, #D4AF37 50%, #8B6914 100%);
  border-radius: 50%;
  box-shadow: inset 0 2px 4px rgba(255,255,255,0.5), 0 2px 4px rgba(0,0,0,0.5);
  top: 12px;
  z-index: 10;
}
.tray::before { left: 12px; }
.tray::after { right: 12px; }

/* The Kraft Paper Base */
.frame {
  position: relative;
  width: 100%;
  height: 100%;
  background-color: var(--kraft);
  background-image: 
    radial-gradient(circle at center, transparent 40%, rgba(139, 111, 71, 0.4) 100%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
  overflow: hidden;
  box-shadow: 
    inset 0 0 80px rgba(74, 47, 19, 0.4),
    inset 0 0 200px rgba(74, 47, 19, 0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 60px 40px;
}

/* Paper Creases / Grid Texture Overlay */
.frame::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    linear-gradient(90deg, transparent 49.8%, rgba(139, 111, 71, 0.1) 50%, transparent 50.2%),
    linear-gradient(0deg, transparent 33.2%, rgba(139, 111, 71, 0.1) 33.3%, transparent 33.4%);
  background-size: 120px 100%, 100% 120px;
  pointer-events: none;
  z-index: 0;
}

/* Subtle Polka Dot Pattern Overlay */
.frame::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(var(--red-pucca) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.05;
  pointer-events: none;
  z-index: 0;
}

/* --- TYPOGRAPHY --- */
.title {
  position: relative;
  text-align: center;
  z-index: 5;
  margin-top: 10px;
}

.title h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 84px;
  color: var(--red-deep);
  text-transform: uppercase;
  letter-spacing: 4px;
  line-height: 0.9;
  position: relative;
  text-shadow: 
    2px 2px 0px var(--kraft),
    4px 4px 0px rgba(139, 0, 0, 0.3);
}

.title h1::after {
  content: 'est. forever';
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 24px;
  color: var(--ink);
  display: block;
  letter-spacing: 8px;
  margin-top: 8px;
  text-transform: lowercase;
  opacity: 0.7;
  text-shadow: none;
}

.title .sub {
  font-family: 'Dancing Script', cursive;
  font-size: 48px;
  color: var(--red-pucca);
  margin-top: 15px;
  transform: rotate(-3deg);
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
}

.title .sub i {
  display: inline-block;
  margin: 0 15px;
  color: var(--red-deep);
  transform: translateY(4px) scale(1.2);
}

/* --- DECORATIVE ELEMENTS --- */

/* Washi Tape */
.tape {
  position: absolute;
  width: 160px;
  height: 40px;
  background: rgba(225, 6, 0, 0.6);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  z-index: 20;
  backdrop-filter: blur(2px);
  border-left: 2px dotted rgba(255,255,255,0.4);
  border-right: 2px dotted rgba(255,255,255,0.4);
}
.tape::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 50 Q 25 25, 50 50 T 100 50' stroke='%23fff' fill='none' opacity='0.3' stroke-width='2'/%3E%3C/svg%3E");
  background-size: 50px 100%;
}

.tape-1 { top: -15px; left: 100px; transform: rotate(-8deg); background: rgba(225, 6, 0, 0.5); }
.tape-2 { bottom: -15px; right: 100px; transform: rotate(6deg); background: rgba(255, 255, 255, 0.5); }
.tape-3 { top: 100px; right: -40px; transform: rotate(85deg); background: rgba(139, 0, 0, 0.4); }

/* Botanical & Flourishes SVG container */
.flourish {
  position: absolute;
  width: 220px;
  height: 220px;
  pointer-events: none;
  z-index: 4;
  opacity: 0.6;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
}
.bot-tl { top: 20px; left: 20px; transform: rotate(-15deg); }
.bot-tr { top: 20px; right: 20px; transform: rotate(105deg); }
.bot-br { bottom: 20px; right: 20px; transform: rotate(195deg); }
.bot-bl { bottom: 20px; left: 20px; transform: rotate(285deg); }

/* Vintage Postage Stamp */
.stamp {
  position: absolute;
  width: 140px;
  height: 160px;
  background: var(--cream);
  z-index: 15;
  padding: 8px;
  box-shadow: 3px 4px 10px rgba(0,0,0,0.2);
  transform: rotate(4deg);
  /* Perforated edge effect */
  --m: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 L100 0 L100 100 L0 100 Z' fill='%23000'/%3E%3C/svg%3E");
  -webkit-mask-image: radial-gradient(circle 5px at 5px 10px, transparent 98%, #fff) , radial-gradient(circle 5px at 10px 5px, transparent 98%, #fff);
  -webkit-mask-position: -5px -5px;
  clip-path: polygon(
    0% 5%, 3% 0%, 6% 5%, 9% 0%, 12% 5%, 15% 0%, 18% 5%, 21% 0%, 24% 5%, 27% 0%, 30% 5%, 33% 0%, 36% 5%, 39% 0%, 42% 5%, 45% 0%, 48% 5%, 51% 0%, 54% 5%, 57% 0%, 60% 5%, 63% 0%, 66% 5%, 69% 0%, 72% 5%, 75% 0%, 78% 5%, 81% 0%, 84% 5%, 87% 0%, 90% 5%, 93% 0%, 96% 5%, 99% 0%,
    100% 5%, 95% 8%, 100% 11%, 95% 14%, 100% 17%, 95% 20%, 100% 23%, 95% 26%, 100% 29%, 95% 32%, 100% 35%, 95% 38%, 100% 41%, 95% 44%, 100% 47%, 95% 50%, 100% 53%, 95% 56%, 100% 59%, 95% 62%, 100% 65%, 95% 68%, 100% 71%, 95% 74%, 100% 77%, 95% 80%, 100% 83%, 95% 86%, 100% 89%, 95% 92%, 100% 95%, 
    99% 100%, 96% 95%, 93% 100%, 90% 95%, 87% 100%, 84% 95%, 81% 100%, 78% 95%, 75% 100%, 72% 95%, 69% 100%, 66% 95%, 63% 100%, 60% 95%, 57% 100%, 54% 95%, 51% 100%, 48% 95%, 45% 100%, 42% 95%, 39% 100%, 36% 95%, 33% 100%, 30% 95%, 27% 100%, 24% 95%, 21% 100%, 18% 95%, 15% 100%, 12% 95%, 9% 100%, 6% 95%, 3% 100%, 0% 95%,
    0% 95%, 5% 92%, 0% 89%, 5% 86%, 0% 83%, 5% 80%, 0% 77%, 5% 74%, 0% 71%, 5% 68%, 0% 65%, 5% 62%, 0% 59%, 5% 56%, 0% 53%, 5% 50%, 0% 47%, 5% 44%, 0% 41%, 5% 38%, 0% 35%, 5% 32%, 0% 29%, 5% 26%, 0% 23%, 5% 20%, 0% 17%, 5% 14%, 0% 11%, 5% 8%
  );
}

.stamp-inner {
  width: 100%;
  height: 100%;
  background: var(--red-deep);
  border: 2px solid var(--gold);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--cream);
  font-family: 'Playfair Display', serif;
  position: relative;
}

.stamp-inner span:first-child { font-size: 10px; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.8; }
.stamp-inner i {
  font-size: 40px;
  font-style: normal;
  display: block;
  border: 3px double var(--cream);
  padding: 8px;
  border-radius: 50%;
  margin: 5px 0;
}
.stamp-inner span:last-child { font-size: 32px; font-weight: 900; }
.stamp-inner small { font-size: 8px; margin-top: 5px; letter-spacing: 1px; font-family: 'Caveat', cursive; }

.stamp-pos-1 { top: 200px; right: 60px; transform: rotate(8deg); }
.stamp-pos-2 { bottom: 240px; left: 50px; transform: rotate(-5deg); }

/* Wax Seal */
.seal {
  position: absolute;
  bottom: 80px;
  right: 80px;
  width: 120px;
  height: 120px;
  background: 
    radial-gradient(circle at 35% 35%, rgba(255,0,0,0.4), transparent 50%),
    radial-gradient(circle at 60% 60%, var(--red-wine), var(--red-deep));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 
    inset -10px -10px 20px rgba(0,0,0,0.6),
    inset 10px 10px 20px rgba(255,100,100,0.1),
    5px 8px 15px rgba(0,0,0,0.4);
  z-index: 25;
}
.seal::before {
  content: '';
  position: absolute;
  inset: 5px;
  border: 2px dashed rgba(255,200,200,0.2);
  border-radius: 50%;
}
.seal-content {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 32px;
  color: rgba(255,220,220,0.9);
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  z-index: 2;
  transform: rotate(-10deg);
}

/* Film Strip for Grid */
.strip {
  position: relative;
  width: 760px;
  height: 1050px;
  background: #111;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 25px 0;
  z-index: 1;
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.5),
    inset 0 0 20px rgba(0,0,0,0.8);
}

/* Film Sprockets */
.strip::before, .strip::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 30px;
  background-image: 
    linear-gradient(to bottom, 
      #111 0px, #111 10px, 
      transparent 10px, transparent 25px);
  background-size: 100% 35px;
  border-right: 1px solid #333;
  z-index: 5;
}
.strip::before { left: 0; }
.strip::after { right: 0; }

.slot {
  width: 660px;
  height: 240px;
  background: var(--cream);
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
}

/* Vintage Photo Slot styling - We don't have images, so we make the empty slot look like vintage paper */
.slot::after {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    linear-gradient(135deg, transparent 0%, rgba(0,0,0,0.05) 100%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.8' /%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
}

/* If the slots are just placeholders, let's add some decorative text */
.slot-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-5deg);
  font-family: 'Caveat', cursive;
  font-size: 28px;
  color: rgba(0,0,0,0.2);
  text-align: center;
  z-index: 1;
}

/* Tape on photo strips */
.photo-tape {
  position: absolute;
  width: 120px;
  height: 35px;
  background: rgba(255, 255, 255, 0.3);
  top: -15px;
  left: 50%;
  transform: translateX(-50%) rotate(2deg);
  z-index: 10;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  border-left: 1px dashed rgba(255,255,255,0.5);
  border-right: 1px dashed rgba(255,255,255,0.5);
}

/* Footer / Journaling Tag */
.footer {
  position: relative;
  width: 400px;
  height: 80px;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 15;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.2);
  /* Tag hole */
  clip-path: polygon(2% 0%, 98% 0%, 100% 50%, 98% 100%, 2% 100%, 0% 50%);
  transform: rotate(-1deg);
  margin-bottom: 10px;
}

.footer::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 8px;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  background: #111;
  border-radius: 50%;
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.3);
}

.footer-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--ink);
  text-align: center;
  line-height: 1.4;
}
.footer-text strong {
  display: block;
  font-family: 'Playfair Display', serif;
  font-style: normal;
  font-weight: 700;
  letter-spacing: 2px;
  font-size: 16px;
  color: var(--red-deep);
  margin-bottom: 2px;
}

/* Hanging String for Tag */
.footer::after {
  content: '';
  position: absolute;
  top: -20px;
  left: 14px;
  width: 2px;
  height: 20px;
  background: #333;
  z-index: -1;
}

/* --- CHARACTERS --- */
/* PLEASE NOTE: The prompt indicates character image tags should be in specific classes.
   While the CSS for .char is defined, the user MUST paste their <img> tags here.
   The positioning is updated to be INSIDE the tray overlay. */
.char {
  position: absolute;
  width: 160px;
  height: 160px;
  z-index: 30;
  filter: drop-shadow(4px 6px 8px rgba(0,0,0,0.4));
  /* Glue drop effect */
}
.char img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.tl { top: 120px; left: 120px; transform: rotate(-8deg); }
.tr { top: 120px; right: 120px; transform: rotate(8deg) scaleX(-1); }
.bl { bottom: 120px; left: 120px; transform: rotate(8deg); }
.br { bottom: 120px; right: 120px; transform: rotate(-8deg) scaleX(-1); }

/* Paperclip simulation on top characters */
.tl::before, .tr::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 50px;
  border: 3px solid #888;
  border-radius: 10px;
  border-bottom: none;
  z-index: 5;
  box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}
.tl::after, .tr::after {
  content: '';
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%) translateX(3px);
  width: 3px;
  height: 45px;
  background: #888;
  z-index: 6;
  box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

/* Floating Hearts */
.heart {
  position: absolute;
  color: rgba(225, 6, 0, 0.4);
  font-size: 40px;
  z-index: 2;
  pointer-events: none;
}
.h1 { top: 100px; left: 500px; transform: rotate(-15deg) scale(1.5); }
.h2 { top: 50px; right: 300px; transform: rotate(20deg); }
.h3 { bottom: 250px; right: 200px; transform: rotate(45deg) scale(0.8); }
.h4 { bottom: 300px; left: 100px; transform: rotate(-10deg) scale(1.2); }

</style>
</head>
<body>

<div class="tray">
  <div class="frame">

    <!-- Washi Tapes -->
    <div class="tape tape-1"></div>
    <div class="tape tape-2"></div>
    <div class="tape tape-3"></div>

    <!-- Botanical SVG (Single source, rotated via CSS) -->
    <svg class="flourish bot-tl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 180 Q50 100 180 20" stroke="#4A2C1A" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M40 120 Q60 80 100 80" stroke="#4A2C1A" stroke-width="1.5" fill="none"/>
      <path d="M60 100 Q80 120 100 100" stroke="#4A2C1A" stroke-width="1.5" fill="none"/>
      <circle cx="100" cy="80" r="5" fill="#E10600" opacity="0.6"/>
      <circle cx="80" cy="110" r="3" fill="#E10600" opacity="0.4"/>
      <path d="M20 180 C30 160 50 150 70 160 C50 170 30 180 20 180 Z" fill="#8FBC8F" opacity="0.6"/>
      <path d="M50 150 C60 130 80 120 100 130 C80 140 60 160 50 150 Z" fill="#8FBC8F" opacity="0.5"/>
    </svg>

    <svg class="flourish bot-tr" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
       <path d="M20 180 Q50 100 180 20" stroke="#4A2C1A" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M40 120 Q60 80 100 80" stroke="#4A2C1A" stroke-width="1.5" fill="none"/>
      <path d="M60 100 Q80 120 100 100" stroke="#4A2C1A" stroke-width="1.5" fill="none"/>
      <circle cx="100" cy="80" r="5" fill="#E10600" opacity="0.6"/>
    </svg>
    
    <svg class="flourish bot-br" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 180 Q50 100 180 20" stroke="#4A2C1A" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M40 120 Q60 80 100 80" stroke="#4A2C1A" stroke-width="1.5" fill="none"/>
    </svg>

    <svg class="flourish bot-bl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 180 Q50 100 180 20" stroke="#4A2C1A" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M40 120 Q60 80 100 80" stroke="#4A2C1A" stroke-width="1.5" fill="none"/>
      <circle cx="100" cy="80" r="5" fill="#E10600" opacity="0.6"/>
    </svg>

    <!-- Header -->
    <div class="title">
      <h1>Pucca &amp; Garu</h1>
      <div class="sub">kiss <i class="icon-heart">♥</i> laugh <i class="icon-heart">♥</i> love</div>
    </div>

    <!-- Postage Stamps -->
    <div class="stamp stamp-pos-1">
      <div class="stamp-inner">
        <span>AIR MAIL</span>
        <i class="icon-heart">♥</i>
        <span>42</span>
        <small>Forever</small>
      </div>
    </div>

    <div class="stamp stamp-pos-2">
      <div class="stamp-inner">
        <span>FROM</span>
        <i class="icon-heart">♥</i>
        <span>SO GA</span>
        <small>With Love</small>
      </div>
    </div>

    <!-- Floating Hearts -->
    <div class="heart h1">♥</div>
    <div class="heart h2">♥</div>
    <div class="heart h3">♥</div>
    <div class="heart h4">♥</div>

    <!-- CHARACTER IMAGES (User must paste the actual img tags here) -->
    <!-- I am simulating the presence based on the prompt instructions to keep them unchanged -->
    <div class="char tl"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAfIAAAHACAY..." alt="Pucca"></div>
    <div class="char tr"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAfIAAAHACAY..." alt="Garu"></div>
    <div class="char bl"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAfIAAAHACAY..." alt="Ching"></div>
    <div class="char br"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAfIAAAHACAY..." alt="Abyo"></div>

    <!-- Photo Grid (Film Strip) -->
    <div class="strip">
      <div class="slot">
        <div class="photo-tape"></div>
        <div class="slot-text">Smile!</div>
        <div class="one"></div>
      </div>
      <div class="slot">
        <div class="slot-text">Goofy Face</div>
        <div class="one"></div>
      </div>
      <div class="slot">
        <div class="slot-text">Silly Face</div>
        <div class="one"></div>
      </div>
      <div class="slot">
        <div class="photo-tape"></div>
        <div class="slot-text">Kiss! ♥</div>
        <div class="one"></div>
      </div>
    </div>

    <!-- Footer Tag -->
    <div class="footer">
      <div class="footer-text">
        <strong>MEMORIES</strong>
        Our Special Day at Sooga Village
      </div>
    </div>

    <!-- Wax Seal -->
    <div class="seal">
      <div class="seal-content">P&G</div>
    </div>

  </div>
</div>

</body>
