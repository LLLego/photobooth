<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hundred Acre Gang · Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --honey:#E8C547;
    --honey-deep:#FFB400;
    --honey-amber:#D49A1C;
    --honey-shadow:#9B6F12;
    --cream:#FFFAF0;
    --cream-2:#F4E8D0;
    --paper:#FBF1DC;
    --paper-shade:#E9D9B5;
    --choco:#4A2515;
    --choco-soft:#6B3A24;
    --choco-light:#8B5A3C;
    --ink:#2C1408;
    --blush:#F4A09C;
    --leaf:#7A9249;
    --leaf-deep:#5C7335;
  }

  html,body{
    min-height:100vh;
    font-family:'Playfair Display',serif;
    color:var(--choco);
    background:#2A160A;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,250,240,0.012) 0px, rgba(255,250,240,0.012) 2px, transparent 2px, transparent 5px),
      radial-gradient(circle at 30% 20%, #3a1f10 0%, #1f0e05 70%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 20px;
  }

  /* ============== WRAPPER ============== */
  .stage{
    width:min(1180px, 96vw);
    aspect-ratio:8/6;
    position:relative;
  }

  /* ============== BASE FRAME — paper sheet ============== */
  .frame{
    position:absolute;
    inset:0;
    background:var(--cream);
    background-image:
      /* grain */
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.29  0 0 0 0 0.15  0 0 0 0 0.08  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>"),
      /* fiber streaks */
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='f'><feTurbulence baseFrequency='0.012 0.18' numOctaves='1'/><feColorMatrix values='0 0 0 0 0.29  0 0 0 0 0.15  0 0 0 0 0.08  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23f)'/></svg>"),
      /* base paper tint */
      radial-gradient(ellipse at 50% 40%, #FFFAF0 0%, #F6E9CC 75%, #ECDAB2 100%);
    background-blend-mode:multiply, multiply, normal;
    overflow:hidden;
    box-shadow:
      inset 0 0 0 1px rgba(74,37,21,0.25),
      inset 0 0 0 6px var(--cream),
      inset 0 0 0 7px rgba(74,37,21,0.5),
      inset 0 0 80px rgba(155,111,18,0.18),
      inset 0 0 200px rgba(74,37,21,0.12),
      0 30px 60px -10px rgba(0,0,0,0.6),
      0 60px 100px -20px rgba(0,0,0,0.5);
    border-radius:3px;
    transform:rotate(-0.2deg);
  }

  /* worn corner shadows */
  .frame::before{
    content:"";
    position:absolute;inset:0;
    background:
      radial-gradient(circle at 0% 0%, rgba(74,37,21,0.28) 0%, transparent 18%),
      radial-gradient(circle at 100% 0%, rgba(74,37,21,0.22) 0%, transparent 16%),
      radial-gradient(circle at 0% 100%, rgba(74,37,21,0.30) 0%, transparent 20%),
      radial-gradient(circle at 100% 100%, rgba(74,37,21,0.24) 0%, transparent 18%);
    pointer-events:none;
    mix-blend-mode:multiply;
  }
  /* tea stains */
  .frame::after{
    content:"";
    position:absolute;inset:0;
    background-image:
      radial-gradient(ellipse 60px 30px at 12% 22%, rgba(155,111,18,0.18), transparent 70%),
      radial-gradient(ellipse 80px 50px at 88% 78%, rgba(155,111,18,0.16), transparent 70%),
      radial-gradient(ellipse 40px 25px at 78% 15%, rgba(155,111,18,0.14), transparent 70%),
      radial-gradient(ellipse 50px 30px at 18% 85%, rgba(155,111,18,0.18), transparent 70%);
    pointer-events:none;
    mix-blend-mode:multiply;
  }

  /* ============== DECORATIVE BORDER LAYERS ============== */

  /* outer thin ruled line with dashing */
  .ruled{
    position:absolute;
    inset:22px;
    border:1.5px dashed rgba(74,37,21,0.35);
    border-radius:2px;
    pointer-events:none;
  }

  /* double inner frame */
  .double-frame{
    position:absolute;
    inset:42px;
    border:2px solid var(--choco);
    box-shadow:
      inset 0 0 0 4px var(--cream),
      inset 0 0 0 5px rgba(74,37,21,0.7),
      inset 0 0 0 14px var(--cream),
      inset 0 0 0 15px var(--honey),
      inset 0 0 0 17px var(--honey-amber),
      inset 0 0 0 19px var(--choco);
    pointer-events:none;
    border-radius:2px;
  }

  /* corner filigree (svg) */
  .corner-art{
    position:absolute;
    width:170px;height:170px;
    pointer-events:none;
    opacity:0.92;
  }
  .corner-art.tl{ top:36px; left:36px; transform:rotate(0deg);}
  .corner-art.tr{ top:36px; right:36px; transform:rotate(90deg);}
  .corner-art.br{ bottom:36px; right:36px; transform:rotate(180deg);}
  .corner-art.bl{ bottom:36px; left:36px; transform:rotate(270deg);}

  /* ============== TITLE PLATE ============== */
  .title-plate{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%) rotate(-1deg);
    z-index:8;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    pointer-events:none;
  }
  .title-eyebrow{
    font-family:'Amatic SC', cursive;
    font-weight:700;
    font-size:18px;
    letter-spacing:0.6em;
    color:var(--choco-soft);
    text-transform:uppercase;
    padding-left:0.6em;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .title-eyebrow::before,
  .title-eyebrow::after{
    content:"";
    display:inline-block;
    width:30px;height:1px;
    background:var(--choco-soft);
    transform:translateY(-2px);
  }
  .title-main{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-style:italic;
    font-size:clamp(36px, 5.4vw, 62px);
    color:var(--choco);
    line-height:0.95;
    letter-spacing:0.02em;
    text-shadow:
      1px 1px 0 var(--honey),
      2px 2px 0 var(--honey-deep),
      3px 3px 0 rgba(74,37,21,0.2);
    position:relative;
    padding:0 30px;
  }
  .title-main::before,
  .title-main::after{
    content:"❦";
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:0.5em;
    color:var(--honey-amber);
    font-style:normal;
    text-shadow:none;
  }
  .title-main::before{ left:0;}
  .title-main::after{ right:0; transform:translateY(-50%) scaleX(-1);}

  .title-swash{
    width:280px;
    height:18px;
    margin-top:4px;
    overflow:visible;
  }

  .title-sub{
    font-family:'Caveat', cursive;
    font-size:20px;
    color:var(--choco-soft);
    margin-top:-2px;
    transform:rotate(-1deg);
    letter-spacing:0.02em;
  }

  /* ============== POLAROID ============== */
  .polaroid-wrap{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -48%) rotate(0.4deg);
    width:62%;
    max-width:620px;
    aspect-ratio:4/4.6;
    z-index:5;
  }
  .polaroid{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, #FFFEF7 0%, #FBF2DC 100%);
    padding:26px 26px 110px 26px;
    border-radius:2px;
    box-shadow:
      inset 0 0 0 1px rgba(74,37,21,0.18),
      0 1px 0 rgba(255,255,255,0.6),
      0 18px 28px -8px rgba(0,0,0,0.35),
      0 36px 60px -10px rgba(0,0,0,0.25),
      0 60px 90px -20px rgba(0,0,0,0.2);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.29  0 0 0 0 0.15  0 0 0 0 0.08  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-blend-mode:multiply;
  }
  /* tape on top */
  .tape{
    position:absolute;
    top:-18px;
    width:120px;
    height:36px;
    background:rgba(232,197,71,0.55);
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.25) 0 6px, transparent 6px 12px),
      linear-gradient(180deg, rgba(255,255,255,0.4), rgba(212,154,28,0.3));
    border:1px solid rgba(155,111,18,0.3);
    box-shadow:0 4px 10px -4px rgba(0,0,0,0.3);
  }
  .tape.left{ left:8%; transform:rotate(-7deg);}
  .tape.right{ right:8%; transform:rotate(6deg);}

  /* photo opening */
  .photo-slot{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:
      repeating-linear-gradient(45deg, rgba(74,37,21,0.06) 0 6px, rgba(74,37,21,0.02) 6px 12px),
      var(--paper-shade);
    border:1px solid rgba(74,37,21,0.5);
    box-shadow:
      inset 0 0 0 4px var(--cream),
      inset 0 0 0 5px rgba(74,37,21,0.3),
      inset 0 0 40px rgba(74,37,21,0.25);
    overflow:hidden;
  }
  .photo-slot::before{
    content:"place photo here";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Caveat', cursive;
    font-size:clamp(16px,2vw,22px);
    color:rgba(74,37,21,0.3);
    transform:rotate(-4deg);
    letter-spacing:0.05em;
    pointer-events:none;
  }
  /* corner registration marks on photo */
  .photo-slot::after{
    content:"";
    position:absolute;
    inset:10px;
    background:
      linear-gradient(var(--choco),var(--choco)) 0 0/14px 1px no-repeat,
      linear-gradient(var(--choco),var(--choco)) 0 0/1px 14px no-repeat,
      linear-gradient(var(--choco),var(--choco)) 100% 0/14px 1px no-repeat,
      linear-gradient(var(--choco),var(--choco)) 100% 0/1px 14px no-repeat,
      linear-gradient(var(--choco),var(--choco)) 0 100%/14px 1px no-repeat,
      linear-gradient(var(--choco),var(--choco)) 0 100%/1px 14px no-repeat,
      linear-gradient(var(--choco),var(--choco)) 100% 100%/14px 1px no-repeat,
      linear-gradient(var(--choco),var(--choco)) 100% 100%/1px 14px no-repeat;
    opacity:0.4;
    pointer-events:none;
  }

  /* caption strip */
  .caption{
    position:absolute;
    left:26px;
    right:26px;
    bottom:18px;
    height:80px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:8px;
  }
  .caption-line{
    border-bottom:1.5px solid rgba(74,37,21,0.25);
    height:24px;
    position:relative;
  }
  .caption-line::before{
    content:"";
    position:absolute;
    left:0;bottom:6px;
    width:8px;height:8px;
    border-radius:50%;
    background:var(--honey-amber);
    box-shadow:0 0 0 2px var(--cream), 0 0 0 3px rgba(74,37,21,0.3);
  }
  .caption-text{
    font-family:'Caveat', cursive;
    font-size:30px;
    color:var(--choco);
    line-height:1;
    transform:rotate(-1.5deg);
    align-self:flex-start;
    padding-left:18px;
    text-shadow:0 1px 0 rgba(255,255,255,0.5);
  }
  .caption-meta{
    display:flex;
    justify-content:space-between;
    font-family:'Kalam', cursive;
    font-size:11px;
    color:var(--choco-soft);
    letter-spacing:0.15em;
    text-transform:uppercase;
    padding-left:18px;
    margin-top:4px;
  }
  .caption-meta span{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .caption-meta b{
    font-weight:700;
    color:var(--choco);
  }

  /* ============== CHARACTERS ============== */
  .character{
    position:absolute;
    z-index:6;
    pointer-events:none;
    filter:
      drop-shadow(0 12px 14px rgba(74,37,21,0.3))
      drop-shadow(0 4px 6px rgba(74,37,21,0.2));
  }
  .character.pooh{
    top:-30px;
    left:-40px;
    width:230px;
    transform:rotate(-6deg);
  }
  .character.piglet{
    top:-15px;
    right:-25px;
    width:170px;
    transform:rotate(7deg);
  }
  .character.tigger{
    bottom:-35px;
    left:-30px;
    width:220px;
    transform:rotate(8deg);
  }
  .character.eeyore{
    bottom:-25px;
    right:-40px;
    width:240px;
    transform:rotate(-5deg);
  }

  /* name tags on characters */
  .nametag{
    position:absolute;
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:22px;
    color:var(--choco);
    background:var(--cream);
    padding:2px 14px 4px;
    border:1.5px solid var(--choco);
    box-shadow:
      inset 0 0 0 3px var(--cream),
      inset 0 0 0 4px var(--honey-amber),
      0 4px 6px -2px rgba(0,0,0,0.3);
    transform:rotate(-3deg);
    z-index:7;
    pointer-events:none;
  }
  .nametag.pooh{ top:135px; left:120px; transform:rotate(-4deg);}
  .nametag.piglet{ top:95px; right:120px; transform:rotate(4deg);}
  .nametag.tigger{ bottom:130px; left:130px; transform:rotate(3deg); background:var(--honey);}
  .nametag.eeyore{ bottom:135px; right:140px; transform:rotate(-2deg);}

  /* ============== SCATTERED DECORATIONS ============== */
  .scatter{
    position:absolute;
    pointer-events:none;
    z-index:4;
  }
  .honey-pot-1{ top:140px; left:60px; width:60px; transform:rotate(-18deg);}
  .honey-pot-2{ bottom:160px; right:90px; width:50px; transform:rotate(22deg);}
  .leaf-1{ top:100px; right:230px; width:46px; transform:rotate(-32deg); opacity:0.85;}
  .leaf-2{ bottom:110px; left:240px; width:52px; transform:rotate(48deg); opacity:0.8;}
  .leaf-3{ top:280px; right:80px; width:38px; transform:rotate(15deg); opacity:0.75;}
  .acorn-1{ top:200px; left:120px; width:30px; transform:rotate(-12deg);}
  .acorn-2{ bottom:240px; right:160px; width:28px; transform:rotate(20deg);}
  .bee-1{ top:170px; right:340px; width:34px; transform:rotate(8deg);}
  .bee-2{ top:340px; left:80px; width:28px; transform:rotate(-22deg);}
  .balloon{ top:240px; right:130px; width:70px; transform:rotate(10deg); opacity:0.95;}
  .cloud-1{ top:80px; left:280px; width:120px; opacity:0.4;}
  .star-1{ top:130px; right:200px; width:24px;}
  .star-2{ bottom:200px; left:180px; width:20px;}

  /* dotted flight paths */
  .flight-path{
    position:absolute;
    pointer-events:none;
    z-index:3;
    opacity:0.45;
  }
  .flight-path.one{
    top:160px; left:160px;
    width:200px; height:60px;
  }

  /* bottom plate */
  .footer-plate{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%) rotate(-0.5deg);
    z-index:7;
    display:flex;
    align-items:center;
    gap:18px;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:13px;
    color:var(--choco);
    letter-spacing:0.25em;
    text-transform:uppercase;
  }
  .footer-plate .divider{
    width:60px;
    height:1px;
    background:var(--choco);
    position:relative;
  }
  .footer-plate .divider::before,
  .footer-plate .divider::after{
    content:"";
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:5px;height:5px;
    background:var(--honey-deep);
    border:1px solid var(--choco);
    border-radius:50%;
  }
  .footer-plate .divider::before{ left:-3px;}
  .footer-plate .divider::after{ right:-3px;}

  /* postage stamp */
  .stamp{
    position:absolute;
    top:75px;
    right:75px;
    width:80px;
    height:95px;
    z-index:7;
    background:
      linear-gradient(135deg, var(--honey) 0%, var(--honey-amber) 100%);
    padding:4px;
    transform:rotate(6deg);
    box-shadow:
      0 6px 12px -4px rgba(0,0,0,0.4),
      inset 0 0 0 1px rgba(74,37,21,0.4);
    /* perforated edge via radial mask */
    -webkit-mask:
      radial-gradient(circle 4px at 0% 12.5%, transparent 98%, black 100%) 0 0/12px 12px,
      radial-gradient(circle 4px at 12.5% 0%, transparent 98%, black 100%) 0 0/12px 12px;
  }
  .stamp-inner{
    width:100%;height:100%;
    background:var(--cream);
    border:1px solid var(--choco);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:6px;
    text-align:center;
    gap:3px;
  }
  .stamp-inner .stamp-icon{
    width:34px;height:34px;
  }
  .stamp-inner .stamp-title{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:700;
    font-size:9px;
    color:var(--choco);
    letter-spacing:0.1em;
    line-height:1;
  }
  .stamp-inner .stamp-value{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:14px;
    color:var(--choco);
    border-top:1px solid var(--choco);
    padding-top:2px;
    margin-top:2px;
    width:100%;
  }

  /* date marker */
  .date-marker{
    position:absolute;
    top:80px;
    left:78px;
    z-index:7;
    font-family:'Kalam', cursive;
    transform:rotate(-4deg);
    color:var(--choco);
    line-height:1.2;
  }
  .date-marker .day{
    font-size:36px;
    font-weight:700;
    display:block;
  }
  .date-marker .month{
    font-size:13px;
    letter-spacing:0.2em;
    text-transform:uppercase;
  }
  .date-marker .year{
    font-size:11px;
    color:var(--choco-soft);
    letter-spacing:0.15em;
    margin-top:2px;
  }

  /* tiny hearts fluttering */
  .heart{
    position:absolute;
    z-index:5;
    pointer-events:none;
  }
  .heart.h1{ top:190px; left:90px; width:18px; transform:rotate(-15deg); opacity:0.7;}
  .heart.h2{ top:380px; right:100px; width:14px; transform:rotate(20deg); opacity:0.6;}
  .heart.h3{ bottom:340px; left:140px; width:16px; opacity:0.65;}

  /* side ribbon banners */
  .ribbon{
    position:absolute;
    z-index:6;
    font-family:'Amatic SC', cursive;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.3em;
    color:var(--choco);
    text-transform:uppercase;
    pointer-events:none;
  }
  .ribbon.left{
    left:50px;
    top:50%;
    transform:translateY(-50%) rotate(-90deg);
    transform-origin:left center;
  }
  .ribbon.right{
    right:50px;
    top:50%;
    transform:translateY(-50%) rotate(90deg);
    transform-origin:right center;
  }
  .ribbon span{
    background:var(--cream);
    padding:3px 12px;
    border-top:1px solid var(--choco);
    border-bottom:1px solid var(--choco);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="frame"></div>

  <!-- ruled dashed line -->
  <div class="ruled"></div>

  <!-- double ornamental frame -->
  <div class="double-frame"></div>

  <!-- corner filigree -->
  <svg class="corner-art tl" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#4A2515" stroke-width="1.5" stroke-linecap="round">
      <path d="M5 65 Q 5 5, 65 5" />
      <path d="M15 65 Q 15 15, 65 15" stroke="#D49A1C"/>
      <path d="M25 70 Q 25 25, 70 25" />
      <circle cx="65" cy="65" r="4" fill="#E8C547" stroke="#4A2515"/>
      <path d="M65 65 Q 80 50, 95 55 Q 90 70, 75 72 Q 70 70, 65 65 Z" fill="#E8C547" stroke="#4A2515"/>
      <path d="M40 40 L 50 30 M 35 50 L 45 45 M 50 35 L 55 25" />
      <path d="M5 80 Q 20 85, 25 100 Q 30 90, 40 95" fill="#E8C547"/>
      <path d="M80 5 Q 85 20, 100 25 Q 90 30, 95 40" fill="#E8C547"/>
    </g>
  </svg>

  <svg class="corner-art tr" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#4A2515" stroke-width="1.5" stroke-linecap="round">
      <path d="M5 65 Q 5 5, 65 5" />
      <path d="M15 65 Q 15 15, 65 15" stroke="#D49A1C"/>
      <path d="M25 70 Q 25 25, 70 25" />
      <circle cx="65" cy="65" r="4" fill="#E8C547" stroke="#4A2515"/>
      <path d="M65 65 Q 80 50, 95 55 Q 90 70, 75 72 Q 70 70, 65 65 Z" fill="#E8C547" stroke="#4A2515"/>
      <path d="M40 40 L 50 30 M 35 50 L 45 45 M 50 35 L 55 25" />
      <path d="M5 80 Q 20 85, 25 100 Q 30 90, 40 95" fill="#E8C547"/>
      <path d="M80 5 Q 85 20, 100 25 Q 90 30, 95 40" fill="#E8C547"/>
