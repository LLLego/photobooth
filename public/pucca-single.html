<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PUCCA & GARU — Photobooth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bowlby+One&family=Caveat:wght@700&family=Limelight&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: 
      radial-gradient(circle at 20% 30%, rgba(232,68,58,0.05) 0%, transparent 50%),
      #2a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Bowlby One', sans-serif;
  }

  /* Wrapper holds everything so stickers can overflow */
  .stage {
    position: relative;
    width: 1080px;
    height: 1620px;
  }

  /* ========== MAIN FRAME ========== */
  .frame {
    position: relative;
    width: 100%;
    height: 100%;
    background: 
      /* paper grain */
      repeating-linear-gradient(
        43deg,
        transparent 0px,
        transparent 2px,
        rgba(255,245,230,0.018) 2px,
        rgba(255,245,230,0.018) 3px
      ),
      repeating-linear-gradient(
        -47deg,
        transparent 0px,
        transparent 3px,
        rgba(26,26,46,0.025) 3px,
        rgba(26,26,46,0.025) 4px
      ),
      #1A1A2E;
    border: 4px solid #1A1A2E;
    overflow: hidden;
  }

  /* Inner cream mat with deckled/torn feel via layered box-shadows */
  .mat {
    position: absolute;
    top: 40px; left: 40px; right: 40px; bottom: 40px;
    background: 
      /* halftone dots */
      radial-gradient(circle at center, rgba(232,68,58,0.08) 1px, transparent 1.5px) 0 0 / 14px 14px,
      /* cream base */
      #FAF1E0;
    border: 3px solid #1A1A2E;
    box-shadow: 
      inset 0 0 0 8px #FAF1E0,
      inset 0 0 0 10px #E8443A,
      inset 0 0 0 14px #FAF1E0,
      inset 0 0 0 16px #1A1A2E;
  }

  /* hand-drawn dashed accent inside cream */
  .mat::before {
    content: '';
    position: absolute;
    inset: 30px;
    border: 2px dashed #E8443A;
    pointer-events: none;
    opacity: 0.6;
  }

  /* corner tickets / washi-tape feel */
  .corner {
    position: absolute;
    width: 90px;
    height: 90px;
    background: #E8443A;
    z-index: 4;
  }
  .corner::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        45deg,
        transparent 0,
        transparent 8px,
        #1A1A2E 8px,
        #1A1A2E 10px
      );
    opacity: 0.25;
  }
  .corner.tl { top: 30px; left: 30px; clip-path: polygon(0 0, 100% 0, 0 100%); }
  .corner.tr { top: 30px; right: 30px; clip-path: polygon(0 0, 100% 0, 100% 100%); }
  .corner.bl { bottom: 30px; left: 30px; clip-path: polygon(0 0, 100% 100%, 0 100%); }
  .corner.br { bottom: 30px; right: 30px; clip-path: polygon(100% 0, 100% 100%, 0 100%); }

  /* ========== TITLE PLATE ========== */
  .titleplate {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    z-index: 6;
    background: #FAF1E0;
    border: 4px solid #1A1A2E;
    padding: 14px 38px 10px;
    box-shadow: 6px 6px 0 #E8443A, 12px 12px 0 #1A1A2E;
    text-align: center;
  }
  .titleplate h1 {
    font-family: 'Bowlby One', sans-serif;
    font-size: 64px;
    color: #E8443A;
    letter-spacing: 2px;
    line-height: 0.95;
    text-shadow: 3px 3px 0 #1A1A2E;
  }
  .titleplate h1 .amp {
    color: #1A1A2E;
    text-shadow: 3px 3px 0 #E8443A;
    display: inline-block;
    transform: rotate(8deg);
    margin: 0 4px;
  }
  .titleplate .sub {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: #1A1A2E;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* ========== PHOTO WINDOW ========== */
  .photo {
    position: absolute;
    top: 260px;
    left: 110px;
    right: 110px;
    bottom: 360px;
    background: 
      repeating-linear-gradient(
        135deg,
        #2a2540 0,
        #2a2540 10px,
        #1A1A2E 10px,
        #1A1A2E 20px
      );
    border: 6px solid #1A1A2E;
    box-shadow:
      0 0 0 4px #E8443A,
      0 0 0 8px #FAF1E0,
      0 0 0 11px #1A1A2E,
      14px 14px 0 rgba(232,68,58,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* photo corner staples */
  .photo::before, .photo::after {
    content: '';
    position: absolute;
    width: 36px;
    height: 12px;
    background: #1A1A2E;
    z-index: 5;
  }
  .photo::before {
    top: -6px;
    left: 30px;
    transform: rotate(-8deg);
    box-shadow: 0 2px 0 #FAF1E0 inset;
  }
  .photo::after {
    bottom: -6px;
    right: 30px;
    transform: rotate(6deg);
  }

  .photo .placeholder {
    font-family: 'Caveat', cursive;
    color: rgba(250,241,224,0.5);
    font-size: 38px;
    transform: rotate(-4deg);
    text-align: center;
  }

  /* tape strips over photo corners */
  .tape {
    position: absolute;
    width: 80px;
    height: 26px;
    background: 
      repeating-linear-gradient(
        90deg,
        rgba(250,241,224,0.55) 0,
        rgba(250,241,224,0.55) 6px,
        rgba(250,241,224,0.35) 6px,
        rgba(250,241,224,0.35) 12px
      );
    border-left: 1px dashed rgba(26,26,46,0.3);
    border-right: 1px dashed rgba(26,26,46,0.3);
    z-index: 7;
  }
  .tape.t1 { top: 240px; left: 60px; transform: rotate(-32deg); }
  .tape.t2 { bottom: 320px; right: 60px; transform: rotate(-32deg); }

  /* ========== CHARACTERS ========== */
  .character {
    position: absolute;
    z-index: 8;
    filter: drop-shadow(6px 8px 0 #1A1A2E);
  }
  .character img {
    display: block;
    width: 100%;
    height: auto;
  }

  .pucca {
    top: 30px;
    left: -40px;
    width: 320px;
    transform: rotate(-6deg);
  }

  .garu {
    top: 50px;
    right: -50px;
    width: 300px;
    transform: rotate(7deg);
  }

  /* name tags under characters */
  .nametag {
    position: absolute;
    z-index: 9;
    background: #1A1A2E;
    color: #FAF1E0;
    font-family: 'Bowlby One', sans-serif;
    font-size: 18px;
    padding: 6px 14px 4px;
    letter-spacing: 2px;
    border: 3px solid #FAF1E0;
    box-shadow: 3px 3px 0 #E8443A;
  }
  .nametag.pucca-tag {
    top: 270px;
    left: 60px;
    transform: rotate(-8deg);
    color: #E8443A;
  }
  .nametag.garu-tag {
    top: 280px;
    right: 60px;
    transform: rotate(6deg);
  }

  /* speech bubble */
  .bubble {
    position: absolute;
    top: 200px;
    left: 280px;
    z-index: 9;
    background: #FAF1E0;
    border: 4px solid #1A1A2E;
    border-radius: 50%;
    padding: 22px 26px 18px;
    width: 130px;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-12deg);
    box-shadow: 5px 5px 0 #E8443A;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 20px;
    width: 24px;
    height: 24px;
    background: #FAF1E0;
    border-right: 4px solid #1A1A2E;
    border-bottom: 4px solid #1A1A2E;
    transform: rotate(50deg);
  }
  .bubble span {
    font-family: 'Bowlby One', sans-serif;
    color: #E8443A;
    font-size: 28px;
    text-align: center;
    line-height: 1;
    text-shadow: 2px 2px 0 #1A1A2E;
  }

  /* ========== HEARTS (CSS ONLY) ========== */
  .heart {
    position: absolute;
    background: #E8443A;
    transform: rotate(-45deg);
    z-index: 5;
  }
  .heart::before, .heart::after {
    content: '';
    position: absolute;
    background: #E8443A;
    border-radius: 50%;
  }
  .heart::before {
    width: 100%;
    height: 100%;
    top: -50%;
    left: 0;
  }
  .heart::after {
    width: 100%;
    height: 100%;
    top: 0;
    left: 50%;
  }
  .heart.dark { background: #1A1A2E; }
  .heart.dark::before, .heart.dark::after { background: #1A1A2E; }
  .heart.cream { background: #FAF1E0; }
  .heart.cream::before, .heart.cream::after { background: #FAF1E0; }

  .h1 { width: 50px; height: 50px; top: 180px; left: 30px; }
  .h2 { width: 28px; height: 28px; top: 380px; left: 60px; }
  .h3 { width: 70px; height: 70px; top: 540px; left: -10px; }
  .h4 { width: 22px; height: 22px; top: 760px; left: 50px; }
  .h5 { width: 40px; height: 40px; top: 920px; left: 20px; }
  .h6 { width: 30px; height: 30px; bottom: 280px; left: 50px; }
  .h7 { width: 55px; height: 55px; bottom: 180px; left: -15px; }

  .h8 { width: 60px; height: 60px; top: 160px; right: 10px; }
  .h9 { width: 24px; height: 24px; top: 360px; right: 60px; }
  .h10 { width: 45px; height: 45px; top: 500px; right: -10px; }
  .h11 { width: 28px; height: 28px; top: 700px; right: 40px; }
  .h12 { width: 38px; height: 38px; top: 880px; right: 20px; }
  .h13 { width: 50px; height: 50px; bottom: 260px; right: -10px; }
  .h14 { width: 22px; height: 22px; bottom: 200px; right: 60px; }

  /* sparkle stars */
  .sparkle {
    position: absolute;
    z-index: 5;
    color: #E8443A;
    font-family: 'Bowlby One', sans-serif;
    text-shadow: 2px 2px 0 #1A1A2E;
  }
  .sp1 { top: 320px; left: 90px; font-size: 32px; transform: rotate(15deg); }
  .sp2 { top: 460px; left: 30px; font-size: 24px; transform: rotate(-20deg); }
  .sp3 { top: 820px; left: 80px; font-size: 28px; transform: rotate(30deg); }
  .sp4 { top: 320px; right: 100px; font-size: 30px; transform: rotate(-15deg); }
  .sp5 { top: 660px; right: 30px; font-size: 26px; transform: rotate(40deg); }
  .sp6 { bottom: 240px; right: 100px; font-size: 32px; transform: rotate(-25deg); }

  /* ========== BOTTOM CAPTION STRIP ========== */
  .footer {
    position: absolute;
    bottom: 80px;
    left: 110px;
    right: 110px;
    height: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 6;
  }

  .banner {
    position: relative;
    background: #E8443A;
    color: #FAF1E0;
    border: 4px solid #1A1A2E;
    padding: 16px 40px;
    transform: rotate(-1.5deg);
    box-shadow: 6px 6px 0 #1A1A2E;
    margin-bottom: 14px;
  }
  .banner::before, .banner::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30px;
    height: 30px;
    background: #1A1A2E;
    transform: translateY(-50%) rotate(45deg);
  }
  .banner::before { left: -19px; }
  .banner::after { right: -19px; }

  .banner h2 {
    font-family: 'Bowlby One', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    text-shadow: 2px 2px 0 #1A1A2E;
  }

  .date-strip {
    font-family: 'Caveat', cursive;
    color: #1A1A2E;
    font-size: 32px;
    background: #FAF1E0;
    border: 3px dashed #1A1A2E;
    padding: 6px 24px;
    transform: rotate(2deg);
  }

  .date-strip input {
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: inherit;
    color: #E8443A;
    width: 180px;
    text-align: center;
    outline: none;
  }
  .date-strip input::placeholder { color: rgba(26,26,46,0.4); }

  /* star row */
  .star-row {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    z-index: 7;
  }
  .star-row .pill {
    background: #1A1A2E;
    color: #FAF1E0;
    font-family: 'Bowlby One', sans-serif;
    font-size: 12px;
    padding: 4px 10px;
    letter-spacing: 2px;
    border: 2px solid #FAF1E0;
    transform: rotate(var(--r, 0deg));
  }

  /* big heart between characters */
  .center-heart {
    position: absolute;
    top: 190px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 7;
    width: 70px;
    height: 70px;
  }
  .center-heart .h {
    width: 100%;
    height: 100%;
    background: #E8443A;
    transform: rotate(-45deg);
    position: relative;
    border: 3px solid #1A1A2E;
    box-shadow: 4px 4px 0 #1A1A2E;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .center-heart .h::before, .center-heart .h::after {
    content: '';
    position: absolute;
    background: #E8443A;
    border: 3px solid #1A1A2E;
    border-radius: 50%;
  }
  .center-heart .h::before {
    width: 100%;
    height: 100%;
    top: -50%;
    left: -3px;
  }
  .center-heart .h::after {
    width: 100%;
    height: 100%;
    top: -3px;
    left: 50%;
  }

  @keyframes pulse {
    0%, 100% { transform: rotate(-45deg) scale(1); }
    50% { transform: rotate(-45deg) scale(1.12); }
  }

  /* halftone dots overlay on dark frame edges */
  .frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 10% 50%, rgba(232,68,58,0.15) 0, transparent 80px),
      radial-gradient(circle at 90% 60%, rgba(232,68,58,0.12) 0, transparent 90px);
    pointer-events: none;
    z-index: 2;
  }

  /* hand-drawn squiggle divider */
  .squiggle {
    position: absolute;
    left: 110px;
    right: 110px;
    height: 20px;
    z-index: 6;
  }
  .sq-top { top: 230px; }
  .sq-bot { bottom: 340px; transform: rotate(180deg); }

</style>
</head>

    <div class="center-heart">
