<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello Kitty Photobooth</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px 15px;
  background:
    radial-gradient(circle at 18% 22%, #ffe3ea 0%, transparent 45%),
    radial-gradient(circle at 82% 78%, #ffd4df 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, #fff5f8 0%, #ffd9e2 100%);
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow: auto;
}
body::before, body::after {
  content: '';
  position: fixed;
  pointer-events: none;
  z-index: 0;
}
body::before {
  top: 8%; left: 6%;
  width: 90px; height: 90px;
  background: radial-gradient(circle, rgba(255,210,225,0.6) 0%, transparent 70%);
  border-radius: 50%;
}
body::after {
  bottom: 10%; right: 8%;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(255,195,215,0.5) 0%, transparent 70%);
  border-radius: 50%;
}

.frame {
  position: relative;
  width: 620px;
  max-width: 100%;
  background: linear-gradient(135deg, #fffafc 0%, #ffeef3 100%);
  border: 3px solid #E891A0;
  border-radius: 22px;
  padding: 14px;
  box-shadow:
    0 20px 50px rgba(232, 145, 160, 0.35),
    0 4px 12px rgba(232, 145, 160, 0.2),
    inset 0 0 0 1px rgba(255, 255, 255, 0.6);
  z-index: 1;
}
.frame-inner {
  border: 2px solid #E891A0;
  border-radius: 14px;
  padding: 22px 24px 28px;
  position: relative;
  background:
    radial-gradient(circle at 10% 10%, rgba(255, 220, 232, 0.4) 0%, transparent 30%),
    radial-gradient(circle at 90% 90%, rgba(255, 220, 232, 0.4) 0%, transparent 30%),
    #fffafd;
}

/* Top decorations row */
.top-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin-bottom: 14px;
  position: relative;
  height: 110px;
}

/* Sparkle stars */
.sparkle {
  position: relative;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}
.sparkle::before, .sparkle::after {
  content: '';
  position: absolute;
  background: #E891A0;
  top: 50%; left: 50%;
}
.sparkle::before {
  width: 100%;
  height: 4px;
  transform: translate(-50%, -50%);
  border-radius: 4px;
}
.sparkle::after {
  width: 4px;
  height: 100%;
  transform: translate(-50%, -50%);
  border-radius: 4px;
}
.sparkle > span {
  position: absolute;
  width: 8px;
  height: 8px;
  background: #E891A0;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: -1;
}

.sparkle.small {
  width: 18px;
  height: 18px;
}
.sparkle.big {
  width: 34px;
  height: 34px;
}

/* Hello Kitty CSS art */
.hello-kitty {
  position: relative;
  width: 100px;
  height: 90px;
}
.hk-head {
  position: absolute;
  width: 96px;
  height: 70px;
  background: #ffffff;
  border: 2.5px solid #2a2a2a;
  border-radius: 50%;
  top: 14px;
  left: 2px;
  z-index: 2;
}
.hk-ear {
  position: absolute;
  width: 38px;
  height: 32px;
  background: #ffffff;
  border: 2.5px solid #2a2a2a;
  border-radius: 50% 50% 50% 50%;
  top: -4px;
  z-index: 1;
}
.hk-ear.left {
  left: 6px;
  transform: rotate(-28deg);
}
.hk-ear.right {
  right: 6px;
  transform: rotate(28deg);
}
.hk-ear::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 14px;
  background: transparent;
  box-shadow: inset -3px -2px 0 -2px #2a2a2a;
  border-radius: 50%;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
}
.hk-eye {
  position: absolute;
  width: 9px;
  height: 11px;
  background: #2a2a2a;
  border-radius: 50%;
  top: 38px;
  z-index: 3;
}
.hk-eye.left { left: 28px; }
.hk-eye.right { right: 28px; }

.hk-nose {
  position: absolute;
  width: 13px;
  height: 9px;
  background: #ffd23e;
  border: 2px solid #2a2a2a;
  border-radius: 50%;
  top: 52px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
}

.hk-whisker {
  position: absolute;
  height: 2px;
  background: #2a2a2a;
  border-radius: 2px;
  z-index: 3;
}
.hk-whisker.w1 { top: 44px; left: 8px; width: 18px; transform: rotate(-8deg); }
.hk-whisker.w2 { top: 52px; left: 6px; width: 16px; transform: rotate(4deg); }
.hk-whisker.w3 { top: 60px; left: 10px; width: 14px; transform: rotate(14deg); }
.hk-whisker.w4 { top: 44px; right: 8px; width: 18px; transform: rotate(8deg); }
.hk-whisker.w5 { top: 52px; right: 6px; width: 16px; transform: rotate(-4deg); }
.hk-whisker.w6 { top: 60px; right: 10px; width: 14px; transform: rotate(-14deg); }

.hk-bow {
  position: absolute;
  top: 6px;
  right: -2px;
  width: 36px;
  height: 30px;
  z-index: 4;
}
.hk-bow-l, .hk-bow-r {
  position: absolute;
  width: 18px;
  height: 22px;
  background: #E891A0;
  border: 2px solid #2a2a2a;
  border-radius: 50% 50% 50% 50%;
  top: 4px;
}
.hk-bow-l {
  left: 0;
  transform: rotate(-20deg);
  border-top-left-radius: 80% 60%;
  border-bottom-left-radius: 80% 60%;
}
.hk-bow-r {
  right: 0;
  transform: rotate(20deg);
  border-top-right-radius: 80% 60%;
  border-bottom-right-radius: 80% 60%;
}
.hk-bow-c {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #d77b8a;
  border: 2px solid #2a2a2a;
  border-radius: 50%;
  top: 9px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
}
.hk-bow-c::before, .hk-bow-c::after {
  content: '';
  position: absolute;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
  top: 2px;
}
.hk-bow-c::before { left: 2px; }
.hk-bow-c::after { right: 2px; }

/* Title */
.title {
  text-align: center;
  margin: 4px 0 18px;
  font-family: 'Didot', 'Bodoni MT', 'Playfair Display', Georgia, serif;
  font-size: 30px;
  font-weight: 400;
  font-style: italic;
  color: #d76b7d;
  letter-spacing: 3px;
  position: relative;
}
.title::before, .title::after {
  content: '';
  display: inline-block;
  width: 50px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #E891A0, transparent);
  vertical-align: middle;
  margin: 0 14px;
}

/* Photo grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 14px;
  width: 100%;
  aspect-ratio: 1 / 1;
  max-width: 540px;
  margin: 0 auto;
  position: relative;
}
.slot {
  position: relative;
  background: #ffffff;
  border: 2px solid #E891A0;
  border-radius: 10px;
  box-shadow: inset 0 0 0 4px #fff, inset 0 0 0 5px rgba(232, 145, 160, 0.25), 0 3px 8px rgba(232, 145, 160, 0.15);
  overflow: hidden;
}
.slot::before {
  content: '';
  position: absolute;
  top: 5px; right: 5px;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  z-index: 3;
  opacity: 0.7;
}
.slot::after {
  content: '♥';
  position: absolute;
  top: 6px; right: 7px;
  font-size: 10px;
  color: #E891A0;
  z-index: 4;
  line-height: 1;
}

/* Corner sparkles inside frame */
.corner-sparkle {
  position: absolute;
  width: 24px;
  height: 24px;
  pointer-events: none;
}
.corner-sparkle::before, .corner-sparkle::after {
  content: '';
  position: absolute;
  background: #E891A0;
  border-radius: 3px;
  top: 50%; left: 50%;
}
.corner-sparkle::before {
  width: 100%;
  height: 3px;
  transform: translate(-50%, -50%);
}
.corner-sparkle::after {
  width: 3px;
  height: 100%;
  transform: translate(-50%, -50%);
}
.corner-sparkle.cs1 { top: 14px; left: 16px; }
.corner-sparkle.cs2 { top: 14px; right: 16px; }
.corner-sparkle.cs3 { bottom: 80px; left: 16px; }
.corner-sparkle.cs4 { bottom: 80px; right: 16px; }

/* Bottom decoration */
.bottom-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 18px;
  height: 36px;
}
.mini-heart {
  width: 14px;
  height: 13px;
  position: relative;
  display: inline-block;
}
.mini-heart::before, .mini-heart::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 12px;
  background: #E891A0;
  border-radius: 8px 8px 0 0;
  top: 0;
}
.mini-heart::before {
  left: 0;
  transform: rotate(-45deg);
  transform-origin: 50% 100%;
}
.mini-heart::after {
  right: 0;
  transform: rotate(45deg);
  transform-origin: 50% 100%;
}
.bottom-text {
  font-family: 'Didot', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: #c95a6d;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.dots {
  display: flex;
  gap: 6px;
}
.dot {
  width: 5px;
  height: 5px;
  background: #E891A0;
  border-radius: 50%;
}

/* Small bow on side */
.side-bow {
  position: absolute;
  width: 30px;
  height: 26px;
}
.side-bow .sb-l, .side-bow .sb-r {
  position: absolute;
  width: 16px;
  height: 20px;
  background: #E891A0;
  border: 2px solid #2a2a2a;
  top: 3px;
}
.side-bow .sb-l {
  left: 0;
  border-radius: 70% 30% 50% 50%;
  transform: rotate(-15deg);
}
.side-bow .sb-r {
  right: 0;
  border-radius: 30% 70% 50% 50%;
  transform: rotate(15deg);
}
.side-bow .sb-c {
  position: absolute;
  width: 9px;
  height: 9px;
  background: #d77b8a;
  border: 2px solid #2a2a2a;
  border-radius: 50%;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
}
.side-bow.left { top: 50%; left: -8px; transform: translateY(-50%) rotate(-15deg); }
.side-bow.right { top: 50%; right: -8px; transform: translateY(-50%) rotate(15deg); }

/* Polka dots pattern overlay on frame */
.frame-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(232, 145, 160, 0.15) 1.5px, transparent 2px);
  background-size: 24px 24px;
  background-position: 12px 12px;
  pointer-events: none;
  border-radius: 14px;
  opacity: 0.6;
}

</style>
</head>
<body>

<div class="frame">
  <div class="frame-inner">

    <!-- Corner sparkles -->
    <div class="corner-sparkle cs1"></div>
    <div class="corner-sparkle cs2"></div>
    <div class="corner-sparkle cs3"></div>
    <div class="corner-sparkle cs4"></div>

    <!-- Side bows -->
    <div class="side-bow left">
      <div class="sb-l"></div>
      <div class="sb-r"></div>
      <div class="sb-c"></div>
    </div>
    <div class="side-bow right">
      <div class="sb-l"></div>
      <div class="sb-r"></div>
      <div class="sb-c"></div>
    </div>

    <!-- Top row: sparkles + kitty -->
    <div class="top-row">
      <div class="sparkle big"><span></span></div>
      <div class="sparkle small"><span></span></div>

      <div class="hello-kitty">
        <div class="hk-ear left"></div>
        <div class="hk-ear right"></div>
        <div class="hk-head"></div>
        <div class="hk-eye left"></div>
        <div class="hk-eye right"></div>
        <div class="hk-nose"></div>
        <div class="hk-whisker w1"></div>
        <div class="hk-whisker w2"></div>
        <div class="hk-whisker w3"></div>
        <div class="hk-whisker w4"></div>
        <div class="hk-whisker w5"></div>
        <div class="hk-whisker w6"></div>
        <div class="hk-bow">
          <div class="hk-bow-l"></div>
          <div class="hk-bow-r"></div>
          <div class="hk-bow-c"></div>
        </div>
      </div>

      <div class="sparkle small"><span></span></div>
      <div class="sparkle big"><span></span></div>
    </div>

    <!-- Title -->
    <div class="title">Hello Kitty</div>

    <!-- Photo grid 2x2 -->
    <div class="grid">
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
    </div>

    <!-- Bottom decoration -->
    <div class="bottom-row">
      <div class="mini-heart"></div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <span class="bottom-text">Sweet Memories</span>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="mini-heart"></div>
    </div>

  </div>
</div>

</body>
</html>
