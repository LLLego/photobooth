<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pucca & Garu Photobooth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Caveat:wght@600&display=swap');
  
  *{margin:0;padding:0;box-sizing:border-box;}
  
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 25% 20%, #FFE8B0 0%, transparent 45%),
      radial-gradient(circle at 75% 80%, #FFB8C8 0%, transparent 45%),
      repeating-linear-gradient(45deg,#FFFAF0 0px,#FFFAF0 22px,#FFE8D0 22px,#FFE8D0 24px);
    font-family:'Fredoka',sans-serif;
    padding:30px;
    overflow-x:hidden;
  }
  
  .stage{position:relative;}
  
  /* === POLAROID FRAME === */
  .polaroid{
    position:relative;
    width:560px;
    background:#FFFFFF;
    border:6px solid #E8443A;
    border-radius:8px;
    padding:50px 40px 130px 40px;
    box-shadow:
      inset 0 0 0 10px #FFFFFF,
      inset 0 0 0 14px #E8443A,
      0 12px 0 #B8342A,
      0 25px 60px rgba(232,68,58,0.35);
    animation:floatFrame 6s ease-in-out infinite;
  }
  
  @keyframes floatFrame{
    0%,100%{transform:rotate(-1deg) translateY(0);}
    50%{transform:rotate(1deg) translateY(-6px);}
  }
  
  /* === PHOTO WINDOW === */
  .photo-window{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:
      repeating-linear-gradient(45deg,#FFE8E8 0px,#FFE8E8 14px,#FFFFFF 14px,#FFFFFF 28px);
    border:4px solid #E8443A;
    overflow:hidden;
    z-index:1;
  }
  .photo-window::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,transparent 0%,transparent 30%,rgba(255,255,255,0.25) 50%,transparent 70%);
    pointer-events:none;
  }
  .photo-placeholder{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    color:#E8443A;
    font-size:14px;
    font-weight:700;
    letter-spacing:2px;
    opacity:0.5;
    text-transform:uppercase;
  }
  
  /* === HANDWRITING AREA === */
  .handwriting{
    position:absolute;
    bottom:32px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    height:80px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
  }
  .handwriting-lines{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    opacity:0.5;
  }
  .handwriting-lines::before,
  .handwriting-lines::after{
    content:'';
    height:1.5px;
    background:repeating-linear-gradient(90deg,#E8443A 0 6px,transparent 6px 12px);
  }
  .hint{
    position:relative;
    color:#E8443A;
    opacity:0.55;
    font-family:'Caveat',cursive;
    font-size:22px;
    z-index:1;
  }
  
  /* === CHARACTERS === */
  .char{
    position:absolute;
    z-index:5;
    pointer-events:none;
  }
  .char-pucca{
    top:-40px;
    left:-50px;
    width:200px;
    animation:bobLeft 3s ease-in-out infinite;
  }
  .char-garu{
    top:-40px;
    right:-50px;
    width:200px;
    animation:bobRight 3s ease-in-out infinite 0.5s;
  }
  @keyframes bobLeft{
    0%,100%{transform:rotate(-6deg) translateY(0);}
    50%{transform:rotate(-2deg) translateY(-8px);}
  }
  @keyframes bobRight{
    0%,100%{transform:rotate(6deg) translateY(0);}
    50%{transform:rotate(2deg) translateY(-8px);}
  }
  
  .char svg{display:block;width:100%;height:auto;}
  
  /* === TITLE === */
  .title-banner{
    position:absolute;
    bottom:-38px;
    left:50%;
    transform:translateX(-50%) rotate(-2deg);
    z-index:10;
    background:#E8443A;
    color:#FFFFFF;
    padding:12px 30px;
    border:4px solid #FFFFFF;
    outline:3px solid #E8443A;
    border-radius:40px;
    box-shadow:0 6px 0 #B8342A,0 12px 25px rgba(232,68,58,0.5);
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:24px;
    letter-spacing:1px;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .title-banner .heart{
    display:inline-block;
    width:16px;
    height:16px;
    background:#FFFFFF;
    clip-path:polygon(50% 88%,3% 42%,3% 22%,25% 6%,50% 22%,75% 6%,97% 22%,97% 42%);
    animation:pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.35);}
  }
  
  /* === CORNER DOTS === */
  .corner-dot{
    position:absolute;
    width:14px;height:14px;
    background:#E8443A;
    border:3px solid #FFFFFF;
    border-radius:50%;
    z-index:8;
    box-shadow:0 2px 6px rgba(232,68,58,0.4);
  }
  .dot-tl{top:14px;left:14px;}
  .dot-tr{top:14px;right:14px;}
  .dot-bl{bottom:14px;left:14px;}
  .dot-br{bottom:14px;right:14px;}
  
  /* === TAPE === */
  .tape{
    position:absolute;
    width:110px;
    height:32px;
    background:rgba(255,200,180,0.55);
    border-left:2px dashed rgba(232,68,58,0.3);
    border-right:2px dashed rgba(232,68,58,0.3);
    backdrop-filter:blur(2px);
    z-index:11;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  .tape-tl{top:-18px;left:60px;transform:rotate(-14deg);}
  .tape-tr{top:-18px;right:60px;transform:rotate(12deg);}
  
  /* === FLOATING HEARTS === */
  .floating-heart{
    position:absolute;
    width:26px;height:26px;
    z-index:20;
    pointer-events:none;
  }
  .floating-heart .h{
    width:100%;height:100%;
    background:#E8443A;
    clip-path:polygon(50% 88%,3% 42%,3% 22%,25% 6%,50% 22%,75% 6%,97% 22%,97% 42%);
    display:block;
    filter:drop-shadow(0 3px 6px rgba(232,68,58,0.4));
  }
  .floating-heart .h.w{background:#FFFFFF;border:none;}
  
  .fh1{top:-50px;left:50%;animation:floatH1 4s ease-in-out infinite;}
  .fh2{top:35%;left:-45px;animation:floatH2 3.5s ease-in-out infinite 0.4s;}
  .fh3{top:50%;right:-45px;animation:floatH3 4s ease-in-out infinite 0.8s;}
  .fh4{bottom:120px;left:-40px;animation:floatH1 4.5s ease-in-out infinite 1.2s;}
  .fh5{bottom:120px;right:-40px;animation:floatH2 3.8s ease-in-out infinite 0.6s;}
  .fh6{top:20%;left:-30px;animation:floatH3 5s ease-in-out infinite 1.5s;}
  .fh7{top:60%;right:-35px;animation:floatH1 4.2s ease-in-out infinite 2s;}
  .fh8{top:-30px;left:25%;animation:floatH2 4.5s ease-in-out infinite 0.3s;}
  
  @keyframes floatH1{
    0%,100%{transform:translateY(0) rotate(0deg) scale(1);}
    50%{transform:translateY(-18px) rotate(18deg) scale(1.15);}
  }
  @keyframes floatH2{
    0%,100%{transform:translateY(0) rotate(0deg) scale(0.85);}
    50%{transform:translateY(-22px) rotate(-22deg) scale(1.1);}
  }
  @keyframes floatH3{
    0%,100%{transform:translateX(0) rotate(0deg) scale(1);}
    50%{transform:translateX(15px) rotate(15deg) scale(1.2);}
  }
  
  /* === STAR SPARKLES === */
  .sparkle{
    position:absolute;
    color:#E8443A;
    font-size:20px;
    font-weight:700;
    z-index:19;
    pointer-events:none;
    animation:twinkle 2s ease-in-out infinite;
  }
  .s1{top:5%;left:-15px;animation-delay:0s;}
  .s2{top:55%;left:-12px;animation-delay:0.5s;}
  .s3{top:15%;right:-15px;animation-delay:1s;}
  .s4{bottom:8%;right:-12px;animation-delay:1.5s;}
  @keyframes twinkle{
    0%,100%{opacity:0.3;transform:scale(0.8) rotate(0deg);}
    50%{opacity:1;transform:scale(1.3) rotate(180deg);}
  }
  
  @media(max-width:600px){
    body{padding:80px 40px;}
    .polaroid{width:100%;}
    .char-pucca{left:-25px;width:140px;}
    .char-garu{right:-25px;width:140px;}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="polaroid">
    
    <!-- Tape decorations -->
    <div class="tape tape-tl"></div>
    <div class="tape tape-tr"></div>
    
    <!-- Corner dots -->
    <div class="corner-dot dot-tl"></div>
    <div class="corner-dot dot-tr"></div>
    <div class="corner-dot dot-bl"></div>
    <div class="corner-dot dot-br"></div>
    
    <!-- PUCCA (top-left) -->
    <div class="char char-pucca" aria-label="Pucca">
      <svg viewBox="0 0 200 220">
        <!-- Hair back -->
        <circle cx="100" cy="100" r="92" fill="#1A1A1A"/>
        <!-- Two side hair buns -->
        <circle cx="18" cy="80" r="26" fill="#1A1A1A"/>
        <circle cx="182" cy="80" r="26" fill="#1A1A1A"/>
        <!-- Bun highlights -->
        <circle cx="12" cy="74" r="6" fill="#2A2A2A"/>
        <circle cx="188" cy="74" r="6" fill="#2A2A2A"/>
        
        <!-- Face -->
        <ellipse cx="100" cy="110" rx="64" ry="68" fill="#FFD8B0"/>
        
        <!-- Hair top fringe (bumpy) -->
        <path d="M 36 75 
                 Q 50 35 70 58 
                 Q 82 28 100 52 
                 Q 118 28 130 58 
                 Q 150 35 164 75
                 Q 165 95 155 90
                 Q 142 72 130 92
                 Q 115 65 100 88
                 Q 85 65 70 92
                 Q 58 72 45 90
                 Q 35 95 36 75 Z" fill="#1A1A1A"/>
        
        <!-- Hair side strands framing face -->
        <path d="M 30 75 Q 22 130 38 175 L 50 175 Q 42 130 48 90 Z" fill="#1A1A1A"/>
        <path d="M 170 75 Q 178 130 162 175 L 150 175 Q 158 130 152 90 Z" fill="#1A1A1A"/>
        
        <!-- Eyebrows (determined slant) -->
        <path d="M 62 96 Q 76 90 88 96" stroke="#1A1A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M 112 96 Q 124 90 138 96" stroke="#1A1A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        
        <!-- Eyes - determined half-moons -->
        <path d="M 60 100 Q 75 110 88 100 Q 75 116 60 100 Z" fill="#1A1A1A"/>
        <path d="M 112 100 Q 125 110 140 100 Q 125 116 112 100 Z" fill="#1A1A1A"/>
        
        <!-- Blush -->
        <ellipse cx="62" cy="135" rx="12" ry="6" fill="#FF9BA8" opacity="0.75"/>
        <ellipse cx="138" cy="135" rx="12" ry="6" fill="#FF9BA8" opacity="0.75"/>
        
        <!-- Nose hint -->
        <ellipse cx="100" cy="128" rx="2" ry="1.5" fill="#D8A878"/>
        
        <!-- Determined smiling mouth -->
        <path d="M 82 152 Q 100 166 118 152" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
        
        <!-- Tiny hearts around Pucca -->
        <path d="M 8 30 l 4 0 0 4 4 0 0 4 -4 0 0 4 -4 0 0 -4 -4 0 0 -4 4 0 z" fill="#E8443A" transform="scale(0.6) translate(15,5)"/>
        <path d="M 8 30 l 4 0 0 4 4 0 0 4 -4 0 0 4 -4 0 0 -4 -4 0 0 -4 4 0 z" fill="#E8443A" transform="scale(0.45) translate(380,40)"/>
      </svg>
    </div>
    
    <!-- GARU (top-right) -->
    <div class="char char-garu" aria-label="Garu">
      <svg viewBox="0 0 200 220">
        <!-- Hair back -->
        <circle cx="100" cy="100" r="92" fill="#1A1A1A"/>
        
        <!-- Face -->
        <ellipse cx="100" cy="112" rx="62" ry="66" fill="#FFD8B0"/>
        
        <!-- Spiky ninja hair top -->
        <path d="M 38 72 
                 L 48 28 L 62 60
                 L 70 22 L 82 56
                 L 92 18 L 100 52
                 L 108 18 L 118 56
                 L 130 22 L 138 60
                 L 152 28 L 162 72
                 Q 165 92 152 88
                 L 145 65 L 132 85
                 L 122 60 L 110 82
                 L 100 60 L 90 82
                 L 78 60 L 68 85
                 L 55 65 L 48 88
                 Q 35 92 38 72 Z" fill="#1A1A1A"/>
        
        <!-- Side hair -->
        <path d="M 32 80 Q 24 130 40 175 L 52 175 Q 44 130 50 95 Z" fill="#1A1A1A"/>
        <path d="M 168 80 Q 176 130 160 175 L 148 175 Q 156 130 150 95 Z" fill="#1A1A1A"/>
        
        <!-- Ninja headband (red) -->
        <rect x="32" y="98" width="136" height="16" fill="#E8443A"/>
        <!-- Headband ties flying left -->
        <path d="M 28 104 L -4 96 L 0 108 L -4 120 L 30 112 Z" fill="#E8443A"/>
        <!-- Tie ends -->
        <path d="M -2 96 L -10 92 L -8 100 Z" fill="#B8342A"/>
        <path d="M -2 120 L -10 124 L -8 116 Z" fill="#B8342A"/>
        
        <!-- Determined focused eyes (slightly closed intensity) -->
        <path d="M 60 122 Q 75 130 90 122" stroke="#1A1A1A" stroke-width="4.5" fill="none" stroke-linecap="round"/>
        <path d="M 110 122 Q 125 130 140 122" stroke="#1A1A1A" stroke-width="4.5" fill="none" stroke-linecap="round"/>
        
        <!-- Serious expression mouth -->
        <path d="M 88 158 Q 100 162 112 158" stroke="#1A1A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        
        <!-- Tiny blush -->
        <ellipse cx="62" cy="148" rx="8" ry="4" fill="#FF9BA8" opacity="0.5"/>
        <ellipse cx="138" cy="148" rx="8" ry="4" fill="#FF9BA8" opacity="0.5"/>
      </svg>
    </div>
    
    <!-- PHOTO WINDOW (empty for photo) -->
    <div class="photo-window">
      <span class="photo-placeholder">· photo here ·</span>
    </div>
    
    <!-- Handwriting area -->
    <div class="handwriting">
      <div class="handwriting-lines"></div>
      <span class="hint">write your cute message ✎</span>
    </div>
    
    <!-- TITLE BANNER -->
    <div class="title-banner">
      <span class="heart"></span>
      Pucca &amp; Garu
      <span class="heart"></span>
    </div>
    
  </div>
  
  <!-- Floating hearts around frame -->
  <div class="floating-heart fh1"><div class="h"></div></div>
  <div class="floating-heart fh2"><div class="h"></div></div>
  <div class="floating-heart fh3"><div class="h w"></div></div>
  <div class="floating-heart fh4"><div class="h"></div></div>
  <div class="floating-heart fh5"><div class="h w"></div></div>
  <div class="floating-heart fh6"><div class="h"></div></div>
  <div class="floating-heart fh7"><div class="h w"></div></div>
  <div class="floating-heart fh8"><div class="h"></div></div>
  
  <!-- Sparkles -->
  <div class="sparkle s1">✦</div>
  <div class="sparkle s2">✦</div>
  <div class="sparkle s3">✦</div>
  <div class="sparkle s4">✦</div>
  
</div>

</body>
</html>
