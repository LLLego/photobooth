<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White photo-frame backdrop -->
  <rect width="200" height="200" fill="#FFFFFF"/>

  <!-- Decorative outer dots (corner sparkles) -->
  <circle cx="22" cy="22" r="2.5" fill="#E8443A"/>
  <circle cx="178" cy="22" r="2.5" fill="#E8443A"/>
  <circle cx="22" cy="178" r="2.5" fill="#E8443A"/>
  <circle cx="178" cy="178" r="2.5" fill="#E8443A"/>

  <!-- Garu (left - black ninja with spiky hair) -->
  <g id="garu">
    <!-- Spiky hair silhouette -->
    <path d="M 55 115
             C 50 95 50 70 60 55
             L 62 70
             L 68 50
             L 72 65
             L 78 48
             L 82 65
             L 88 55
             C 95 65 95 95 92 115
             Z"
          fill="#1A1A2E"/>
    <!-- Face -->
    <ellipse cx="75" cy="95" rx="14" ry="16" fill="#FFE0C4"/>
    <!-- Headband -->
    <path d="M 60 88 Q 75 84 90 88 L 90 92 Q 75 88 60 92 Z" fill="#E8443A"/>
    <!-- Headband ties -->
    <path d="M 88 88 Q 102 78 100 95 Q 95 91 88 95 Z" fill="#1A1A2E"/>
    <!-- Determined eyes -->
    <path d="M 66 92 Q 70 94 74 92" stroke="#1A1A2E" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <path d="M 78 92 Q 82 94 86 92" stroke="#1A1A2E" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <!-- Cheek blush -->
    <circle cx="68" cy="103" r="2.2" fill="#E8443A" opacity="0.6"/>
    <circle cx="83" cy="103" r="2.2" fill="#E8443A" opacity="0.6"/>
    <!-- Shoulders -->
    <ellipse cx="75" cy="128" rx="20" ry="11" fill="#1A1A2E"/>
  </g>

  <!-- Pucca (right - girl with twin buns) -->
  <g id="pucca">
    <!-- Twin buns (hair balls on top) -->
    <circle cx="118" cy="68" r="9" fill="#1A1A2E"/>
    <circle cx="142" cy="68" r="9" fill="#1A1A2E"/>
    <!-- Bun ties -->
    <path d="M 113 68 L 118 68 M 118 68 L 123 68" stroke="#E8443A" stroke-width="2"/>
    <path d="M 137 68 L 142 68 M 142 68 L 147 68" stroke="#E8443A" stroke-width="2"/>
    <!-- Head with blunt-cut bangs -->
    <ellipse cx="130" cy="95" rx="14" ry="16" fill="#FFE0C4"/>
    <path d="M 116 88
             Q 117 78 130 77
             Q 143 78 144 88
             Q 143 87 140 89
             Q 138 84 134 87
             Q 131 85 128 88
             Q 125 85 122 89
             Q 119 87 116 88 Z"
          fill="#1A1A2E"/>
    <!-- Side hair framing -->
    <path d="M 116 88 C 114 102 116 110 119 110 C 117 102 118 94 119 90 Z" fill="#1A1A2E"/>
    <path d="M 144 88 C 146 102 144 110 141 110 C 143 102 142 94 141 90 Z" fill="#1A1A2E"/>
    <!-- Sweet closed eyes -->
    <path d="M 121 93 Q 125 97 129 93" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M 133 93 Q 137 97 141 93" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Cheek blush -->
    <circle cx="121" cy="103" r="2.2" fill="#E8443A" opacity="0.7"/>
    <circle cx="139" cy="103" r="2.2" fill="#E8443A" opacity="0.7"/>
    <!-- Smile -->
    <path d="M 125 105 Q 130 110 135 105" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Shoulders (red dress) -->
    <ellipse cx="130" cy="128" rx="20" ry="11" fill="#E8443A"/>
  </g>

  <!-- Center red heart between them -->
  <g id="love-heart">
    <path d="M 100 62
             C 90 46 60 44 60 64
             C 60 76 82 88 100 98
             C 118 88 140 76 140 64
             C 140 44 110 46 100 62 Z"
          fill="#E8443A"/>
    <!-- Subtle highlight -->
    <ellipse cx="78" cy="56" rx="6" ry="3.5" fill="#FFFFFF" opacity="0.5" transform="rotate(-30 78 56)"/>
  </g>
</svg>
