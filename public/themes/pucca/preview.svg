**Composition & layout** — I treated this as a "photo frame preview" literally: a black heart outline with a white photo window inside, like the placeholder graphics you'd see on a phone's frame-editor screen. Garu and Pucca stand side by side at chest-up framing, slightly tilted toward each other (heads near the top of the heart), with the bold red heart floating between them at the visual center. Four tiny corner dots echo the heart color and add the "app-icon" polish without crowding the design.

**Palette discipline** — I stuck strictly to your red `#E8443A` and black `#1A1A2E`, plus a warm skin tone (`#FFE0C4`) so the faces read as figures rather than negative space. The red appears in exactly three places — the central heart, Pucca's dress, and the cheek blush — so the eye follows a single accent color through the composition. Everything structural uses the deep navy-black.

**Silhouette readability** — Garu reads instantly through his spiky ninja hair, the characteristic side-tied headband flapping behind, and his sharp-determined eye arcs. Pucca reads through her round face, blunt-cut bangs with the little zigzag bottom edge, two side pigtails, and the upsweep closed-eye smile. Both characters use closed curved eyes (the show's signature "^.^" look) which keeps the icon friendly and avoids fiddly pupils at this small size. The center heart gets a subtle white highlight streak to give it a touch of dimension without breaking the flat aesthetic.