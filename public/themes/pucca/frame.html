<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pucca × Garu — Love Photobooth Frame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cherry: #E8443A;
    --cherry-deep: #B82820;
    --pink: #FFB6C1;
    --pink-soft: #FFD6DD;
    --cream: #FFF0F0;
    --navy: #1A1A2E;
    --yellow: #FFD93D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% 20%, rgba(232,68,58,0.12) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(255,182,193,0.15) 0%, transparent 45%),
      #1a1a22;
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka', sans-serif;
    overflow-x: hidden;
  }

  .stage {
    position: relative;
    width: 1200px;
    height: 1600px;
    flex-shrink: 0;
  }

  .photozone-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bungee', sans-serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: rgba(26,26,46,0.25);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 1;
  }

  .frame {
    position: absolute;
    inset: 0;
    width: 1200px;
    height: 1600px;
    pointer-events: none;
    overflow: visible;
  }

  .frame svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  /* === Floating Hearts Animation === */
  .heart-float {
    transform-box: fill-box;
    transform-origin: center;
    animation: heartFloat 4s ease-in-out infinite;
  }
  .heart-float:nth-child(odd) { animation-duration: 5s; animation-delay: -1.5s; }
  .heart-float:nth-child(3n)  { animation-duration: 3.5s; animation-delay: -0.8s; }

  @keyframes heartFloat {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-8px) rotate(3deg); }
  }

  .sparkle-pulse {
    transform-box: fill-box;
    transform-origin: center;
    animation: sparkle 2.2s ease-in-out infinite;
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }

  .ribbon-sway {
    transform-box: fill-box;
    transform-origin: center bottom;
    animation: sway 6s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1deg); }
    50%      { transform: rotate(1deg); }
  }

  /* Decorative page background hearts */
  .bg-deco {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-deco span {
    position: absolute;
    color: rgba(232,68,58,0.08);
    font-size: 24px;
    animation: drift 18s linear infinite;
  }
  @keyframes drift {
    from { transform: translateY(100vh) rotate(0deg); }
    to   { transform: translateY(-20vh) rotate(360deg); }
  }

  @media (max-width: 1240px) {
    .stage { transform: scale(0.85); }
  }
  @media (max-width: 1024px) {
    .stage { transform: scale(0.65); }
  }
  @media (max-width: 768px) {
    .stage { transform: scale(0.45); }
  }
</style>
</head>
<body>

<div class="bg-deco">
  <span style="left:5%;animation-delay:0s">♥</span>
  <span style="left:18%;animation-delay:-4s">♥</span>
  <span style="left:32%;animation-delay:-9s">♥</span>
  <span style="left:48%;animation-delay:-2s">♥</span>
  <span style="left:62%;animation-delay:-7s">♥</span>
  <span style="left:78%;animation-delay:-12s">♥</span>

</div>
