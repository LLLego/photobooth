<!DOCTYPE html><html><body style='margin:0;background:transparent'><div>Here's a complete photobooth frame with Pucca and Garu built entirely from styled divs — no images, no SVG, everything is pure CSS geometry:


<div id="pucca-frame" style="position: relative; width: 1200px; height: 1600px; background: linear-gradient(135deg, #FFD9DF 0%, #FFB6C1 50%, #FF8FA8 100%); overflow: hidden; margin: 0 auto; font-family: 'Comic Sans MS', 'Quicksand', 'Nunito', system-ui, sans-serif;">

  <!-- Pattern layer: scattered dots -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.5) 1.8px, transparent 2px); background-size: 36px 36px; opacity: 0.7; pointer-events: none;"></div>

  <!-- Corner red triangles -->
  <div style="position: absolute; top: 0; left: 0; width: 0; height: 0; border-top: 90px solid #E63946; border-right: 90px solid transparent; opacity: 0.55; pointer-events: none;"></div>
  <div style="position: absolute; top: 0; right: 0; width: 0; height: 0; border-top: 90px solid #E63946; border-left: 90px solid transparent; opacity: 0.55; pointer-events: none;"></div>
  <div style="position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-bottom: 90px solid #E63946; border-right: 90px solid transparent; opacity: 0.55; pointer-events: none;"></div>
  <div style="position: absolute; bottom: 0; right: 0; width: 0; height: 0; border-bottom: 90px solid #E63946; border-left: 90px solid transparent; opacity: 0.55; pointer-events: none;"></div>

  <!-- Photo opening -->
  <div style="position: absolute; top: 200px; left: 100px; width: 1000px; height: 1200px; background-color: #FFF0F3; background-image: linear-gradient(rgba(255,255,255,0.45) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.45) 1px, transparent 1px); background-size: 50px 50px; border: 8px solid #FFFFFF; box-shadow: 0 0 0 4px #E63946, 0 0 0 9px #FFFFFF, 0 0 0 13px #FF6B8A, 0 12px 32px rgba(200,30,60,0.35); box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
    <span style="font-size: 32px; color: rgba(200,30,60,0.3); letter-spacing: 4px; font-weight: 700;">PHOTO HERE</span>
  </div>

  <!-- ============ PUCCA (top-left) ============ -->
  <div style="position: absolute; top: 30px; left: 55px; width: 220px; height: 200px; z-index: 5;">
    <!-- Hair base (under face) -->
    <div style="position: absolute; top: 48px; left: 50%; transform: translateX(-50%); width: 168px; height: 142px; background: #1A1A1A; border-radius: 80px 80px 30px 30px;"></div>

    <!-- Two buns on top -->
    <div style="position: absolute; top: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2;">
      <div style="width: 64px; height: 64px; background: #1A1A1A; border-radius: 50%; box-shadow: inset -6px -6px 0 rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.2);"></div>
      <div style="width: 64px; height: 64px; background: #1A1A1A; border-radius: 50%; box-shadow: inset -6px -6px 0 rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.2);"></div>
    </div>

    <!-- Bun ornaments (red dots on each bun) -->
    <div style="position: absolute; top: 38px; left: 50%; transform: translateX(-50%); display: flex; gap: 46px; z-index: 3;">
      <div style="width: 10px; height: 10px; background: #E63946; border-radius: 50%; box-shadow: 0 0 0 2px #FF8FA8;"></div>
      <div style="width: 10px; height: 10px; background: #E63946; border-radius: 50%; box-shadow: 0 0 0 2px #FF8FA8;"></div>
    </div>

    <!-- Face -->
    <div style="position: absolute; top: 58px; left: 50%; transform: translateX(-50%); width: 128px; height: 112px; background: #FFE4CC; border-radius: 50%; z-index: 1;"></div>

    <!-- Eyes -->
    <div style="position: absolute; top: 92px; left: 50%; transform: translateX(-50%); display: flex; gap: 14px; z-index: 2;">
      <div style="width: 22px; height: 26px; background: #1A1A1A; border-radius: 50%;"></div>
      <div style="width: 22px; height: 26px; background: #1A1A1A; border-radius: 50%;"></div>
    </div>

    <!-- Eye sparkle -->
    <div style="position: absolute; top: 97px; left: 50%; transform: translateX(-50%); display: flex; gap: 14px; z-index: 3;">
      <div style="width: 7px; height: 7px; background: #FFFFFF; border-radius: 50%; margin-left: 4px;"></div>
      <div style="width: 7px; height: 7px; background: #FFFFFF; border-radius: 50%; margin-left: 11px;"></div>
    </div>

    <!-- Cheeks -->
    <div style="position: absolute; top: 118px; left: 50%; transform: translateX(-50%); display: flex; justify-content: space-between; width: 110px; z-index: 2;">
      <div style="width: 18px; height: 12px; background: #FF9DB1; border-radius: 50%; opacity: 0.85;"></div>
      <div style="width: 18px; height: 12px; background: #FF9DB1; border-radius: 50%; opacity: 0.85;"></div>
    </div>

    <!-- Big happy smile -->
    <div style="position: absolute; top: 132px; left: 50%; transform: translateX(-50%); width: 50px; height: 26px; border-bottom: 5px solid #C2185B; border-radius: 0 0 25px 25px; z-index: 2;"></div>

    <!-- Red outfit collar / shoulders -->
    <div style="position: absolute; top: 168px; left: 50%; transform: translateX(-50%); width: 140px; height: 40px; background: #E63946; border-radius: 70px 70px 0 0; z-index: 0; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15);"></div>
  </div>

  <!-- Pucca speech heart -->
  <div style="position: absolute; top: 65px; left: 280px; font-size: 38px; color: #E63946; transform: rotate(-15deg); text-shadow: 0 0 0 rgba(0,0,0,0), 2px 2px 0 #FFFFFF; line-height: 1; z-index: 6;">♥</div>

  <!-- ============ GARU (top-right) ============ -->
  <div style="position: absolute; top: 30px; right: 55px; width: 220px; height: 200px; z-index: 5;">
    <!-- Hair base -->
    <div style="position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 168px; height: 132px; background: #1A1A1A; border-radius: 80px 80px 25px 25px;"></div>

    <!-- Top hair peak -->
    <div style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-bottom: 42px solid #1A1A1A; z-index: 2;"></div>

    <!-- Side bangs -->
    <div style="position: absolute; top: 52px; left: 22px; width: 28px; height: 65px; background: #1A1A1A; border-radius: 14px 0 30px 14px; transform: rotate(-12deg); z-index: 3;"></div>
    <div style="position: absolute; top: 52px; right: 22px; width: 28px; height: 65px; background: #1A1A1A; border-radius: 0 14px 14px 30px; transform: rotate(12deg); z-index: 3;"></div>

    <!-- Hair shine streak -->
    <div style="position: absolute; top: 38px; left: 50%; transform: translateX(-50%); width: 30px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; z-index: 3;"></div>

    <!-- Face -->
    <div style="position: absolute; top: 72px; left: 50%; transform: translateX(-50%); width: 118px; height: 100px; background: #FFE4CC; border-radius: 50%; z-index: 1;"></div>

    <!-- Eyes (smaller, determined look) -->
