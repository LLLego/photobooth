**Design notes**

- **Palette:** I anchored the whole piece on three reds — a deep crimson `#D62828` for the outfit and outer heart, a darker `#7A1212` for the collar seam, and a softer `#FF6B88` for the rosy cheeks so they read as blush rather than secondary buttons. The hair uses two tiers of near-black (`#161616` base with `#262626` and `#3A3A3A` concentric rings inside each bun) to give the odango subtle dimension without leaving the flat-icon language. A warm cream `#FAF5EC` backdrop keeps the red from feeling clinical.
- **Composition:** 200×200 framed as a bust — head at the optical center, buns at the upper third, outfit filling the bottom. The center heart sits exactly on the vertical axis, mirroring the smile above it and reinforcing the motif the brief asked for.
- **Shape language:** all features are built from primitives — ellipses for face/eyes/blush, quadratic-B swoops for the fringe and eyebrows, single-arc smiles. The fringe is split into three rounded M-shapes so it reads as Pucca's signature bangs rather than a solid blob.
- **Restraint:** no glow, no gradient mesh, no animation — this is a logo-style character mark, so anything decorative would just blur the silhouette. The only "highlight" is the tiny gray dot on each bun to suggest a sphere.