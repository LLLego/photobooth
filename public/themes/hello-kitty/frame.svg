<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600">
  <defs><filter id="soft"><feGaussianBlur stdDeviation="1"/></filter></defs>
  <!-- Border -->
  <rect x="50" y="40" width="1100" height="1480" rx="30" fill="none" stroke="#E891A0" stroke-width="3"/>
  <!-- Hello Kitty (top left) -->
  <g transform="translate(120,90)">
    <!-- Face (white oval) -->
    <ellipse cx="0" cy="0" rx="24" ry="20" fill="#FFFFFF" stroke="#DDD" stroke-width="1"/>
    <!-- Ears -->
    <ellipse cx="-16" cy="-16" rx="10" ry="12" fill="#FFFFFF" stroke="#DDD" stroke-width="1"/>
    <ellipse cx="16" cy="-16" rx="10" ry="12" fill="#FFFFFF" stroke="#DDD" stroke-width="1"/>
    <ellipse cx="-14" cy="-14" rx="5" ry="6" fill="#FFE8EC"/>
    <ellipse cx="14" cy="-14" rx="5" ry="6" fill="#FFE8EC"/>
    <!-- Bow -->
    <g transform="translate(20,-18)">
      <circle cx="0" cy="0" r="5" fill="#E8443A"/>
      <ellipse cx="-8" cy="2" rx="8" ry="5" fill="#E8443A" transform="rotate(-20)"/>
      <ellipse cx="8" cy="2" rx="8" ry="5" fill="#E8443A" transform="rotate(20)"/>
    </g>
    <!-- Face details -->
    <circle cx="-7" cy="-4" r="2" fill="#333"/><circle cx="7" cy="-4" r="2" fill="#333"/>
    <ellipse cx="0" cy="0" rx="3" ry="2.5" fill="#FFD700"/>
    <!-- Whiskers -->
    <line x1="-12" y1="3" x2="-24" y2="0" stroke="#CCC" stroke-width="1"/>
    <line x1="-12" y1="5" x2="-24" y2="8" stroke="#CCC" stroke-width="1"/>
    <line x1="12" y1="3" x2="24" y2="0" stroke="#CCC" stroke-width="1"/>
    <line x1="12" y1="5" x2="24" y2="8" stroke="#CCC" stroke-width="1"/>
  </g>
  <!-- Red bow (top right) -->
  <g transform="translate(1060,85)">
    <circle cx="0" cy="0" r="6" fill="#E8443A"/>
    <ellipse cx="-10" cy="2" rx="10" ry="6" fill="#E8443A" transform="rotate(-20)"/>
    <ellipse cx="10" cy="2" rx="10" ry="6" fill="#E8443A" transform="rotate(20)"/>
    <rect x="-3" y="6" width="6" height="8" rx="2" fill="#E8443A"/>
  </g>
  <!-- Flowers along bottom -->
  <g transform="translate(200,1550)"><circle cx="0" cy="0" r="3" fill="#FFD700"/><circle cx="-5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="-6" cy="4" r="4" fill="#FFB6C1"/><circle cx="6" cy="4" r="4" fill="#FFB6C1"/></g>
  <g transform="translate(400,1550)"><circle cx="0" cy="0" r="3" fill="#FFD700"/><circle cx="-5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="-6" cy="4" r="4" fill="#FFB6C1"/><circle cx="6" cy="4" r="4" fill="#FFB6C1"/></g>
  <g transform="translate(600,1550)"><circle cx="0" cy="0" r="3" fill="#FFD700"/><circle cx="-5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="-6" cy="4" r="4" fill="#FFB6C1"/><circle cx="6" cy="4" r="4" fill="#FFB6C1"/></g>
  <g transform="translate(800,1550)"><circle cx="0" cy="0" r="3" fill="#FFD700"/><circle cx="-5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="5" cy="-4" r="4" fill="#FFB6C1"/></g>
  <g transform="translate(1000,1550)"><circle cx="0" cy="0" r="3" fill="#FFD700"/><circle cx="-5" cy="-4" r="4" fill="#FFB6C1"/><circle cx="5" cy="-4" r="4" fill="#FFB6C1"/></g>
  <!-- Stars -->
  <text x="350" y="50" font-size="14" fill="#FFD700" opacity="0.5">★</text>
  <text x="700" y="48" font-size="20" fill="#FFD700" opacity="0.4">★</text>
  <text x="550" y="55" font-size="10" fill="#FFD700" opacity="0.5">★</text>
  <text x="850" y="52" font-size="12" fill="#FFD700" opacity="0.4">★</text>
  <!-- Polka dots -->
  <circle cx="200" cy="45" r="3" fill="#E891A0" opacity="0.3"/>
  <circle cx="500" cy="40" r="4" fill="#E891A0" opacity="0.25"/>
  <circle cx="750" cy="45" r="3" fill="#E891A0" opacity="0.3"/>
  <circle cx="950" cy="40" r="4" fill="#E891A0" opacity="0.25"/>
  <!-- Branding -->
  <text x="600" y="1588" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="#E891A0" opacity="0.7">Hello Kitty</text>
</svg>