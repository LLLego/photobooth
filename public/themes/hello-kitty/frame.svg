    <g id="s"><path d="M0,-30 Q15,-15 0,0 Q-15,-15 0,-30 M0,0 Q15,15 0,30 Q-15,15 0,0 M0,0 Q-30,15 -30,0 Q-15,-15 0,0 M0,0 Q30,-15 30,0 Q15,15 0,0" fill="#FFF5CC"/></g>
    <g id="f"><circle cx="0" cy="-15" r="12" fill="#E891A0"/><circle cx="14" cy="-5" r="12" fill="#E891A0"/><circle cx="9" cy="12" r="12" fill="#E891A0"/><circle cx="-9" cy="12" r="12" fill="#E891A0"/><circle cx="-14" cy="-5" r="12" fill="#E891A0"/><circle cx="0" cy="2" r="9" fill="#FFF5CC"/></g>
    <g id="b">
