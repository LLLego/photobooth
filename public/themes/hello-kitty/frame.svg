    <use href="#f" transform="translate(300, 85) scale(0.85)"/>
    <use href="#s" transform="translate(450, 95) scale(0.6)"/>
    <use href="#f" transform="translate(600, 85) scale(1.15)"/>
    <use href="#s" transform="translate(750, 95) scale(0.6)"/>
