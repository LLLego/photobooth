    <circle cx="105" cy="50" r="8" fill="#FFF5CC"/>
    <circle cx="255" cy="50" r="8" fill="#FFF5CC"/>
    <circle cx="405" cy="50" r="8" fill="#FFF5CC"/>
    <circle cx="555" cy="50" r="8" fill="#FFF5CC"/>
    <circle cx="705" cy="50" r="8" fill="#FFF5CC"/>
    <circle cx="855" cy="50" r="8" fill="#FFF5CC"/>
    <circle cx="1005" cy="50" r="8" fill="#FFF5CC"/>

