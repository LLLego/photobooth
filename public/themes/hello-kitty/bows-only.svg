<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600">

  <rect x="50" y="40" width="1100" height="1480" rx="30" fill="none" stroke="#E891A0" stroke-width="3"/>
  <!-- Big bow top-left -->
  <g transform="translate(160,120)"><circle cx="0" cy="0" r="10" fill="#E8443A"/><ellipse cx="-18" cy="3" rx="18" ry="10" fill="#E8443A" transform="rotate(-25)"/><ellipse cx="18" cy="3" rx="18" ry="10" fill="#E8443A" transform="rotate(25)"/><rect x="-5" y="10" width="10" height="14" rx="3" fill="#E8443A"/></g>
  <!-- Bows scattered -->
  <g transform="translate(1000,120)"><circle cx="0" cy="0" r="7" fill="#FFB6C1"/><ellipse cx="-12" cy="2" rx="12" ry="7" fill="#FFB6C1" transform="rotate(-20)"/><ellipse cx="12" cy="2" rx="12" ry="7" fill="#FFB6C1" transform="rotate(20)"/></g>
  <g transform="translate(500,80) opacity="0.5"><circle cx="0" cy="0" r="5" fill="#E891A0"/><ellipse cx="-8" cy="1" rx="8" ry="5" fill="#E891A0" transform="rotate(-20)"/><ellipse cx="8" cy="1" rx="8" ry="5" fill="#E891A0" transform="rotate(20)"/></g>
  <!-- Polka dots along edges -->
  <circle cx="200" cy="50" r="4" fill="#FFB6C1" opacity="0.4"/><circle cx="400" cy="45" r="5" fill="#E891A0" opacity="0.3"/><circle cx="700" cy="50" r="4" fill="#FFB6C1" opacity="0.4"/><circle cx="900" cy="45" r="5" fill="#E891A0" opacity="0.3"/>
  <text x="600" y="1565" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#E891A0" opacity="0.7">Bows & Ribbons</text>
</svg>