<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello Kitty Couple Photo Frame</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Fredoka', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,192,205,0.45), transparent 60%),
      radial-gradient(circle at 80% 80%, rgba(255,200,215,0.4), transparent 55%),
      repeating-linear-gradient(45deg, #ffe8ec 0px, #ffe8ec 22px, #ffdce2 22px, #ffdce2 44px);
    padding: 30px;
  }

  /* The 1200×1600 photo frame.
     Everything is positioned relative to this.
     The .photo-area stays fully transparent. */
  .frame {
    position: relative;
    width: 1200px;
    height: 1600px;
    flex-shrink: 0;
    filter: drop-shadow(0 30px 60px rgba(232, 68, 58, 0.22));
  }

  /* The transparent window where the photo will sit */
  .photo-area {
    position: absolute;
    top: 130px;
    left: 100px;
    right: 100px;
    bottom: 130px;
    background: transparent;
  }

  /* Subtle dotted guide so the empty center reads as intentional */
  .photo-guide {
    position: absolute;
    inset: 0;
    border: 2px dashed rgba(232, 145, 160, 0.28);
    border-radius: 30px;
    pointer-events: none;
  }

  .photo-tag {
    position: absolute;
    top: -36px;
    left: 0;
    font-size: 14px;
    color: rgba(232, 145, 160, 0.55);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .photo-tag-r {
    position: absolute;
    bottom: -36px;
    right: 0;
    font-size: 14px;
    color: rgba(232, 145, 160, 0.55);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ===== OUTER SCALLOPED BORDER ===== */
  .border-outer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* ===== HELLO KITTY (top-left, peeks over the window) ===== */
  .kitty {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 380px;
    height: 380px;
    z-index: 10;
  }

  /* ===== TOP-RIGHT HEART WITH HUG ===== */
  .heart-top {
    position: absolute;
    top: 110px;
    right: 110px;
    width: 200px;
    height: 200px;
    z-index: 10;
  }

  /* ===== BOWS IN BOTTOM CORNERS ===== */
  .bow-corner {
    position: absolute;
    width: 240px;
    height: 240px;
    z-index: 10;
  }
  .bow-bl { bottom: 70px; left: 70px; }
  .bow-br { bottom: 70px; right: 70px; transform: scaleX(-1); }

  /* ===== SCATTERED STARS / SPARKLES ===== */
  .star {
    position: absolute;
    pointer-events: none;
    z-index: 6;
  }
  .star svg { width: 100%; height: 100%; display: block; }

  /* ===== LITTLE FLOWERS ON THE SIDES ===== */
  .flower {
    position: absolute;
    pointer-events: none;
    z-index: 6;
  }
  .flower svg { width: 100%; height: 100%; display: block; }

  /* ===== TINY DOT ACCENTS ===== */
  .dot {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
  }

  /* ===== SWEET SENTIMENT AT THE BOTTOM ===== */
  .caption {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 22px;
    z-index: 11;
    white-space: nowrap;
  }
  .caption-line {
    width: 90px;
    height: 2px;
    background: #E891A0;
    opacity: 0.55;
  }
  .caption-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    color: #E8443A;
    letter-spacing: 6px;
    font-weight: 600;
  }

  /* Cream polka-dot accent sheet behind the caption for sticker feel */
  .caption-pill {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 360px;
    height: 44px;
    background: rgba(255, 245, 204, 0.78);
    border-radius: 30px;
    border: 2px dashed rgba(232, 145, 160, 0.45);
    z-index: 10;
  }
</style>
</head>
