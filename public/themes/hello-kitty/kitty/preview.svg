<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDF3F8" />
      <stop offset="100%" stop-color="#E8DCF5" />
    </radialGradient>

    <radialGradient id="catBody" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#FCFCFD" />
      <stop offset="100%" stop-color="#E8EAED" />
    </radialGradient>

    <radialGradient id="catShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D1D3D8" />
      <stop offset="100%" stop-color="#F8F9FA" />
    </radialGradient>

    <radialGradient id="earPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC6D9" />
      <stop offset="100%" stop-color="#FF9EBE" />
    </radialGradient>

    <linearGradient id="collarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5862" />
      <stop offset="100%" stop-color="#DA2834" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE680" />
      <stop offset="50%" stop-color="#FFC835" />
      <stop offset="100%" stop-color="#D89200" />
    </linearGradient>

    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6BB6FF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#6BB6FF" stop-opacity="0" />
    </radialGradient>

    <clipPath id="bellClip">
      <circle cx="100" cy="163" r="11" />
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)" />
  
  <!-- Floating sparkles -->
  <g opacity="0.6">
    <path d="M 40,40 Q 42,38 44,40 Q 42,42 40,44 Q 38,42 40,40 Z" fill="#FFFFFF" />
    <path d="M 165,50 Q 167,48 169,50 Q 167,52 165,54 Q 163,52 165,50 Z" fill="#FFFFFF" />
    <path d="M 155,160 Q 157,158 159,160 Q 157,162 155,164 Q 153,162 155,160 Z" fill="#FFFFFF" />
    <path d="M 35,140 Q 37,138 39,140 Q 37,142 35,144 Q 33,142 35,140 Z" fill="#FFFFFF" />
  </g>
  
  <!-- Ground shadow -->
  <ellipse cx="100" cy="186" rx="50" ry="6" fill="#9C8DB8" opacity="0.15" />

  <!-- Tail -->
  <path d="M 60,155 C 50,160 35,155 38,140 C 40,130 50,135 52,145" 
        fill="url(#catBody)" stroke="#E8EAED" stroke-width="0.8" stroke-linejoin="round" />
  <path d="M 42,155 C 36,155 34,148 38,144" 
        fill="none" stroke="#F4C6DC" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />

  <!-- Hind Legs -->
  <ellipse cx="72" cy="172" rx="12" ry="9" fill="url(#catBody)" />
  <ellipse cx="128" cy="172" rx="12" ry="9" fill="url(#catBody)" />

  <!-- Body -->
  <ellipse cx="100" cy="150" rx="40" ry="34" fill="url(#catBody)" />
  
  <!-- Front Paws -->
  <ellipse cx="85" cy="180" rx="9" ry="7" fill="url(#catBody)" />
  <ellipse cx="115" cy="180" rx="9" ry="7" fill="url(#catBody)" />
  
  <!-- Paw Lines -->
  <path d="M 85,174 L 85,183 M 82,175 L 81,182 M 88,175 L 89,182" stroke="#E6CFDC" stroke-width="0.8" stroke-linecap="round" fill="none" />
  <path d="M 115,174 L 115,183 M 112,175 L 111,182 M 118,175 L 119,182" stroke="#E6CFDC" stroke-width="0.8" stroke-linecap="round" fill="none" />

  <!-- Collar -->
  <path d="M 65,132 Q 100,145 135,132 L 135,142 Q 100,158 65,142 Z" fill="url(#collarGrad)" />
  <!-- Collar Highlights & Shadow -->
  <path d="M 68,134 Q 100,145 132,134" fill="none" stroke="#FF8A95" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 68,140 Q 100,153 132,140" fill="none" stroke="#B21E29" stroke-width="1" stroke-linecap="round" opacity="0.6" />

  <!-- Bell Strings -->
  <line x1="93" y1="152" x2="97" y2="162" stroke="#B8860B" stroke-width="1.2" stroke-linecap="round" />
  <line x1="107" y1="152" x2="103" y2="162" stroke="#B8860B" stroke-width="1.2" stroke-linecap="round" />

  <!-- Bell Base -->
  <circle cx="100" cy="163" r="11" fill="url(#goldGrad)" />
  <circle cx="100" cy="163" r="11" fill="none" stroke="#B8860B" stroke-width="0.8" />
  
  <!-- Bell Details -->
  <rect x="88" y="162" width="24" height="3.5" fill="#B8860B" clip-path="url(#bellClip)" />
  <circle cx="100" cy="167" r="2.2" fill="#B8860B" />
  <circle cx="95" cy="159" r="2" fill="#FFF6CC" opacity="0.8" />

  <!-- Head Base -->
  <ellipse cx="100" cy="90" rx="44" ry="40" fill="url(#catBody)" />

  <!-- Ears Base -->
  <path d="M 60,85 L 65,45 L 88,70 Z" fill="url(#catBody)" />
  <path d="M 140,85 L 135,45 L 112,70 Z" fill="url(#catBody)" />

  <!-- Ears Inner Pink -->
  <path d="M 64,78 L 68,53 L 83,70 Z" fill="url(#earPink)" />
  <path d="M 136,78 L 132,53 L 117,70 Z" fill="url(#earPink)" />

  <!-- Blush -->
  <circle cx="70" cy="100" r="9" fill="#FFB0CB" opacity="0.6" />
  <circle cx="130" cy="100" r="9" fill="#FFB0CB" opacity="0.6" />

  <!-- Eyes (Big & Round) -->
  <circle cx="78" cy="88" r="9.5" fill="url(#eyeGlow)" />
  <circle cx="122" cy="88" r="9.5" fill="url(#eyeGlow)" />
  
  <ellipse cx="78" cy="88" rx="7" ry="8.5" fill="#2B2A33" />
  <ellipse cx="122" cy="88" rx="7" ry="8.5" fill="#2B2A33" />
  
  <!-- Eye Catchlights -->
  <circle cx="75" cy="84" r="3.5" fill="#FFFFFF" />
  <circle cx="81" cy="90" r="1.5" fill="#FFFFFF" opacity="0.8" />
  
  <circle cx="119" cy="84" r="3.5" fill="#FFFFFF" />
  <circle cx="125" cy="90" r="1.5" fill="#FFFFFF" opacity="0.8" />

  <!-- Nose -->
  <path d="M 95,103 L 105,103 L 100,108 Z" fill="#FF8FAB" />
  <path d="M 96,104 L 98,104 L 100,106.5 Z" fill="#FFC2D4" opacity="0.8" />

  <!-- Mouth -->
  <path d="M 100,108 L 100,111" stroke="#2B2A33" stroke-width="1.1" stroke-linecap="round" />
  <path d="M 100,111 Q 96,114 93,111" fill="none" stroke="#2B2A33" stroke-width="1.1" stroke-linecap="round" />
  <path d="M 100,111 Q 104,114 107,111" fill="none" stroke="#2B2A33" stroke-width="1.1" stroke-linecap="round" />

  <!-- Whiskers -->
  <!-- Left Whiskers -->
  <path d="M 65,105 Q 45,102 35,105" fill="none" stroke="#B0B0B0" stroke-width="0.8" stroke-linecap="round" />
  <path d="M 65,108 Q 45,110 32,112" fill="none" stroke="#B0B0B0" stroke-width="0.8" stroke-linecap="round" />
  <path d="M 65,102 Q 45,96 30,95" fill="none" stroke="#B0B0B0" stroke-width="0.8" stroke-linecap="round" />
  
  <!-- Right Whiskers -->
  <path d="M 135,105 Q 155,102 165,105" fill="none" stroke="#B0B0B0" stroke-width="0.8" stroke-linecap="round" />