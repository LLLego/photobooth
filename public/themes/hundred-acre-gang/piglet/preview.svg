xml
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFEDF5" />
      <stop offset="60%" stop-color="#FFC2DE" />
      <stop offset="100%" stop-color="#E59AC4" />
    </radialGradient>

    <!-- Soft Lighting Filter -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#D87BA8" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg-grad)" />

  <!-- Piglet Body / Chin -->
  <ellipse cx="100" cy="155" rx="48" ry="38" fill="#FFB0C8" />

  <!-- Piglet Ears (Behind Head) -->
  <g id="ears">
    <!-- Left Ear -->
    <path d="M 70 80 Q 55 60 65 40 Q 85 65 85 85 Z" fill="#FFB0C8" />
    <path d="M 72 75 Q 63 60 70 48 Q 82 68 82 80 Z" fill="#FF8DAE" />
    <!-- Right Ear -->
    <path d="M 130 80 Q 145 60 135 40 Q 115 65 115 85 Z" fill="#FFB0C8" />
    <path d="M 128 75 Q 137 60 130 48 Q 118 68 118 80 Z" fill="#FF8DAE" />
  </g>

  <!-- Main Piglet Head -->
  <ellipse cx="100" cy="105" rx="50" ry="42" fill="#FFC4D6" filter="url(#soft-glow)" />

  <!-- Blush (Shy Expression) -->
  <ellipse cx="68" cy="115" rx="12" ry="7" fill="#FF8AA9" opacity="0.55" />
  <ellipse cx="132" cy="115" rx="12" ry="7" fill="#FF8AA9" opacity="0.55" />

  <!-- Piglet Snout -->
  <g id="snout">
    <ellipse cx="100" cy="130" rx="20" ry="14" fill="#FFAABE" />
    <!-- Nostrils -->
    <ellipse cx="92" cy="130" rx="3" ry="4.5" fill="#D87BA8" />
    <ellipse cx="108" cy="130" rx="3" ry="4.5" fill="#D87BA8" />
  </g>

  <!-- Large Shy Eyes -->
  <g id="eyes">
    <!-- Left Eye -->
    <ellipse cx="80" cy="95" rx="9" ry="11.5" fill="#3D2B3D" />
    <circle cx="78" cy="91" r="3.5" fill="#FFFFFF" />
    <circle cx="82" cy="98" r="1.5" fill="#FFFFFF" opacity="0.8" />
    
    <!-- Right Eye -->
    <ellipse cx="120" cy="95" rx="9" ry="11.5" fill="#3D2B3D" />
    <circle cx="118" cy="91" r="3.5" fill="#FFFFFF" />
    <circle cx="122" cy="98" r="1.5" fill="#FFFFFF" opacity="0.8" />
  </g>

  <!-- Shy Eyebrows (Slight worried/raised inner arches) -->
  <path d="M 72 80 Q 80 76 88 81" stroke="#E08FAC" stroke-width="2.5" stroke-linecap="round" fill="none" />
  <path d="M 112 81 Q 120 76 128 80" stroke="#E08FAC" stroke-width="2.5" stroke-linecap="round" fill="none" />
</svg>