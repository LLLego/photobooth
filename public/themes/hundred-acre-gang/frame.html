<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hundred Acre Gang · Photobooth Frame</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background-color: #5d5d5d;
    background-image:
      linear-gradient(45deg, #6e6e6e 25%, transparent 25%),
      linear-gradient(-45deg, #6e6e6e 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #6e6e6e 75%),
      linear-gradient(-45deg, transparent 75%, #6e6e6e 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 15px 40px;
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    color: #fff8e7;
  }
  .frame-wrap { position: relative; }
  .frame {
    display: block;
    width: 1200px;
    max-width: 100%;
    height: auto;
    filter: drop-shadow(0 18px 35px rgba(0,0,0,0.4));
  }
  .photo-mock {
    position: absolute;
    top: 7%;
    left: 7%;
    right: 7%;
    bottom: 7%;
    background: linear-gradient(135deg, #f5e6c8 0%, #e8d4a8 50%, #f0dcae 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8B6914;
    font-size: 22px;
    font-style: italic;
    text-align: center;
    opacity: 0.65;
    pointer-events: none;
  }
  .caption {
    margin-top: 22px;
    color: rgba(255, 248, 231, 0.78);
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 300;
  }
</style>
</head>
<body>
  <div class="frame-wrap">
    <!-- Photo placeholder mock — DELETE this div when using overlay in a photobooth -->
    <div class="photo-mock">— photo goes here —<br/>(this overlay's center is transparent)</div>

    <svg class="frame" viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg" aria-label="Winnie the Pooh photobooth frame overlay">
      <defs>
        <!-- Watercolor textures -->
        <filter id="watercolor" x="-15%" y="-15%" width="130%" height="130%">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
          <feColorMatrix values="0 0 0 0 0.6  0 0 0 0 0.5  0 0 0 0 0.3  0 0 0 0.18 0"/>
          <feComposite in2="SourceGraphic" operator="in"/>
          <feBlend in="SourceGraphic" mode="multiply"/>
        </filter>
        <filter id="rough">
          <feTurbulence type="turbulence" baseFrequency="0.035" numOctaves="2" seed="7"/>
          <feDisplacementMap in="SourceGraphic" scale="1.8"/>
        </filter>
        <filter id="soft">
          <feGaussianBlur stdDeviation="0.4"/>
        </filter>

        <!-- Character gradients -->
        <linearGradient id="poohBody" x1="0.3" y1="0" x2="0.7" y2="1">
          <stop offset="0%" stop-color="#FFD86B"/><stop offset="55%" stop-color="#FFB400"/><stop offset="100%" stop-color="#D88E00"/>
        </linearGradient>
        <linearGradient id="poohShirt" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E62E5A"/><stop offset="100%" stop-color="#A01538"/>
        </linearGradient>
        <linearGradient id="poohMuzzle" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFEBC4"/><stop offset="100%" stop-color="#F2D69E"/>
        </linearGradient>
        <linearGradient id="pigletBody" x1="0.3" y1="0" x2="0.7" y2="1">
          <stop offset="0%" stop-color="#FFD0D8"/><stop offset="100%" stop-color="#F4A8B8"/>
        </linearGradient>
        <linearGradient id="pigletStripe" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#B83C50"/><stop offset="100%" stop-color="#8E2236"/>
        </linearGradient>
        <linearGradient id="tiggerBody" x1="0.3" y1="0" x2="0.7" y2="1">
          <stop offset="0%" stop-color="#FF9F45"/><stop offset="60%" stop-color="#E5620C"/><stop offset="100%" stop-color="#A8430A"/>
        </linearGradient>
        <linearGradient id="eeyoreBody" x1="0.3" y1="0" x2="0.7" y2="1">
          <stop offset="0%" stop-color="#A8B1BD"/><stop offset="55%" stop-color="#818C9A"/><stop offset="100%" stop-color="#5F6975"/>
        </linearGradient>
        <linearGradient id="eeyoreMuzzle" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#DDE3E9"/><stop offset="100%" stop-color="#B5BCC5"/>
        </linearGradient>
        <linearGradient id="potGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#C98A3B"/><stop offset="100%" stop-color="#6B3814"/>
        </linearGradient>
        <linearGradient id="potInner" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFD96B"/><stop offset="100%" stop-color="#C8881A"/>
        </linearGradient>

        <radialGradient id="honeyGlow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="#FFD86B" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#FFB400" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.65">
          <stop offset="55%" stop-color="#000" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
        </radialGradient>
        <radialGradient id="bees" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="#FFD86B" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#FFD86B" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- ============ PHOTO HOLE — everything inside is clipped to NOTHING ============ -->
      <!-- This path is fill="none" — pure transparent center for photo insertion -->
      <path d="M 80,80 L 1120,80 L 1120,1520 L 80,1520 Z"
            fill="none" stroke="none"/>

      <!-- ============ FRAME BORDERS ============ -->
      <!-- Outer warm parchment border -->
      <rect x="0" y="0" width="1200" height="1600" fill="#FFF8E7" opacity="0"/>

      <!-- Watercolor ink double-border -->
      <g filter="url(#rough)">
        <path d="M 75,75 Q 600,68 1125,75 Q 1132,800 1125,1525 Q 600,1532 75,1525 Q 68,800 75,75 Z"
              fill="none" stroke="#8B6914" stroke-width="3" opacity="0.55"/>
        <path d="M 95,95 Q 600,89 1105,95 Q 1111,800 1105,1505 Q 600,1511 95,1505 Q 89,800 95,95 Z"
              fill="none" stroke="#8B6914" stroke-width="1.2" opacity="0.4"/>
      </g>

      <!-- Soft honey warmth bleeding from corners -->
      <ellipse cx="180" cy="180" rx="260" ry="220" fill="url(#honeyGlow)"/>
      <ellipse cx="1020" cy="180" rx="200" ry="180" fill="url(#honeyGlow)"/>
      <ellipse cx="180" cy="1420" rx="220" ry="200" fill="url(#honeyGlow)"/>
      <ellipse cx="1020" cy="1420" rx="260" ry="220" fill="url(#honeyGlow)"/>

      <!-- Honey drip accents along top -->
      <g opacity="0.45" filter="url(#soft)">
        <path d="M 500,72 Q 505,90 500,108 Q 495,90 500,72 Z" fill="#FFB400"/>
        <path d="M 700,72 Q 706,95 700,118 Q 694,95 700,72 Z" fill="#FFB400"/>
        <path d="M 600,68 Q 603,82 600,95 Q 597,82 600,68 Z" fill="#FFB400"/>
      </g>

      <!-- ============ POOH — TOP LEFT (holding honey pot) ============ -->
      <g transform="translate(35, 30)">
        <!-- Honey golden glow halo -->
        <ellipse cx="190" cy="200" rx="200" ry="180" fill="url(#honeyGlow)" opacity="0.7"/>

        <!-- Ears -->
        <g>
          <ellipse cx="78" cy="100" rx="34" ry="28" fill="#C8862C" filter="url(#soft)"/>
          <ellipse cx="78" cy="100" rx="22" ry="17" fill="#FF9F25"/>
          <ellipse cx="200" cy="100" rx="34" ry="28" fill="#C8862C" filter="url(#soft)"/>
          <ellipse cx="200" cy="100" rx="22" ry="17" fill="#FF9F25"/>
        </g>

        <!-- Honey pot (in front, bottom area) -->
        <g transform="translate(95, 200)" filter="url(#watercolor)">
          <!-- Pot body -->
          <path d="M 8,22 Q 4,38 14,72 Q 30,84 80,84 Q 130,84 146,72 Q 156,38 152,22 Q 120,16 80,16 Q 40,16 8,22 Z"
                fill="url(#potGrad)"/>
          <!-- Pot rim -->
          <ellipse cx="80" cy="22" rx="74" ry="11" fill="#3D1F08"/>
          <ellipse cx="80" cy="20" rx="68" ry="8" fill="url(#potInner)"/>
          <!-- Honey dripping from rim -->
          <path d="M 25,22 Q 28,40 22,55 Q 35,42 38,22 Z" fill="#FFC740" opacity="0.9"/>
          <path d="M 110,22 Q 116,46 108,68 Q 122,46 130,22 Z" fill="#FFC740" opacity="0.9"/>
          <path d="M 70,20 Q 73,32 68,42 Q 78,32 80,20 Z" fill="#FFD86B" opacity="0.9"/>
          <!-- Honey label -->
          <text x="80" y="58" text-anchor="middle" font-family="'Palatino Linotype', Georgia, serif"
                font-style="italic" font-size="15" fill="#FFF8E7" font-weight="bold">HUNNY</text>
        </g>

        <!-- Pooh body & head (peeking from top-left) -->
        <g filter="url(#watercolor)">
          <!-- Body/shirt area at bottom -->
          <path d="M 30,180 Q 25,225 50,255 Q 105,272 160,266 Q 200,260 210,230 Q 205,200 175,190 Z"
                fill="url(#poohShirt)" filter="url(#soft)"/>
          <!-- Yellow peeking from behind shirt -->
          <ellipse cx="40" cy="220" rx="20" ry="35" fill="#FFB400" opacity="0.6"/>

          <!-- Head -->
          <ellipse cx="140" cy="180" rx="108" ry="100" fill="url(#poohBody)"/>
          <!-- Head watercolor variations -->
          <ellipse cx="110" cy="160" rx="40" ry="50" fill="#FFD86B" opacity="0.55"/>
          <ellipse cx="170" cy="200" rx="30" ry="25" fill="#D88E00" opacity="0.3"/>

          <!-- Muzzle -->
          <ellipse cx="140" cy="215" rx="55" ry="40" fill="url(#poohMuzzle)" filter="url(#soft)"/>
          <!-- Nose -->
          <ellipse cx="140" cy="200" rx="13" ry="9" fill="#3D2010"/>
          <ellipse cx="137" cy="197" rx="4" ry="3" fill="#8B6914" opacity="0.6"/>
          <!-- Mouth -->
          <path d="M 140,212 L 140,228" stroke="#5C3818" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <path d="M 140,228 Q 128,236 118,232" stroke="#5C3818" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <path d="M 140,228 Q 152,236 162,232" stroke="#5C3818" stroke-width="1.8" stroke-linecap="round" fill="none"/>

          <!-- Eyebrows -->
          <path d="M 95,160 Q 110,154 125,160" stroke="#5C3818" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M 155,160 Q 170,154 185,160" stroke="#5C3818" stroke-width="2.5" stroke-linecap="round" fill="none"/>

          <!-- Eyes (small dots, friendly) -->
          <ellipse cx="110" cy="178" rx="4" ry="5.5" fill="#1F1208"/>
          <ellipse cx="170" cy="178" rx="4" ry="5.5" fill="#1F1208"/>
          <circle cx="111.5" cy="176" r="1.4" fill="#FFF8E7"/>
          <circle cx="171.5" cy="176" r="1.4" fill="#FFF8E7"/>
        </g>

        <!-- Little bee buzzing nearby -->
        <g transform="translate(255, 110)">
          <ellipse cx="0" cy="0" rx="6" ry="3.5" fill="#FFD86B"/>
          <path d="M -2,-3 L -1,3 M 1,-3 L 2,3" stroke="#3D2010" stroke-width="0.8"/>
          <path d="M -4,-2 L -7,-5 M 4,-2 L 7,-5" stroke="#FFF8E7" stroke-width="1" opacity="0.8"/>
        </g>
        <g transform="translate(280, 145)" opacity="0.7">
          <ellipse cx="0" cy="0" rx="4" ry="2.5" fill="#FFD86B"/>
        </g>
      </g>

      <!-- ============ PIGLET — TOP RIGHT (tiny and pink, peeking) ============ -->
      <g transform="translate(
