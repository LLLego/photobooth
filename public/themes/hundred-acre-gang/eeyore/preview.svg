xml
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#F4F8FC"/>
      <stop offset="100%" stop-color="#E1E8F2"/>
    </radialGradient>

    <!-- Donkey Body Gradient -->
    <linearGradient id="donkeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#98AECC"/>
      <stop offset="100%" stop-color="#6985AD"/>
    </linearGradient>

    <!-- Soft Drop Shadow for background depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#4A6585" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)"/>

  <!-- Donkey Group -->
  <g filter="url(#shadow)">
    
    <!-- Left Ear (Behind Head) -->
    <g>
      <path d="M 40,85 C 10,55 0,20 25,15 C 40,15 65,50 75,80 Z" fill="#7892B2"/>
      <!-- Inner Ear -->
      <path d="M 42,75 C 22,55 15,30 28,27 C 38,27 55,52 62,75 Z" fill="#5C7BA0"/>
      <!-- Stitching Detail -->
      <path d="M 20,35 L 45,65" stroke="#48668B" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,3" opacity="0.6"/>
    </g>

    <!-- Right Ear (Behind Head) -->
    <g>
      <path d="M 160,85 C 190,55 200,20 175,15 C 160,15 135,50 125,80 Z" fill="#7892B2"/>
      <!-- Inner Ear -->
      <path d="M 158,75 C 178,55 185,30 172,27 C 162,27 145,52 138,75 Z" fill="#5C7BA0"/>
      <!-- Stitching Detail -->
      <path d="M 180,35 L 155,65" stroke="#48668B" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,3" opacity="0.6"/>
    </g>

    <!-- Tail (Right Side, tucked behind face) -->
    <g>
      <!-- Tail Base -->
      <circle cx="158" cy="145" r="8" fill="#4A6585"/>
      
      <!-- Pink Bow -->
      <g transform="translate(158, 145) scale(1.2)">
        <!-- Left Ribbon -->
        <polygon points="0,0 -12,-10 -10,0 -12,10" fill="#E38A9D"/>
        <!-- Right Ribbon -->
        <polygon points="0,0 12,-10 10,0 12,10" fill="#E38A9D"/>
        <!-- Center Knot -->
        <circle cx="0" cy="0" r="5" fill="#D17388"/>
        <!-- Highlight on Center -->
        <circle cx="-1" cy="-1" r="2" fill="#F4A7B8"/>
      </g>
    </g>

    <!-- Main Head Base -->
    <ellipse cx="100" cy="115" rx="55" ry="48" fill="url(#donkeyGrad)"/>

    <!-- Muzzle / Snout Area -->
    <ellipse cx="100" cy="140" rx="35" ry="25" fill="#90A8C9"/>

    <!-- Cheeks / Blush for sweet expression -->
    <ellipse cx="72" cy="135" rx="10" ry="6" fill="#D88BA0" opacity="0.35"/>
    <ellipse cx="128" cy="135" rx="10" ry="6" fill="#D88BA0" opacity="0.35"/>

    <!-- Eyes -->
    <g fill="#3A4D66">
      <!-- Left Eye -->
      <path d="M 75,100 Q 82,97 89,100 Q 82,103 75,100 Z"/>
      <!-- Right Eye -->
      <path d="M 111,100 Q 118,97 125,100 Q 118,103 111,100 Z"/>
    </g>

    <!-- Sad Eyebrows -->
    <path d="M 74,92 Q 81,89 87,92" stroke="#4A6585" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 113,92 Q 119,89 126,92" stroke="#4A6585" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Forehead Tuft (Mane) -->
    <path d="M 92,66 Q 85,50 92,48 Q 100,62 100,72 Q 100,62 108,48 Q 115,50 108,66 Z" fill="#3A4D66"/>

    <!-- Snout / Nose Details -->
    <!-- Nostrils -->
    <ellipse cx="90" cy="135" rx="2.5" ry="4" fill="#5C7BA0" transform="rotate(-15 90 135)"/>
    <ellipse cx="110" cy="135" rx="2.5" ry="4" fill="#5C7BA0" transform="rotate(15 110 135)"/>
    
    <!-- Sweet Frown Mouth -->
    <path d="M 90,150 Q 100,145 110,150" stroke="#4A6585" stroke-width="2" stroke-linecap="round" fill="none"/>
    
    <!-- Vertical Mouth Seam -->
    <line x1="100" y1="140" x2="100" y2="148" stroke="#4A6585" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Muzzle Stitching Lines -->
    <path d="M 75,140 Q 100,145 125,140" stroke="#7892B2" stroke-width="1" fill="none" stroke-dasharray="2,3" opacity="0.5"/>

  </g>
</svg>