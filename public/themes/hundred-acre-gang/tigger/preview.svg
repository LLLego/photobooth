xml
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Vibrant Orange Gradients -->
    <radialGradient id="orange-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFC43D" />
      <stop offset="70%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#E66500" />
    </radialGradient>
    
    <linearGradient id="ear-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFC43D" />
      <stop offset="100%" stop-color="#FF8A00" />
    </linearGradient>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF5" />
      <stop offset="100%" stop-color="#FFEBD2" />
    </linearGradient>
  </defs>

  <!-- Playful Background -->
  <rect width="200" height="200" fill="url(#bg-grad)" />
  
  <!-- Bouncy Spiral Tail Backdrop -->
  <g fill="none" stroke="#FF8A00" stroke-width="12" stroke-linecap="round" opacity="0.15">
    <path d="M 170 60 Q 180 120 130 140 Q 80 160 90 110" />
  </g>

  <!-- Bouncy Ears -->
  <g id="ears">
    <!-- Left Ear -->
    <path d="M 70 50 L 85 90 L 45 80 Z" fill="url(#ear-grad)" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round"/>
    <!-- Right Ear -->
    <path d="M 130 50 L 115 90 L 155 80 Z" fill="url(#ear-grad)" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Main Head -->
  <circle cx="100" cy="105" r="65" fill="url(#orange-grad)" stroke="#1A1A1A" stroke-width="3" />
  
  <!-- Black Stripe Details (Playful triangular/wedge shapes) -->
  <g fill="#1A1A1A">
    <!-- Top Forehead Stripes -->
    <path d="M 90 42 L 85 65 L 95 60 Z" />
    <path d="M 110 42 L 115 65 L 105 60 Z" />
    <path d="M 100 35 L 105 60 L 95 60 Z" />
    
    <!-- Left Cheek Stripes -->
    <path d="M 45 85 L 75 95 L 50 105 Z" />
    <path d="M 50 115 L 80 125 L 45 135 Z" />
    <path d="M 60 145 L 85 145 L 75 160 Z" />
    
    <!-- Right Cheek Stripes -->
    <path d="M 155 85 L 125 95 L 150 105 Z" />
    <path d="M 150 115 L 120 125 L 155 135 Z" />
    <path d="M 140 145 L 115 145 L 125 160 Z" />
  </g>

  <!-- Big Grin & Snout Details -->
  <g id="muzzle">
    <!-- Chin / Muzzle Base -->
    <ellipse cx="100" cy="125" rx="45" ry="35" fill="#FFEFCC" stroke="#1A1A1A" stroke-width="2.5" />
    
    <!-- Big Grin -->
    <path d="M 70 120 Q 100 170 130 120 Q 100 135 70 120 Z" fill="#1A1A1A" />
    
    <!-- Cheek Dimples -->
    <circle cx="68" cy="125" r="4" fill="#1A1A1A" />
    <circle cx="132" cy="125" r="4" fill="#1A1A1A" />
    
    <!-- Whiskers -->
    <g stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" fill="none">
      <!-- Left Whiskers -->
      <path d="M 65 115 Q 35 110 15 115" />
      <path d="M 65 125 Q 35 125 15 130" />
      <!-- Right Whiskers -->
      <path d="M 135 115 Q 165 110 185 115" />
      <path d="M 135 125 Q 165 125 185 130" />
    </g>
    
    <!-- Nose -->
    <path d="M 92 105 Q 100 100 108 105 Q 105 115 100 115 Q 95 115 92 105 Z" fill="#1A1A1A" />
  </g>

  <!-- Expressive Eyes -->
  <g id="eyes">
    <circle cx="80" cy="95" r="9" fill="#1A1A1A" />
    <circle cx="120" cy="95" r="9" fill="#1A1A1A" />
    
    <!-- Catchlights -->
    <circle cx="83" cy="92" r="3" fill="#FFFFFF" />
    <circle cx="123" cy="92" r="3" fill="#FFFFFF" />
    <circle cx="78" cy="98" r="1" fill="#FFFFFF" />
    <circle cx="118" cy="98" r="1" fill="#FFFFFF" />
  </g>
</svg>