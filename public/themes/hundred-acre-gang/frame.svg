    <ellipse cx="0" cy="0" rx="20" ry="24" fill="#A0A0B0"/><circle cx="0" cy="-16" r="8" fill="#A0A0B0"/>
    <ellipse cx="-9" cy="-16" rx="5" ry="8" fill="#808090"/><ellipse cx="9" cy="-16" rx="5" ry="8" fill="#808090"/>
