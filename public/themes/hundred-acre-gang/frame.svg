  <g transform="translate(650,32)"><ellipse cx="0" cy="0" rx="6" ry="4" fill="#FFD700"/><rect x="-6" y="-2" width="12" height="1" fill="#333"/><rect x="-6" y="1" width="12" height="1" fill="#333"/></g>
