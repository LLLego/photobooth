    <ellipse cx="0" cy="-5" rx="12" ry="10" fill="#FFF8DC"/><circle cx="-4" cy="-20" r="2" fill="#333"/><circle cx="4" cy="-20" r="2" fill="#333"/>
    <ellipse cx="0" cy="-12" rx="3" ry="2" fill="#E891A0"/><rect x="-8" y="0" width="3" height="20" rx="1" fill="#333" opacity="0.3"/>
    <rect x="-2" y="0" width="3" height="20" rx="1" fill="#333" opacity="0.3"/><rect x="4" y="0" width="3" height="20" rx="1" fill="#333" opacity="0.3"/>
    <text x="-15" y="30" font-size="14">🐯</text>
