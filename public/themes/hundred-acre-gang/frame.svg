<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600">
  <defs>
    <filter id="soft"><feGaussianBlur stdDeviation="1.5"/></filter>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#FFB400"/></linearGradient>
  </defs>
  <!-- Frame border -->
  <rect x="50" y="40" width="1100" height="1480" rx="30" fill="none" stroke="#E8C547" stroke-width="3"/>
  <rect x="62" y="52" width="1076" height="1456" rx="24" fill="none" stroke="#E8C547" stroke-width="1" opacity="0.4"/>
  <!-- Corner flowers -->
  <circle cx="70" cy="60" r="15" fill="#FFB400" opacity="0.7"/>
  <circle cx="1130" cy="60" r="15" fill="#FFB400" opacity="0.7"/>
  <circle cx="70" cy="1540" r="15" fill="#FFB400" opacity="0.7"/>
  <circle cx="1130" cy="1540" r="15" fill="#FFB400" opacity="0.7"/>
