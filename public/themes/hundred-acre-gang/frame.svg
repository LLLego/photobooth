    <ellipse cx="-8" cy="-15" r="4" fill="#FF69B4"/><ellipse cx="8" cy="-15" r="4" fill="#FF69B4"/>
    <circle cx="-4" cy="-15" r="1.5" fill="#333"/><circle cx="4" cy="-15" r="1.5" fill="#333"/>
    <ellipse cx="0" cy="-5" rx="6" ry="4" fill="#FF69B4"/>
  </g>
  <!-- Tigger (bottom left) -->
