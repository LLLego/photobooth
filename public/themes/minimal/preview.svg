<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="frameFace" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0%" stop-color="#E1AC83"/>
      <stop offset="100%" stop-color="#C8855A"/>
    </linearGradient>
    <linearGradient id="matte" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFAF0"/>
      <stop offset="100%" stop-color="#F2E6CE"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0%" stop-color="#FFFAF0" stop-opacity="0.75"/>
      <stop offset="55%" stop-color="#FFFAF0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFAF0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft warm shadow under frame -->
  <ellipse cx="100" cy="183" rx="62" ry="5.5" fill="#7A4A2A" opacity="0.16"/>

  <!-- Outer frame: terracotta -->
  <rect x="16" y="16" width="168" height="168" rx="2" fill="url(#frameFace)"/>

  <!-- Inner cream matte -->
  <rect x="32" y="32" width="136" height="136" rx="1" fill="url(#matte)"/>

  <!-- Photo opening (deep terracotta) -->
  <rect x="44" y="44" width="112" height="112" fill="#B57850"/>
  <rect x="44" y="44" width="112" height="112" fill="url(#innerGlow)"/>

  <!-- Thin inner border accents -->
  <rect x="44" y="44" width="112" height="112" fill="none" stroke="#8E5A35" stroke-width="0.75" opacity="0.5"/>
  <rect x="35" y="35" width="130" height="130" fill="none" stroke="#C8855A" stroke-width="0.5" opacity="0.45"/>

  <!-- Ornate corner flourishes -->
  <g fill="#D4956A" opacity="0.85">
    <!-- Top-left -->
    <path d="M 44 60 L 44 44 L 60 44 L 44 44 M 50 44 L 50 50 L 44 50"/>
    <!-- Top-right -->
    <path d="M 140 44 L 156 44 L 156 60 M 150 44 L 150 50 L 156 50"/>
    <!-- Bottom-left -->
    <path d="M 44 140 L 44 156 L 60 156 M 50 156 L 50 150 L 44 150"/>
    <!-- Bottom-right -->
    <path d="M 140 156 L 156 156 L 156 140 M 150 156 L 150 150 L 156 150"/>
  </g>

  <!-- Decorative star/diamond pattern -->
  <g transform="translate(100 100)" fill="#FFFAF0">
    <!-- Large 4-pointed star -->
    <path d="M 0 -32 L 4.5 -4.5 L 32 0 L 4.5 4.5 L 0 32 L -4.5 4.5 L -32 0 L -4.5 -4.5 Z"/>
    <!-- Inner terracotta star -->
    <path d="M 0 -19 L 2.8 -2.8 L 19 0 L 2.8 2.8 L 0 19 L -2.8 2.8 L -19 0 L -2.8 -2.8 Z"
          fill="#D4956A" opacity="0.9"/>
    <!-- Center pip -->
    <circle r="2.2" fill="#FFFAF0"/>
  </g>

  <!-- Tiny diamond accents along the matte border -->
  <g fill="#D4956A" opacity="0.6">
    <path d="M 100 26 L 103 32 L 100 38 L 97 32 Z"/>
    <path d="M 100 162 L 103 168 L 100 174 L 97 168 Z"/>
    <path d="M 26 100 L 32 103 L 38 100 L 32 97 Z"/>
    <path d="M 162 100 L 168 103 L 174 100 L 168 97 Z"/>
  </g>
</svg>
