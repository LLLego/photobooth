<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>our photobooth</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    min-height: 100vh;
    background: 
      radial-gradient(ellipse at 20% 10%, rgba(212, 149, 106, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(168, 109, 78, 0.06) 0%, transparent 50%),
      #EDE0CE;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
  }
  
  /* Paper grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: 
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.3 0 0 0 0 0.2 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.4;
    mix-blend-mode: multiply;
    z-index: 1000;
  }
  
  .frame {
    position: relative;
    width: 100%;
    max-width: 880px;
    aspect-ratio: 880 / 1240;
    background: #F7EFE0;
    background-image: 
      linear-gradient(180deg, rgba(255,255,255,0.5) 0%, transparent 30%, transparent 70%, rgba(180, 130, 90, 0.08) 100%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.5 0 0 0 0 0.35 0 0 0 0 0.22 0 0 0 0.12 0'/></filter><rect width='100%' height='100%' filter='url(%23p)'/></svg>");
    box-shadow: 
      inset 0 0 0 1px rgba(168, 109, 78, 0.15),
      0 1px 0 rgba(255, 255, 255, 0.6),
      0 30px 60px -20px rgba(80, 50, 30, 0.25),
      0 80px 120px -40px rgba(80, 50, 30, 0.2);
    padding: 60px 50px 70px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* Soft warm stain in corners */
  .frame::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(212, 149, 106, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  
  .frame::after {
    content: '';
    position: absolute;
    bottom: -120px;
    left: -80px;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(168, 109, 78, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  
  /* HEADER */
  .header {
    position: relative;
    text-align: center;
    padding-bottom: 28px;
    z-index: 2;
  }
  
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #A86D4E;
    margin-bottom: 14px;
    font-weight: 500;
    display: inline-block;
    position: relative;
  }
  
  .eyebrow::before,
  .eyebrow::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 36px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C4906B 50%, transparent);
  }
  
  .eyebrow::before { right: 100%; margin-right: 16px; }
  .eyebrow::after { left: 100%; margin-left: 16px; }
  
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(38px, 5.2vw, 56px);
    color: #4A2F1F;
    line-height: 1;
    letter-spacing: -0.01em;
    position: relative;
    display: inline-block;
  }
  
  .title .amp {
    font-size: 0.7em;
    color: #A86D4E;
    margin: 0 0.05em;
    font-weight: 300;
  }
  
  .sub-title {
    font-family: 'Inter', sans-serif;
    font-size: 8.5px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #8B6650;
    margin-top: 16px;
    font-weight: 400;
  }
  
  .sub-title span {
    color: #C4906B;
    margin: 0 8px;
  }
  
  /* PHOTO WELL */
  .photo-well {
    position: relative;
    flex: 1;
    margin: 24px 0;
    z-index: 2;
  }
  
  .photo-well-inner {
    position: relative;
    width: 100%;
    height: 100%;
    background: #D4956A;
    background-image: 
      linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 40%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.5 0 0 0 0 0.3 0 0 0 0 0.2 0 0 0 0.4 0'/></filter><rect width='100%' height='100%' filter='url(%23g)'/></svg>");
    box-shadow: 
      inset 0 0 0 1px rgba(74, 47, 31, 0.2),
      inset 0 0 80px rgba(74, 47, 31, 0.15);
  }
  
  /* Inner double border */
  .photo-well-inner::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(247, 239, 224, 0.35);
    pointer-events: none;
    z-index: 1;
  }
  
  .photo-well-inner::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(247, 239, 224, 0.18);
    pointer-events: none;
    z-index: 1;
  }
  
  /* CORNER CHARACTERS / FLOURISHES */
  .corner {
    position: absolute;
    width: 110px;
    height: 110px;
    z-index: 5;
    pointer-events: none;
  }
  
  .corner img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(74, 47, 31, 0.2));
  }
  
  .corner.tl { top: -18px; left: -18px; transform: rotate(-5deg); }
  .corner.tr { top: -18px; right: -18px; transform: rotate(6deg) scaleX(-1); }
  .corner.bl { bottom: -18px; left: -18px; transform: rotate(7deg) scaleY(-1); }
  .corner.br { bottom: -18px; right: -18px; transform: rotate(-4deg) scale(-1, -1); }
  
  /* TAPE */
  .tape {
    position: absolute;
    width: 90px;
    height: 24px;
    background: rgba(212, 149, 106, 0.25);
    background-image: 
      linear-gradient(90deg, transparent, rgba(255,255,255,0.3) 50%, transparent),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='30'><filter id='t'><feTurbulence baseFrequency='0.9' numOctaves='1'/><feColorMatrix values='0 0 0 0 0.6 0 0 0 0 0.4 0 0 0 0 0.25 0 0 0 0.3 0'/></filter><rect width='100%' height='100%' filter='url(%23t)'/></svg>");
    box-shadow: 0 1px 3px rgba(74, 47, 31, 0.15);
    z-index: 6;
  }
  
  .tape::before, .tape::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 4px;
    background: repeating-linear-gradient(
      90deg,
      transparent 0,
      transparent 2px,
      rgba(74, 47, 31, 0.15) 2px,
      rgba(74, 47, 31, 0.15) 3px
    );
  }
  
  .tape::before { left: 0; }
  .tape::after { right: 0; }
  
  .tape-1 { top: 50px; left: -20px; transform: rotate(-32deg); }
  .tape-2 { top: 50px; right: -20px; transform: rotate(32deg); }
  
  /* DATE STAMP */
  .date-stamp {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 7;
    border: 1.5px solid rgba(247, 239, 224, 0.7);
    padding: 4px 10px;
    transform: rotate(4deg);
    font-family: 'Courier New', monospace;
    color: rgba(247, 239, 224, 0.9);
    font-size: 9px;
    letter-spacing: 0.15em;
    background: rgba(74, 47, 31, 0.15);
    backdrop-filter: blur(2px);
  }
  
  /* FOOTER */
  .footer {
    position: relative;
    text-align: center;
    padding-top: 24px;
    z-index: 2;
  }
  
  .footer-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  
  .footer-rule .line {
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C4906B 30%, #C4906B 70%, transparent);
    position: relative;
  }
  
  .footer-rule .ornament {
    color: #A86D4E;
    font-size: 14px;
    line-height: 1;
    font-style: italic;
    font-family: serif;
  }
  
  .footer-message {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #6B4A35;
    font-weight: 400;
    line-height: 1.4;
    max-width: 380px;
    margin: 0 auto 14px;
  }
  
  .footer-meta {
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #8B6650;
    font-weight: 500;
  }
  
  .footer-meta .dot {
    color: #C4906B;
    margin: 0 10px;
  }
  
  /* EDGE TEXTURE LINES */
  .frame-border {
    position: absolute;
    inset: 24px;
    border: 1px solid rgba(168, 109, 78, 0.25);
    pointer-events: none;
    z-index: 1;
  }
  
  .frame-border::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(168, 109, 78, 0.12);
  }
  
  /* Side text - vertical */
  .side-text {
    position: absolute;
    top: 50%;
    font-family: 'Inter', sans-serif;
    font-size: 7px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(139, 102, 80, 0.6);
    z-index: 3;
    writing-mode: vertical-rl;
    transform: translateY(-50%);
  }
  
  .side-text.left { left: 14px; transform: translateY(-50%) rotate(180deg); }
  .side-text.right { right: 14px; }
  
  /* Tiny stars scattered */
  .star {
    position: absolute;
    color: #C4906B;
    font-size: 10px;
    opacity: 0.5;
    z-index: 4;
    pointer-events: none;
    font-family: serif;
  }
  
</style>
</head>
<body>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<div class="frame">
  <div class="frame-border"></div>
  
  <div class="side-text left">— keepsake · no. 07 —</div>
  <div class="side-text right">— memory · pressed · warm —</div>
  
  <span class="star" style="top: 90px; left: 60px; transform: rotate(15deg);">✦</span>
  <span class="star" style="top: 110px; right: 80px; font-size: 7px; transform: rotate(-20deg);">✦</span>
  <span class="star" style="bottom: 140px; left: 70px; font-size: 8px; transform: rotate(25deg);">✦</span>
  <span class="star" style="bottom: 160px; right: 65px; transform: rotate(-10deg);">✦</span>
  
  <!-- HEADER -->
  <div class="header">
    <div class="eyebrow">a small celebration</div>
    <h1 class="title">our <span class="amp">&</span> photobooth</h1>
    <div class="sub-title">four frames <span>·</span> one evening <span>·</span> forever kept</div>
  </div>
  
  <!-- PHOTO WELL -->
  <div class="photo-well">
    <div class="photo-well-inner">
      
      <div class="tape tape-1"></div>
      <div class="tape tape-2"></div>
      
      <div class="date-stamp">11 · OCT · 2024</div>
      
      <!-- Corner characters / flourishes -->
      <div class="corner tl">
        <img src="CHAR_TL.png" alt="">
      </div>
      <div class="corner tr">
        <img src="CHAR_TR.png" alt="">
      </div>
      <div class="corner bl">
        <img src="CHAR_BL.png" alt="">
      </div>
      <div class="corner br">
        <img src="CHAR_BR.png" alt="">
      </div>
      
    </div>
  </div>
  
  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-rule">
      <div class="line"></div>
      <div class="ornament">❦</div>
      <div class="line"></div>
    </div>
    <p class="footer-message">"the quiet kind of joy —<br>the kind you fold & keep."</p>
    <div class="footer-meta">
      taken with love<span class="dot">●</span>developed by hand<span class="dot">●</span>ours alone
    </div>
  </div>
  
</div>
</body>
</html>
