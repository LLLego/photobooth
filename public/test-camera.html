<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Simulation Test</title>
<style>
body{font-family:monospace;background:#1a1a1a;color:#fff;padding:20px}
.pass{color:#0f0}.fail{color:#f44}.warn{color:#fa0}
.step{font-weight:bold;margin-top:12px}
.output{border:1px solid #333;padding:8px;margin:4px 0;background:#111}
img{border:2px solid #0f0;max-width:300px;display:block;margin:8px 0}
</style>
</head>
<body>
<h1>📷 Camera Simulation Test</h1>
<div id="results"></div>

<script type="module">
import { takePhoto } from '/photobooth/src/camera/capture.js';
import { compositeStrip } from '/photobooth/src/strips/compositor.js';
import { exportStrip } from '/photobooth/src/strips/export.js';

const log = document.getElementById('results');
function out(text, cls='') {
  log.innerHTML += `<div class="output ${cls}">${text}</div>`;
}

// --- STEP 1: Create mock video frames ---
out('<span class="step">STEP 1: Creating 4 mock photos...</span>');
const colors = ['#FF6B6B','#4ECDC4','#FFD93D','#6C5CE7'];
const photos = [];

for (let i = 0; i < 4; i++) {
  const c = document.createElement('canvas');
  c.width = 1200; c.height = 1600;
  const ctx = c.getContext('2d');
  ctx.fillStyle = colors[i];
  ctx.fillRect(0,0,1200,1600);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 100px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`Photo ${i+1}`, 600, 800);
  ctx.font = '40px sans-serif';
  ctx.fillText('📷 Virtual Test', 600, 900);
  
  const blob = await new Promise(r => c.toBlob(r, 'image/png'));
  photos.push(blob);
  const img = document.createElement('img');
  img.src = URL.createObjectURL(blob);
  log.append(img);
}

out(`<span class="pass">✅ Created ${photos.length} mock photos (1200×1600 PNG)</span>`, 'pass');

// --- STEP 2: Composite strip ---
out('<span class="step">STEP 2: Compositing strip...</span>');
const theme = {
  id: 'minimal',
  palette: { background: '#FFFFFF', stripBg: '#FAFAFA', text: '#2D1B11', accent: '#2D1B11' },
  fonts: { branding: "'Georgia', serif" },
  brand: { showOnStrip: false },
};
const layout = 'strip_4';

try {
  const canvas = await compositeStrip(photos, theme, layout);
  out(`<span class="pass">✅ Composite success — canvas ${canvas.width}×${canvas.height}</span>`, 'pass');
  
  const img = document.createElement('img');
  img.src = canvas instanceof HTMLCanvasElement ? 
    canvas.toDataURL('image/png') : '#';
  img.style.maxWidth = '200px';
  log.append(img);

  // --- STEP 3: Export ---
  out('<span class="step">STEP 3: Exporting to PNG...</span>');
  const { blob, suggestedName } = await exportStrip(canvas, { format: 'image/png' });
  out(`<span class="pass">✅ Export: ${(blob.size/1024).toFixed(1)}KB — "${suggestedName}"</span>`, 'pass');

  // --- STEP 4: Verify blob ---
  out('<span class="step">STEP 4: Verifying...</span>');
  const verifyImg = document.createElement('img');
  verifyImg.src = URL.createObjectURL(blob);
  log.append(verifyImg);
  
  await new Promise((resolve, reject) => {
    verifyImg.onload = resolve;
    verifyImg.onerror = reject;
  });
  out(`<span class="pass">✅ Strip loaded correctly — ${verifyImg.naturalWidth}×${verifyImg.naturalHeight}</span>`, 'pass');

  // --- STEP 5: Check all 4 photos in strip ---
  out('<span class="step">STEP 5: Verifying photo count...</span>');
  const checkCanvas = document.createElement('canvas');
  checkCanvas.width = canvas.width;
  checkCanvas.height = canvas.height;
  const checkCtx = checkCanvas.getContext('2d');
  checkCtx.drawImage(verifyImg, 0, 0);
  
  // Check if all 4 color regions exist
  let found = 0;
  for (const color of colors) {
    // Convert hex to RGB
    const r = parseInt(color.slice(1,3), 16);
    const g = parseInt(color.slice(3,5), 16);
    const b = parseInt(color.slice(5,7), 16);
    
    // Sample center of each quadrant
    const qx = 600;
    const qy = 200 + (colors.indexOf(color) * 400);
    const pixel = checkCtx.getImageData(qx, qy, 1, 1).data;
    
    if (Math.abs(pixel[0]-r) < 30 && Math.abs(pixel[1]-g) < 30 && Math.abs(pixel[2]-b) < 30) {
      found++;
    }
  }
  
  if (found === 4) {
    out(`<span class="pass">✅ All 4 photos detected in final strip!</span>`, 'pass');
  } else {
    out(`<span class="fail">❌ Only ${found}/4 photos found — something wrong with compositing</span>`, 'fail');
  }

  out('<span class="step">🎉 ALL TESTS PASSED — Capture → Composite → Export flow works!</span>', 'pass');
} catch(e) {
  out(`<span class="fail">❌ FAILED: ${e.message}<br><pre>${e.stack}</pre></span>`, 'fail');
}
</script>
</body>
</html>
