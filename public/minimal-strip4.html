<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>our photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#EDE2D2;min-height:100vh;font-family:'Cormorant Garamond',serif;display:flex;align-items:center;justify-content:center;">

<div style="position:relative;width:680px;height:1280px;">

  <!-- Top decorative character -->
  <div style="position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:180px;z-index:5;pointer-events:none;">
    <img src="CHAR_TOP" alt="" style="width:100%;height:100%;object-fit:contain;filter:sepia(0.35) saturate(1.1) hue-rotate(-12deg) brightness(0.92);">
  </div>

  <!-- Top-left floral -->
  <div style="position:absolute;top:50px;left:30px;width:130px;height:130px;z-index:5;pointer-events:none;transform:rotate(-12deg);">
    <img src="CHAR_TL" alt="" style="width:100%;height:100%;object-fit:contain;filter:sepia(0.4) saturate(1.05) hue-rotate(-15deg) brightness(0.88);">
  </div>

  <!-- Top-right floral -->
  <div style="position:absolute;top:70px;right:30px;width:130px;height:130px;z-index:5;pointer-events:none;transform:rotate(18deg) scaleX(-1);">
    <img src="CHAR_TR" alt="" style="width:100%;height:100%;object-fit:contain;filter:sepia(0.4) saturate(1.05) hue-rotate(-15deg) brightness(0.88);">
  </div>

  <!-- Bottom decorative character -->
  <div style="position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:200px;height:180px;z-index:5;pointer-events:none;">
    <img src="CHAR_BOT" alt="" style="width:100%;height:100%;object-fit:contain;filter:sepia(0.35) saturate(1.1) hue-rotate(-12deg) brightness(0.92);">
  </div>

  <!-- Bottom-left floral -->
  <div style="position:absolute;bottom:130px;left:30px;width:110px;height:110px;z-index:5;pointer-events:none;transform:rotate(-20deg) scaleY(-1);">
    <img src="CHAR_BL" alt="" style="width:100%;height:100%;object-fit:contain;filter:sepia(0.4) saturate(1.05) hue-rotate(-15deg) brightness(0.88);">
  </div>

  <!-- Bottom-right floral -->
  <div style="position:absolute;bottom:110px;right:30px;width:110px;height:110px;z-index:5;pointer-events:none;transform:rotate(15deg);">
    <img src="CHAR_BR" alt="" style="width:100%;height:100%;object-fit:contain;filter:sepia(0.4) saturate(1.05) hue-rotate(-15deg) brightness(0.88);">
  </div>

  <!-- Main photobooth frame -->
  <div style="position:absolute;top:230px;left:80px;width:520px;height:830px;z-index:2;">
    
    <!-- Outer warm shadow layer -->
    <div style="position:absolute;inset:-18px;background:#C8825A;opacity:0.18;filter:blur(2px);"></div>
    
    <!-- Outer solid border -->
    <div style="position:absolute;inset:-8px;background:#D4956A;border:1px solid #B87E54;"></div>
    
    <!-- Inner cream border -->
    <div style="position:absolute;inset:-2px;background:#F7EDE0;border:1px solid #C8825A;"></div>
    
    <!-- Main background -->
    <div style="position:absolute;inset:0;background:#FDF6EC;overflow:hidden;">
      
      <!-- Paper texture overlay using SVG noise -->
      <div style="position:absolute;inset:0;opacity:0.45;mix-blend-mode:multiply;background-image:url(&quot;data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.45  0 0 0 0 0.3  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>&quot;);"></div>
      
      <!-- Title block -->
      <div style="position:absolute;top:22px;left:0;right:0;text-align:center;z-index:3;">
        <div style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:11px;letter-spacing:0.45em;color:#A56B45;text-transform:uppercase;margin-bottom:4px;padding-left:0.45em;">— &nbsp; a keepsake &nbsp; —</div>
        <div style="font-family:'Fraunces',serif;font-weight:400;font-size:38px;color:#5C3A24;line-height:1;letter-spacing:-0.01em;margin-top:6px;">
          <span style="font-style:italic;font-weight:300;">our</span> <span style="font-weight:500;">photobooth</span>
        </div>
        <div style="margin:10px auto 0;width:36px;height:1px;background:#A56B45;"></div>
      </div>
      
      <!-- Photo strip area -->
      <div style="position:absolute;top:115px;left:30px;right:30px;bottom:60px;">
        
        <!-- Four photo frames -->
        <div style="position:absolute;top:0;left:0;right:0;height:155px;background:transparent;border:1px solid #D4956A;box-shadow:inset 0 0 0 4px #FDF6EC, inset 0 0 0 5px #E8C9A8;"></div>
        <div style="position:absolute;top:170px;left:0;right:0;height:155px;background:transparent;border:1px solid #D4956A;box-shadow:inset 0 0 0 4px #FDF6EC, inset 0 0 0 5px #E8C9A8;"></div>
        <div style="position:absolute;top:340px;left:0;right:0;height:155px;background:transparent;border:1px solid #D4956A;box-shadow:inset 0 0 0 4px #FDF6EC, inset 0 0 0 5px #E8C9A8;"></div>
        <div style="position:absolute;top:510px;left:0;right:0;height:155px;background:transparent;border:1px solid #D4956A;box-shadow:inset 0 0 0 4px #FDF6EC, inset 0 0 0 5px #E8C9A8;"></div>
        
        <!-- Tiny corner marks on photos -->
        <div style="position:absolute;top:-3px;left:-3px;width:6px;height:6px;border-top:1px solid #8B5A3C;border-left:1px solid #8B5A3C;"></div>
        <div style="position:absolute;top:-3px;right:-3px;width:6px;height:6px;border-top:1px solid #8B5A3C;border-right:1px solid #8B5A3C;"></div>
        <div style="position:absolute;bottom:-3px;left:-3px;width:6px;height:6px;border-bottom:1px solid #8B5A3C;border-left:1px solid #8B5A3C;"></div>
        <div style="position:absolute;bottom:-3px;right:-3px;width:6px;height:6px;border-bottom:1px solid #8B5A3C;border-right:1px solid #8B5A3C;"></div>
      </div>
      
      <!-- Bottom signature -->
      <div style="position:absolute;bottom:18px;left:0;right:0;text-align:center;z-index:3;">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
          <span style="display:inline-block;width:18px;height:1px;background:#A56B45;"></span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.35em;color:#8B5A3C;text-transform:uppercase;">No. 04 &nbsp;·&nbsp; strip of four</span>
          <span style="display:inline-block;width:18px;height:1px;background:#A56B45;"></span>
        </div>
      </div>
      
    </div>
    
    <!-- Corner ornaments on main frame -->
    <div style="position:absolute;top:-14px;left:-14px;width:26px;height:26px;z-index:4;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;border:1px solid #8B5A3C;background:#FDF6EC;"></div>
      <div style="position:absolute;top:4px;left:4px;right:4px;bottom:4px;border:1px solid #D4956A;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:#8B5A3C;border-radius:50%;"></div>
    </div>
    <div style="position:absolute;top:-14px;right:-14px;width:26px;height:26px;z-index:4;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;border:1px solid #8B5A3C;background:#FDF6EC;"></div>
      <div style="position:absolute;top:4px;left:4px;right:4px;bottom:4px;border:1px solid #D4956A;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:#8B5A3C;border-radius:50%;"></div>
    </div>
    <div style="position:absolute;bottom:-14px;left:-14px;width:26px;height:26px;z-index:4;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;border:1px solid #8B5A3C;background:#FDF6EC;"></div>
      <div style="position:absolute;top:4px;left:4px;right:4px;bottom:4px;border:1px solid #D4956A;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:#8B5A3C;border-radius:50%;"></div>
    </div>
    <div style="position:absolute;bottom:-14px;right:-14px;width:26px;height:26px;z-index:4;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;border:1px solid #8B5A3C;background:#FDF6EC;"></div>
      <div style="position:absolute;top:4px;left:4px;right:4px;bottom:4px;border:1px solid #D4956A;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:#8B5A3C;border-radius:50%;"></div>
    </div>
  </div>

  <!-- Side text accents -->
  <div style="position:absolute;top:560px;left:30px;writing-mode:vertical-rl;transform:rotate(180deg);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.5em;color:#8B5A3C;text-transform:uppercase;z-index:4;">— memory &nbsp; · &nbsp; in four frames —</div>
  
  <div style="position:absolute;top:600px;right:30px;writing-mode:vertical-rl;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.5em;color:#8B5A3C;text-transform:uppercase;z-index:4;">— est. today &nbsp; · &nbsp; vol. one —</div>

  <!-- Bottom caption -->
  <div style="position:absolute;bottom:30px;left:0;right:0;text-align:center;z-index:4;">
    <div style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:14px;color:#8B5A3C;letter-spacing:0.04em;">"the little moments, kept forever"</div>
    <div style="margin-top:10px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.4em;color:#A56B45;text-transform:uppercase;">✦ &nbsp;&nbsp; press &nbsp; · &nbsp; smile &nbsp; · &nbsp; repeat &nbsp;&nbsp; ✦</div>
  </div>

  <!-- Subtle tape pieces -->
  <div style="position:absolute;top:215px;left:280px;width:120px;height:24px;background:rgba(212,149,106,0.35);transform:rotate(-3deg);z-index:6;border-left:1px dashed rgba(139,90,60,0.3);border-right:1px dashed rgba(139,90,60,0.3);"></div>
  
  <div style="position:absolute;bottom:1040px;right:240px;width:110px;height:22px;background:rgba(212,149,106,0.28);transform:rotate(4deg);z-index:6;border-left:1px dashed rgba(139,90,60,0.3);border-right:1px dashed rgba(139,90,60,0.3);"></div>

</div>

</body>
</html>
