<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>our photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Caveat:wght@400..700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --terracotta: #D4956A;
    --terracotta-soft: #E2A87C;
    --terracotta-deep: #B27A52;
    --cream: #FFFAF0;
    --cream-warm: #FAF1E0;
    --cream-deep: #F2E4C9;
    --chocolate: #2D1B11;
    --chocolate-soft: #4A2D1F;
    --chocolate-muted: #6F4A35;
    --honey: #FFB400;
    --honey-soft: #FFC857;
    --paper-shadow: rgba(45, 27, 17, 0.08);
    --shadow-sm: 0 2px 8px rgba(45, 27, 17, 0.06);
    --shadow-md: 0 8px 24px rgba(45, 27, 17, 0.10);
    --shadow-lg: 0 20px 50px rgba(45, 27, 17, 0.14);
    --shadow-xl: 0 30px 70px rgba(45, 27, 17, 0.18);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--chocolate);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
    background-image: 
      radial-gradient(ellipse at 15% 20%, rgba(212, 149, 106, 0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 80%, rgba(255, 180, 0, 0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(212, 149, 106, 0.04) 0%, transparent 70%);
  }

  /* Paper grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
    background-image: 
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.176 0 0 0 0 0.106 0 0 0 0 0.067 0 0 0 0.15 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Warm ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255, 180, 0, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    filter: blur(40px);
  }

  /* ============ NAV HOST ============ */
  #nav-host {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    background: rgba(255, 250, 240, 0.75);
    border-bottom: 1px solid rgba(45, 27, 17, 0.08);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    color: var(--chocolate);
    letter-spacing: -0.02em;
  }

  .nav-mark::before {
    content: '';
    width: 12px;
    height: 12px;
    background: var(--terracotta);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 2px 6px rgba(212, 149, 106, 0.5);
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    color: var(--chocolate-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: color 0.3s ease;
    position: relative;
  }

  .nav-links a:hover { color: var(--terracotta-deep); }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--terracotta);
    transition: width 0.3s ease;
  }

  .nav-links a:hover::after { width: 100%; }

  .nav-settings {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--cream-warm);
    border: 1px solid rgba(45, 27, 17, 0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    color: var(--chocolate-muted);
    box-shadow: var(--shadow-sm);
  }

  .nav-settings:hover {
    background: var(--terracotta);
    color: var(--cream);
    transform: rotate(45deg);
    box-shadow: 0 6px 16px rgba(212, 149, 106, 0.4);
  }

  /* ============ APP ============ */
  #app {
    position: relative;
    z-index: 2;
    max-width: 1280px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  /* ============ HERO ============ */
  .hero {
    position: relative;
    margin-bottom: 80px;
    padding: 40px 0 60px;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Caveat', cursive;
    font-size: 24px;
    color: var(--terracotta-deep);
    margin-bottom: 28px;
    animation: drift 8s ease-in-out infinite;
  }

  .hero-eyebrow::before,
  .hero-eyebrow::after {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--terracotta);
    opacity: 0.5;
  }

  .hero-title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(56px, 9vw, 128px);
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--chocolate);
    margin-bottom: 32px;
    position: relative;
  }

  .hero-title .our {
    font-style: italic;
    font-weight: 300;
    color: var(--terracotta-deep);
    display: block;
    font-size: 0.5em;
    margin-bottom: 0.1em;
    letter-spacing: 0.02em;
    transform: translateX(4px);
  }

  .hero-title .photobooth {
    display: block;
    font-weight: 600;
    background: linear-gradient(135deg, var(--chocolate) 0%, var(--chocolate-soft) 60%, var(--terracotta-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-title .ampersand {
    position: absolute;
    top: 8%;
    right: 8%;
    font-family: 'Caveat', cursive;
    font-style: normal;
    font-weight: 400;
    font-size: 0.35em;
    color: var(--honey);
    transform: rotate(15deg);
    opacity: 0.9;
    animation: float 6s ease-in-out infinite;
  }

  .hero-subtitle {
    font-family: 'Caveat', cursive;
    font-size: clamp(22px, 2.2vw, 30px);
    color: var(--chocolate-muted);
    max-width: 540px;
    line-height: 1.4;
    margin-bottom: 48px;
    transform: rotate(-1deg);
  }

  .hero-subtitle .underline {
    background-image: linear-gradient(120deg, var(--honey-soft) 0%, var(--honey-soft) 100%);
    background-repeat: no-repeat;
    background-size: 100% 0.4em;
    background-position: 0 88%;
    padding: 0 4px;
  }

  /* ============ FEATURE CARDS ============ */
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
    margin-bottom: 80px;
  }

  .feature-card {
    position: relative;
    padding: 40px 36px 36px;
    background: var(--cream-warm);
    border-radius: 28px;
    border: 1px solid rgba(45, 27, 17, 0.06);
    cursor: pointer;
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .feature-card:nth-child(1) {
    transform: rotate(-1.2deg);
  }

  .feature-card:nth-child(2) {
    transform: rotate(1.2deg);
    background: linear-gradient(135deg, #FAF1E0 0%, #F5E4D0 100%);
  }

  .feature-card:hover {
    transform: rotate(0deg) translateY(-8px);
    box-shadow: var(--shadow-xl);
  }

  .feature-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 80%;
    height: 100%;
    background: radial-gradient(circle, rgba(255, 180, 0, 0.12) 0%, transparent 70%);
    pointer-events: none;
    transition: transform 0.8s ease;
  }

  .feature-card:hover::before {
    transform: translate(-20%, 20%);
  }

  .feature-card-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--cream);
    border: 1px solid rgba(45, 27, 17, 0.08);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    color: var(--terracotta-deep);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .feature-card-tag .dot {
    width: 6px;
    height: 6px;
    background: var(--terracotta);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  .feature-card-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 42px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--chocolate);
    margin-bottom: 12px;
  }

  .feature-card-title em {
    font-style: italic;
    font-weight: 300;
    color: var(--terracotta-deep);
  }

  .feature-card-desc {
    font-size: 15px;
    color: var(--chocolate-muted);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 360px;
  }

  .feature-card-visual {
    position: relative;
    height: 160px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Single camera visual */
  .single-visual {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .polaroid {
    background: var(--cream);
    padding: 10px 10px 32px;
    border-radius: 4px;
    box-shadow: var(--shadow-md);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  .polaroid::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 40px;
    height: 12px;
    background: rgba(255, 180, 0, 0.35);
    border-radius: 2px;
  }

  .polaroid-frame {
    width: 88px;
    height: 100px;
    border-radius: 2px;
    background: linear-gradient(135deg, var(--terracotta-soft), var(--terracotta-deep));
    position: relative;
    overflow: hidden;
  }

  .polaroid-frame::after {
    content: '♥';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--cream);
    opacity: 0.8;
  }

  .polaroid:nth-child(1) { transform: rotate(-6deg) translateY(8px); }
  .polaroid:nth-child(2) { transform: rotate(3deg) translateY(-4px); z-index: 2; }
  .polaroid:nth-child(3) { transform: rotate(8deg) translateY(6px); }

  .feature-card:hover .polaroid:nth-child(1) { transform: rotate(-10deg) translateY(4px); }
  .feature-card:hover .polaroid:nth-child(2) { transform: rotate(0deg) translateY(-12px); }
  .feature-card:hover .polaroid:nth-child(3) { transform: rotate(12deg) translateY(2px); }

  /* Dual camera visual */
  .dual-visual {
    display: flex;
    gap: 24px;
    align-items: center;
    position: relative;
  }

  .camera-mock {
    width: 110px;
    height: 110px;
    border-radius: 20px;
    background: var(--chocolate);
    padding: 12px;
    position: relative;
    box-shadow: var(--shadow-md);
    transition: transform 0.4s ease;
  }

  .camera-mock .lens {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--terracotta-deep), var(--chocolate-soft));
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .camera-mock .lens::after {
    content: '';
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--chocolate);
    border: 3px solid var(--cream);
    box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
  }

  .camera-mock::before {
    content: '';
    position: absolute;
    top: 6px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--honey);
    box-shadow: 0 0 8px var(--honey);
  }

  .heart-bridge {
    position: relative;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .heart-bridge::before {
    content: '';
    position: absolute;
    width: 60px;
    height: 1px;
    background: repeating-linear-gradient(90deg, var(--terracotta) 0 4px, transparent 4px 8px);
    top: 50%;
    left: -14px;
  }

  .heart-bridge::after {
    content: '♥';
    font-size: 18px;
    color: var(--terracotta);
    z-index: 2;
    background: var(--cream-warm);
    padding: 0 4px;
    animation: heartbeat 1.4s ease-in-out infinite;
  }

  .feature-card:hover .camera-mock:nth-child(1) { transform: translateX(-4px) rotate(-3deg); }
  .feature-card:hover .camera-mock:nth-child(3) { transform: translateX(4px) rotate(3deg); }

  .feature-card-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--chocolate);
    font-weight: 500;
    transition: gap 0.4s ease;
  }

  .feature-card-cta .arrow {
    display: inline-block;
    transition: transform 0.4s ease;
    color: var(--terracotta-deep);
  }

  .feature-card:hover .feature-card-cta { gap: 16px; }
  .feature-card:hover .feature-card-cta .arrow { transform: translateX(4px); }

  /* ============ SECTION HEADERS ============ */
  .section-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 40px;
  }

  .section-eyebrow {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--terracotta-deep);
    margin-bottom: 6px;
    display: block;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--chocolate);
  }

  .section-title em {
    font-style: italic;
    font-weight: 300;
    color: var(--terracotta-deep);
  }

  .section-meta {
    font-size: 13px;
    color: var(--chocolate-muted);
    text-align: right;
    line-height: 1.5;
  }

  .section-meta strong {
    color: var(--terracotta-deep);
    font-weight: 600;
    font-size: 22px;
    font-family: 'Fraunces', serif;
    display: block;
  }

  /* ============ GALLERY ============ */
  .gallery-section {
    margin-bottom: 100px;
  }

  .gallery-card {
    background: var(--cream-warm);
    border-radius: 32px;
    padding: 40px;
    border: 1px solid rgba(45, 27, 17, 0.06);
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }

  .gallery-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--terracotta) 0%, var(--honey) 50%, var(--terracotta) 100%);
  }

  .gallery-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 32px;
  }

  .gallery-strip-item {
    aspect-ratio: 1 / 1.2;
    border-radius: 8px;
    background: var(--cream);
    padding: 8px 8px 28px;
    box-shadow: var(--shadow-sm);
    position: relative;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
  }

  .gallery-strip-item:nth-child(1) { transform: rotate(-2deg); }
  .gallery-strip-item:nth-child(2) { transform: rotate(1.5deg) translateY(8px); }
  .gallery-strip-item:nth-child(3) { transform: rotate(-1deg) translateY(-4px); }
  .gallery-strip-item:nth-child(4) { transform: rotate(2deg); }

  .gallery-strip-item:hover {
    transform: rotate(0) translateY(-8px) scale(1.04);
    z-index: 3;
  }

  .gallery-strip-img {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--cream);
    position: relative;
    overflow: hidden;
  }

  .gallery-strip-img.m1 { background: linear-gradient(135deg, #E8B895, #C68B5F); }
  .gallery-strip-img.m2 { background: linear-gradient(135deg, #F5C8A3, #D4956A); }
  .gallery-strip-img.m3 { background: linear-gradient(135deg, #D9A57F, #A66B3D); }
  .gallery-strip-img.m4 { background: linear-gradient(135deg, #EAC59B, #B97D4A); }

  .gallery-strip-img::after {
    content: attr(data-date);
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: var(--chocolate-muted);
    background: var(--cream);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }

  .gallery-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    border-top: 1px dashed rgba(45, 27, 17, 0.15);
  }

  .gallery-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .gallery-info-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--chocolate);
  }

  .gallery-info-meta {
    font-size: 13px;
    color: var(--chocolate-muted);
  }

  .gallery-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    background: var(--chocolate);
    color: var(--cream);
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.4s ease;
    border: none;
    cursor: pointer;
  }

  .gallery-cta:hover {
    background: var(--terracotta-deep);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(178, 122, 82, 0.4);
  }

  /* ============ THEMES ============ */
  .themes-section {
    margin-bottom: 80px;
  }

  .themes-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .theme-card {
    position: relative;
    padding: 24px 20px;
    background: var(--cream-warm);
    border-radius: 24px;
    border: 1px solid rgba(45, 27, 17, 0.06);
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .theme-card:nth-child(1) { transform: translateY(0); }
  .theme-card:nth-child(2) { transform: translateY(12px); }
  .theme-card:nth-child(3) { transform: translateY(4px); }
  .theme-card:nth-child(4) { transform: translateY(16px); }

  .theme-card:hover {
    transform: translateY(-12px) scale(1.03);
    box-shadow: var(--shadow-lg);
  }

  .theme-preview {
    aspect-ratio: 3 / 4;
    border-radius: 16px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Minimal theme */
  .theme-preview.minimal {
    background: var(--cream);
    border: 1px solid rgba(45, 27, 17, 0.10);
  }

  .theme-preview.minimal::before {
    content: '';
    width: 60%;
    height: 70%;
    background: linear-gradient(135deg, var(--cream-deep), var(--cream-warm));
    border-radius: 4px;
  }

  /* Hundred Acre theme */
  .theme-preview.acre {
    background: linear-gradient(180deg, #F4D8A8 0%, #E8B574 100%);
  }

  .theme-preview.acre::before {
    content: '🍯';
    font-size: 42px;
    position: absolute;
    top: 12px;
    right: 12px;
  }

  .theme-preview.acre::after {
    content: '';
    width: 70%;
    height: 75%;
    background: #FAEDD0;
    border-radius: 4px;
    border: 2px solid #8B5A2B;
    border-bottom: 18px solid #8B5A2B;
  }

  /* Pucca theme */
  .theme-preview.pucca {
    background: linear-gradient(135deg, #FF4F6B 0%, #C8184D 100%);
  }

  .theme-preview.pucca::before {
    content: '';
    width: 28px;
    height: 28px;
    background: #000;
    border-radius: 50%;
    position: absolute;
    top: 30%;
    box-shadow: 36px 0 0 #000;
  }

  .theme-preview.pucca::after {
    content: '';
    width: 70%;
    height: 70%;
    background: #FFF8DC;
    border-radius: 4px;
    border: 3px solid #000;
  }

  /* Hello Kitty theme */
  .theme-preview.kitty {
    background: linear-gradient(135deg, #FFB6C1 0%, #FF8FA3 100%);
  }

  .theme-preview.kitty::before {
    content: '';
    width: 18px;
    height: 18px;
    background: var(--honey);
    border-radius: 50%;
    position: absolute;
    top: 22%;
    left: 28%;
    box-shadow: 32px 0 0 var(--honey);
  }

  .theme-preview.kitty::after {
    content: '';
    width: 70%;
    height: 70%;
    background: #FFF5F7;
    border-radius: 4px;
    border: 3px solid #C84561;
  }

  .theme-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .theme-name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--chocolate);
    line-height: 1.2;
  }

  .theme-name em {
    display: block;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    color: var(--chocolate-muted);
    margin-top: 2px;
  }

  .theme-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(45, 27, 17, 0.20);
    flex-shrink: 0;
    transition: all 0.3s ease;
    position: relative;
  }

  .theme-card:hover .theme-radio {
    border-color: var(--terracotta);
  }

  .theme-card.active .theme-radio {
    background: var(--terracotta);
    border-color: var(--terracotta);
  }

  .theme-card.active .theme-radio::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--cream);
    font-size: 12px;
    font-weight: 700;
  }

  .theme-card.active {
    background: var(--terracotta-soft);
    transform: translateY(-12px) scale(1.03);
  }

  .theme-tag {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 10px;
    background: var(--cream);
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--chocolate);
    z-index: 2;
  }

  .theme-tag.new {
    background: var(--honey);
    color: var(--chocolate);
  }

  /* ============ FOOTER MARK ============ */
  .footer-mark {
    text-align: center;
    padding: 60px 20px 20px;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--chocolate-muted);
    position: relative;
  }

  .footer-mark::before,
  .footer-mark::after {
    content: '';
    display: inline-block;
    width: 40px;
    height: 1px;
    background: var(--terracotta);
    vertical-align: middle;
    margin: 0 16px;
    opacity: 0.5;
  }

  /* ============ ANIMATIONS ============ */
  @keyframes float {
    0%, 100% { transform: rotate(15deg) translateY(0); }
    50% { transform: rotate(18deg) translateY(-8px); }
  }

  @keyframes drift {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(8px); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.2); }
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.15); }
    50% { transform: scale(1); }
    75% { transform: scale(1.1); }
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    #app { padding: 40px 24px 60px; }
    #nav-host { padding: 16px 24px; }
    .nav-links { display: none; }
    .feature-grid { grid-template-columns: 1fr; gap: 20px; }
    .themes-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .gallery-strip { grid-template-columns: repeat(2, 1fr); }
    .section-header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .gallery-footer { flex-direction: column; gap: 20px; align-items: flex-start; }
    .hero { padding: 20px 0 40px; }
    .hero-title .ampersand { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
